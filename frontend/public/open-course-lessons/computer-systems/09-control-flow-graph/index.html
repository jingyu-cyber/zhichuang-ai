<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>控制流图 · 跳转地图</title>
<link rel="stylesheet" href="../assets/common.css">
<style>
  .map-shell { max-width:1440px; margin:0 auto; padding:18px 22px 42px; }
  .map-top { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:14px; }
  .map-top h1 { margin:0; font-size:22px; }
  .map-top p { margin:2px 0 0; color:var(--text-dim); font-size:12px; }
  .map-board { display:grid; grid-template-columns: 360px 1fr; grid-template-rows:1fr 230px; gap:14px; margin-top:16px; min-height:calc(100vh - 116px); }
  .disasm-scroll { grid-row:1/3; border:1px solid var(--border); border-radius:18px; background:#0a0f1a; overflow:hidden; display:grid; grid-template-rows:auto 1fr; }
  .panel-title { padding:12px 14px; border-bottom:1px solid var(--border); background:var(--bg-panel-2); color:var(--text-dim); font-size:12px; }
  .asm { font-family:var(--mono); font-size:12px; overflow:auto; padding:8px 0; }
  .ins { display:grid; grid-template-columns:82px 1fr; gap:8px; padding:6px 12px; border-left:3px solid transparent; cursor:pointer; }
  .ins .addr { color:#4a5876; }
  .ins.hot { border-left-color:var(--accent); background:rgba(125,211,252,.13); color:var(--accent); }
  .ins.jump { color:var(--warn); }
  .cfg-canvas { position:relative; border:1px solid var(--border); border-radius:18px; background:radial-gradient(circle at 50% 42%,rgba(125,211,252,.08),transparent 60%),#0a0f1a; overflow:hidden; }
  #cfgSvg { position:absolute; inset:0; width:100%; height:100%; }
  .legend { position:absolute; right:16px; top:14px; display:flex; gap:8px; flex-wrap:wrap; }
  .legend span { border:1px solid var(--border); border-radius:999px; padding:4px 8px; color:var(--text-dim); background:rgba(10,15,26,.82); font-size:11px; }
  .node rect { fill:var(--bg-panel-2); stroke:var(--border-hi); stroke-width:1.5; }
  .node.active rect { stroke:var(--accent); fill:rgba(125,211,252,.18); }
  .node.loop rect { stroke:var(--warn); }
  .node text { fill:var(--text); font-family:var(--mono); font-size:12px; }
  .edge { fill:none; stroke:#4a5876; stroke-width:1.8; marker-end:url(#arrow); }
  .edge.active { stroke:var(--ok); stroke-width:2.5; }
  .edge.loop { stroke:var(--warn); stroke-dasharray:6 4; }
  .reconstruction { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .pseudo,.question { border:1px solid var(--border); border-radius:18px; background:var(--bg-panel); padding:14px; }
  .pseudo pre { margin:0; font-family:var(--mono); font-size:13px; line-height:1.8; color:var(--text-dim); }
  .pseudo .hot { color:var(--ok); background:rgba(74,222,128,.09); }
  .question h2 { margin:0 0 8px; font-size:16px; color:var(--accent); }
  .question p { margin:0; color:var(--text-dim); line-height:1.8; }
  @media(max-width:1050px){.map-board{grid-template-columns:1fr;grid-template-rows:auto 520px auto}.disasm-scroll{grid-row:auto}.reconstruction{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="map-shell">
  <header class="map-top">
    <div><h1>控制流图 · 跳转地图</h1><p>把 jmp / jl / ret 还原为基本块、分支和 while 回边</p></div>
    <a class="nav-back" href="../index.html">← 返回目录</a>
  </header>

  <main class="map-board">
    <aside class="disasm-scroll">
      <div class="panel-title">反汇编按基本块分组</div>
      <div class="asm" id="asm"></div>
    </aside>
    <section class="cfg-canvas">
      <div class="legend"><span>实线：顺序边</span><span>绿色：当前路径</span><span>虚线：循环回边</span></div>
      <svg id="cfgSvg" viewBox="0 0 760 520">
        <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4a5876"/></marker></defs>
      </svg>
    </section>
    <section class="reconstruction">
      <div class="pseudo"><div class="panel-title" style="margin:-14px -14px 12px;">伪代码重建</div><pre id="pseudo"></pre></div>
      <div class="question"><h2 id="blockTitle">-</h2><p id="question">-</p></div>
    </section>
  </main>
</div>
<script>
const blocks=[
{id:"B0",name:"entry",x:300,y:52,w:160,h:64,q:"entry 为什么通常不是循环体？",ins:[["401130","xor %eax,%eax"],["401132","xor %edx,%edx"],["401134","jmp .Ltest"]],pseudo:["sum = 0;","i = 0;","goto test;"]},
{id:"B1",name:"body",x:170,y:205,w:170,h:76,q:"循环体里同时更新了哪两个状态？",ins:[["401140","add (%rdi,%rdx,4),%eax"],["401143","add $0x1,%edx"]],pseudo:["sum += a[i];","i++;"],loop:true},
{id:"B2",name:"test",x:420,y:210,w:170,h:76,q:"哪条条件跳转构成 while 的判断？",ins:[["401150","cmp %esi,%edx"],["401152","jl .Lbody"]],pseudo:["while (i < n)"],loop:true},
{id:"B3",name:"exit",x:315,y:392,w:150,h:60,q:"返回值通过哪个寄存器离开函数？",ins:[["401154","ret"]],pseudo:["return sum;"]}
];
const edges=[["B0","B2",""],["B2","B1","loop"],["B1","B2","loop"],["B2","B3",""]];
let cur=0;
function render(){
 const b=blocks[cur];
 asm.innerHTML=blocks.map((blk,i)=>`<div class="ins ${i===cur?"hot":""}"><span class="addr">${blk.id}</span><b>${blk.name}</b></div>`+blk.ins.map(x=>`<div class="ins ${i===cur?"hot":""} ${x[1].startsWith("j")?"jump":""}" onclick="cur=${i};render()"><span class="addr">${x[0]}</span><span>${x[1]}</span></div>`).join("")).join("");
 const defs=document.querySelector("#cfgSvg defs").outerHTML;
 cfgSvg.innerHTML=defs+edges.map(([a,b,t])=>{const A=blocks.find(x=>x.id===a),B=blocks.find(x=>x.id===b);return `<path class="edge ${t} ${A.id===blocks[cur].id||B.id===blocks[cur].id?"active":""}" d="M${A.x+A.w/2},${A.y+A.h} C${A.x+A.w/2},${A.y+130} ${B.x+B.w/2},${B.y-80} ${B.x+B.w/2},${B.y}"/>`;}).join("")+blocks.map((x,i)=>`<g class="node ${i===cur?"active":""} ${x.loop?"loop":""}" transform="translate(${x.x},${x.y})"><rect width="${x.w}" height="${x.h}" rx="14"/><text x="16" y="28">${x.id}</text><text x="16" y="50">${x.name}</text></g>`).join("");
 pseudo.innerHTML=blocks.map((x,i)=>x.pseudo.map(p=>`<span class="${i===cur?"hot":""}">${p}</span>`).join("\n")).join("\n");
 blockTitle.textContent=`${b.id} · ${b.name}`; question.textContent=b.q;
}
render();
</script>
</body>
</html>
