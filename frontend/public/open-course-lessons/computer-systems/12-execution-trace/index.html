<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>执行日志 · Trace 时间轴</title>
<link rel="stylesheet" href="../assets/common.css">
<style>
  .trace-room { max-width:1440px; margin:0 auto; padding:18px 22px 42px; }
  .trace-top { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:14px; }
  .trace-top h1 { margin:0; font-size:22px; }
  .trace-top p { margin:2px 0 0; color:var(--text-dim); font-size:12px; }
  .trace-console { display:grid; grid-template-columns:1fr 390px; grid-template-rows:auto 1fr; gap:14px; margin-top:16px; min-height:calc(100vh - 112px); }
  .filterbar { grid-column:1/3; border:1px solid var(--border); border-radius:18px; background:#0a0f1a; padding:12px 14px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .filters { display:flex; gap:8px; flex-wrap:wrap; }
  .filters .btn.active { background:var(--accent); color:#0b0f17; border-color:transparent; font-weight:800; }
  .timeline { border:1px solid var(--border); border-radius:18px; background:var(--bg-panel); overflow:hidden; display:grid; grid-template-rows:auto 1fr; }
  .panel-title { padding:12px 14px; border-bottom:1px solid var(--border); background:var(--bg-panel-2); color:var(--text-dim); font-size:12px; }
  .cycles { overflow:auto; padding:12px; display:grid; gap:10px; }
  .cycle { display:grid; grid-template-columns:70px 92px 1fr 130px; gap:10px; align-items:center; border:1px solid var(--border); border-radius:12px; background:#0a0f1a; padding:11px; font-family:var(--mono); cursor:pointer; }
  .cycle.active { border-color:var(--accent); background:rgba(125,211,252,.12); }
  .cycle.bad { border-left:4px solid var(--danger); }
  .cycle span:nth-child(1),.cycle span:nth-child(2) { color:var(--text-dim); }
  .inspector { display:grid; grid-template-rows:auto auto 1fr; gap:14px; }
  .state-matrix { border:1px solid var(--border); border-radius:18px; background:var(--bg-panel); overflow:hidden; }
  .regs { padding:14px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .reg { border:1px solid var(--border); border-radius:12px; background:#0a0f1a; padding:12px; font-family:var(--mono); }
  .reg b { display:block; color:var(--text-dim); font-size:11px; margin-bottom:6px; }
  .reg.diff { border-color:var(--warn); color:var(--warn); }
  .diagnosis { border:1px solid var(--border); border-radius:18px; background:#0a0f1a; padding:14px; line-height:1.8; color:var(--text-dim); }
  .diagnosis b { color:var(--danger); }
  .debug-steps { border:1px solid var(--border); border-radius:18px; background:var(--bg-panel); padding:14px; }
  .debug-steps h2 { margin:0 0 10px; font-size:16px; color:var(--accent); }
  .debug-steps ol { margin:0; padding-left:20px; color:var(--text-dim); line-height:1.8; }
  @media(max-width:1060px){.trace-console{grid-template-columns:1fr}.filterbar{grid-column:auto}.cycle{grid-template-columns:1fr}.inspector{grid-template-rows:auto}}
</style>
</head>
<body>
<div class="trace-room">
  <header class="trace-top">
    <div><h1>执行日志 · Trace 时间轴</h1><p>通过周期快照、寄存器差异和写回字段定位模拟器错误</p></div>
    <a class="nav-back" href="../index.html">← 返回目录</a>
  </header>
  <main class="trace-console">
    <section class="filterbar">
      <div><b>Y86 trace</b><br><span class="hint">定位第一个与预期语义不一致的周期</span></div>
      <div class="filters"><button class="btn active" data-filter="all">全部周期</button><button class="btn" data-filter="write">只看写回</button><button class="btn danger" data-filter="bad">只看异常</button></div>
    </section>
    <section class="timeline">
      <div class="panel-title">周期时间轴</div>
      <div class="cycles" id="cycles"></div>
    </section>
    <aside class="inspector">
      <section class="state-matrix"><div class="panel-title">当前周期寄存器快照</div><div class="regs" id="regs"></div></section>
      <section class="diagnosis" id="diagnosis"></section>
      <section class="debug-steps"><h2>课堂定位流程</h2><ol><li>找到第一个异常周期。</li><li>查看 writeback 目的寄存器。</li><li>回到该指令的语义，检查 dstE / dstM 选择。</li></ol></section>
    </aside>
  </main>
</div>
<script>
const rows=[
{cy:1,pc:"0x000",ins:"irmovq $10,%rax",wb:"%rax=10",regs:{rax:"10",rbx:"0",rcx:"0",zf:"0"}},
{cy:2,pc:"0x00a",ins:"irmovq $1,%rbx",wb:"%rbx=1",regs:{rax:"10",rbx:"1",rcx:"0",zf:"0"}},
{cy:3,pc:"0x014",ins:"addq %rbx,%rax",wb:"%rax=11",regs:{rax:"11",rbx:"1",rcx:"0",zf:"0"}},
{cy:4,pc:"0x016",ins:"subq %rbx,%rax",wb:"%rax=10",regs:{rax:"10",rbx:"1",rcx:"0",zf:"0"}},
{cy:5,pc:"0x018",ins:"addq %rbx,%rax",wb:"%rbx=11",bad:true,regs:{rax:"10",rbx:"11",rcx:"0",zf:"0"}},
{cy:6,pc:"0x01a",ins:"halt",wb:"-",regs:{rax:"10",rbx:"11",rcx:"0",zf:"0"}}
];
let cur=4, filter="all";
function render(){
 const visible=rows.filter(r=>filter==="all"||filter==="bad"&&r.bad||filter==="write"&&r.wb!=="-");
 cycles.innerHTML=visible.map(r=>`<div class="cycle ${r.bad?"bad":""} ${rows[cur].cy===r.cy?"active":""}" onclick="cur=${rows.indexOf(r)};render()"><span>cycle ${r.cy}</span><span>${r.pc}</span><b>${r.ins}</b><span>${r.wb}</span></div>`).join("");
 const r=rows[cur], prev=rows[Math.max(0,cur-1)];
 regs.innerHTML=Object.entries(r.regs).map(([k,v])=>`<div class="reg ${prev.regs&&prev.regs[k]!==v?"diff":""}"><b>${k}</b>${v}</div>`).join("");
 diagnosis.innerHTML=r.bad?`第 ${r.cy} 周期出现第一个异常：<b>${r.ins}</b> 的语义应把结果写回 %rax，但 trace 显示写回 <b>%rbx</b>。优先检查 Execute/Writeback 阶段的 dstE 选择逻辑。`:`当前周期没有异常。继续寻找第一个与预期写回不同的位置。`;
 document.querySelectorAll("[data-filter]").forEach(b=>b.classList.toggle("active",b.dataset.filter===filter));
}
document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;render();});
render();
</script>
</body>
</html>
