<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>指令集建模 · 指令编码工作台</title>
<link rel="stylesheet" href="../assets/common.css">
<style>
  .isa-workbench { max-width:1440px; margin:0 auto; padding:18px 22px 42px; }
  .isa-top { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:14px; }
  .isa-top h1 { margin:0; font-size:22px; }
  .isa-top p { margin:2px 0 0; color:var(--text-dim); font-size:12px; }
  .bench { display:grid; grid-template-columns:330px 1fr; grid-template-rows:auto 1fr; gap:14px; margin-top:16px; min-height:calc(100vh - 112px); }
  .program-tape { grid-row:1/3; border:1px solid var(--border); border-radius:18px; background:#0a0f1a; overflow:hidden; display:grid; grid-template-rows:auto 1fr; }
  .panel-title { padding:12px 14px; border-bottom:1px solid var(--border); background:var(--bg-panel-2); color:var(--text-dim); font-size:12px; }
  .program { font-family:var(--mono); padding:10px 0; }
  .inst { padding:9px 14px; border-left:3px solid transparent; cursor:pointer; }
  .inst.active { border-left-color:var(--accent); background:rgba(125,211,252,.13); color:var(--accent); }
  .format-rail { border:1px solid var(--border); border-radius:18px; background:var(--bg-panel); padding:14px; }
  .format { display:grid; grid-template-columns:1fr 1fr 1fr 1fr 2fr; gap:8px; }
  .field { border:1px solid var(--border); border-radius:12px; background:#0a0f1a; padding:12px; min-height:100px; font-family:var(--mono); }
  .field b { display:block; color:var(--text-dim); font-size:11px; margin-bottom:8px; }
  .field span { color:var(--accent); font-size:24px; }
  .field.hot { border-color:var(--warn); }
  .semantic-floor { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .object-view,.microcode { border:1px solid var(--border); border-radius:18px; background:var(--bg-panel); overflow:hidden; }
  .object-view pre { margin:0; padding:14px; min-height:320px; font-family:var(--mono); color:var(--text-dim); line-height:1.7; background:#0a0f1a; }
  .micro-list { padding:14px; display:grid; gap:10px; }
  .uop { display:grid; grid-template-columns:42px 1fr; gap:10px; align-items:start; border:1px solid var(--border); border-radius:12px; background:#0a0f1a; padding:11px; }
  .uop b { color:var(--accent); font-family:var(--mono); }
  .uop span { color:var(--text-dim); line-height:1.65; }
  @media(max-width:1050px){.bench{grid-template-columns:1fr}.program-tape{grid-row:auto}.semantic-floor{grid-template-columns:1fr}.format{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="isa-workbench">
  <header class="isa-top">
    <div><h1>指令集建模 · 指令编码工作台</h1><p>从汇编文本拆出 icode、ifun、寄存器编号、立即数和执行语义</p></div>
    <a class="nav-back" href="../index.html">← 返回目录</a>
  </header>
  <main class="bench">
    <aside class="program-tape">
      <div class="panel-title">Mini ISA 程序</div>
      <div class="program" id="program"></div>
    </aside>
    <section class="format-rail">
      <div class="panel-title" style="margin:-14px -14px 14px;">指令格式字节</div>
      <div class="format" id="format"></div>
    </section>
    <section class="semantic-floor">
      <div class="object-view"><div class="panel-title">模拟器内部 instruction object</div><pre id="objectView"></pre></div>
      <div class="microcode"><div class="panel-title">执行语义</div><div class="micro-list" id="microList"></div></div>
    </section>
  </main>
</div>
<script>
const instr=[
{asm:"irmovq $10, %rax",f:{icode:"3",ifun:"0",ra:"F",rb:"0",imm:"0x000000000000000a"},sem:["取出 8 字节立即数 valC=10","rb=0 表示目的寄存器 %rax","R[%rax] = valC","PC += 10"]},
{asm:"irmovq $1, %rbx",f:{icode:"3",ifun:"0",ra:"F",rb:"3",imm:"0x0000000000000001"},sem:["取出立即数 valC=1","rb=3 表示目的寄存器 %rbx","R[%rbx] = valC","PC += 10"]},
{asm:"addq %rbx, %rax",f:{icode:"6",ifun:"0",ra:"3",rb:"0",imm:""},sem:["valA = R[%rbx]","valB = R[%rax]","valE = valB + valA","R[%rax] = valE; set CC"]},
{asm:"subq %rbx, %rax",f:{icode:"6",ifun:"1",ra:"3",rb:"0",imm:""},sem:["valA = R[%rbx]","valB = R[%rax]","valE = valB - valA","R[%rax] = valE; set CC"]},
{asm:"halt",f:{icode:"0",ifun:"0",ra:"-",rb:"-",imm:""},sem:["stat = HLT","模拟器停止取指"]}
];
let cur=0;
function render(){
 const ins=instr[cur], f=ins.f;
 program.innerHTML=instr.map((x,i)=>`<div class="inst ${i===cur?"active":""}" onclick="cur=${i};render()">${String(i).padStart(2,"0")}  ${x.asm}</div>`).join("");
 format.innerHTML=Object.entries(f).map(([k,v])=>`<div class="field ${v&&v!=="-"?"hot":""}"><b>${k}</b><span>${v||"none"}</span></div>`).join("");
 objectView.textContent=JSON.stringify({pc:cur*10,text:ins.asm,...f,needsRegisterByte:f.ra!=="-",needsImmediate:Boolean(f.imm)},null,2);
 microList.innerHTML=ins.sem.map((s,i)=>`<div class="uop"><b>${i+1}</b><span>${s}</span></div>`).join("");
}
render();
</script>
</body>
</html>
