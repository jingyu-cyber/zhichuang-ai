<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慢查询诊断</title>
<style>
:root{--bg:#1a1e1d;--bg-soft:#25302d;--bg-code:#0d1111;--fg:#e0eee8;--fg-dim:#90a898;--line:#304038;--accent:#40c0b0;--accent-2:#4898e0;--grad:#4898e0;--success:#40c870;--danger:#e05050}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(72,152,224,.18);color:var(--grad)}.badge--tip{background:rgba(64,200,112,.18);color:var(--success)}.badge--warn{background:rgba(224,80,80,.18);color:var(--danger)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.info-line{font-family:"JetBrains Mono",monospace;font-size:15px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-header">
    <div>
      <h1>慢查询诊断</h1>
    </div>
    <div class="breadcrumb">第三章 · 查询优化</div>
  </div>
  <div class="demo-main">
    <div class="panel-explain" id="explainPanel">
      <div class="step-title" id="stepTitle">步骤 1 / 4</div>
      <div class="step-desc" id="stepDesc">执行时间分析</div>
      <div class="info-line" id="infoLine">SELECT s.name, c.course_name, sc.score<br>FROM student s<br>JOIN sc ON s.id = sc.student_id<br>JOIN course c ON sc.course_id = c.id<br>WHERE sc.score > 85<br>ORDER BY sc.score DESC</div>
      <div class="badge-row" id="badgeRow">
        <span class="badge badge--warn">慢查询</span>
        <span class="badge badge--warn">总耗时 8.5s</span>
      </div>
    </div>
    <div class="panel-stage" id="svgp"></div>
  </div>
  <div class="demo-controls">
    <button id="prevBtn" onclick="changeStep(-1)">&larr; 上一步</button>
    <div class="step-dots" id="stepDots"></div>
    <button id="nextBtn" onclick="changeStep(1)">下一步 &rarr;</button>
    <button id="autoBtn" onclick="toggleAuto()">&#9654; 自动播放</button>
  </div>
</div>

<script>
(function(){
var cur=-1,autoTimer=null;

function hBar(x,y,w,h,val,color,opacity){
  var o=opacity||0.7;
  return '<rect x="'+x+'" y="'+y+'" width="'+val+'" height="'+h+'" rx="4" fill="'+color+'" opacity="'+o+'"/>';
}

var S=[
  {
    title:"步骤 1 / 4 — 执行时间分解",
    desc:"这是一条典型的慢查询，涉及 student（10万行）、sc（50万行选课记录）、course（1000行）三表的连接。总耗时 8.5 秒。通过执行时间分解可以定位瓶颈：排序占 3.5s，sc 全表扫描占 2.8s，嵌套循环连接占 1.8s。",
    info:"总执行时间: 8,500 ms<br>student 行数: 100,000<br>sc 行数: 500,000 (瓶颈)<br>course 行数: 1,000",
    badges:[{c:"badge--warn",t:"8.5s"},{c:"badge--warn",t:"50万行扫描"}],
    svg:function(){
      var svg='<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">';
      svg+='<text x="400" y="22" text-anchor="middle" fill="#40c0b0" font-size="14" font-weight="700">慢查询执行时间分布（总计 8,500 ms）</text>';
      svg+='<text x="80" y="65" fill="#90a898" font-size="12">数据读取</text>';
      svg+=hBar(200,52,540,22,80,'#4898e0',0.5);
      svg+='<text x="750" y="68" fill="#4898e0" font-size="11">680ms (8%)</text>';
      svg+='<text x="80" y="105" fill="#90a898" font-size="12">sc 全表扫描</text>';
      svg+=hBar(200,92,540,22,330,'#e05050',0.7);
      svg+='<text x="750" y="108" fill="#e05050" font-size="11">2,800ms (33%)</text>';
      svg+='<text x="80" y="145" fill="#90a898" font-size="12">嵌套循环连接</text>';
      svg+=hBar(200,132,540,22,212,'#e05050',0.6);

      svg+=hBar(200,172,540,22,95,'#4898e0',0.5);

      svg+='<text x="80" y="225" fill="#90a898" font-size="12">ORDER BY 排序</text>';
      svg+=hBar(200,212,540,22,412,'#e05050',0.8);
      svg+='<text x="750" y="228" fill="#e05050" font-size="11">3,500ms (41%)</text>';
      svg+='<rect x="55" y="260" width="690" height="60" rx="8" fill="rgba(224,80,80,0.1)" stroke="rgba(224,80,80,0.3)" stroke-width="1"/>';
      svg+='<text x="400" y="282" text-anchor="middle" fill="#e05050" font-size="13" font-weight="600">两大瓶颈</text>';
      svg+='<text x="400" y="305" text-anchor="middle" fill="#e0eee8" font-size="12">瓶颈 1: 排序 3.5s (41%) — 50万行数据内存排序超 work_mem | 瓶颈 2: sc 全表扫描 2.8s (33%) — 无索引</text>';
      svg+='</svg>';
      return svg;
    }
  },
  {
    title:"步骤 2 / 4 — 缺失索引诊断",
    desc:"sc 表有 50 万行选课记录，但 sc.student_id 和 sc.course_id 上都没有索引。查询执行的是 Seq Scan（全表扫描），需要读取全部 50 万行数据。如果在 sc.student_id 和 sc.course_id 上建立联合索引，查询可改用 Index Scan，只需读取约 500 行相关记录。",
    info:"当前: Seq Scan on sc — 500,000 行<br>建议: CREATE INDEX idx_sc_sid_cid<br>ON sc(student_id, course_id);<br>优化后: Index Scan — ~500 行",
    badges:[{c:"badge--warn",t:"缺失索引"},{c:"badge--tip",t:"建联合索引"}],

      svg+='<text x="200" y="110" text-anchor="middle" fill="#e05050" font-size="11">全部 500,000 行 — 顺序扫描</text>';
      svg+='<text x="200" y="130" text-anchor="middle" fill="#e05050" font-size="11">I/O: ~5,000 页 | 耗时: 2,800 ms</text>';
      svg+='<text x="200" y="152" text-anchor="middle" fill="#90a898" font-size="10">无索引 → 必须全表扫描</text>';
      svg+='<rect x="430" y="40" width="340" height="140" rx="8" fill="rgba(64,200,112,0.08)" stroke="#40c870" stroke-width="1.5"/>';
      svg+='<rect x="460" y="65" width="28" height="22" rx="3" fill="rgba(64,200,112,0.25)" stroke="#40c870" stroke-width="1.5"/>';
      svg+='<text x="474" y="80" text-anchor="middle" fill="#40c870" font-size="10" font-weight="700">Idx</text>';
      svg+='<line x1="474" y1="87" x2="474" y2="100" stroke="#40c870" stroke-width="1.5" stroke-dasharray="3,2"/>';
      svg+='<rect x="457" y="102" width="34" height="14" rx="3" fill="#40c870" opacity="0.6"/>';
      svg+='<text x="474" y="113" text-anchor="middle" fill="#e0eee8" font-size="9">Row</text>';
      svg+='<rect x="500" y="65" width="28" height="22" rx="3" fill="rgba(64,200,112,0.25)" stroke="#40c870" stroke-width="1.5"/>';
      svg+='<text x="514" y="80" text-anchor="middle" fill="#40c870" font-size="10" font-weight="700">Idx</text>';
      svg+='<line x1="514" y1="87" x2="514" y2="100" stroke="#40c870" stroke-width="1.5" stroke-dasharray="3,2"/>';
      svg+='<rect x="497" y="102" width="34" height="14" rx="3" fill="#40c870" opacity="0.6"/>';
      svg+='<text x="514" y="113" text-anchor="middle" fill="#e0eee8" font-size="9">Row</text>';
      svg+='<text x="600" y="100" text-anchor="middle" fill="#40c870" font-size="11">仅读取 500 行相关记录</text>';
      svg+='<text x="600" y="122" text-anchor="middle" fill="#40c870" font-size="11">I/O: ~10 页 | 耗时: 50 ms</text>';
      svg+='<text x="600" y="145" text-anchor="middle" fill="#90a898" font-size="10">联合索引 → 位置定位 + 直接读取</text>';
      svg+='<rect x="200" y="200" width="400" height="36" rx="8" fill="rgba(64,200,112,0.1)" stroke="#40c870" stroke-width="1"/>';
      svg+='<text x="400" y="223" text-anchor="middle" fill="#40c870" font-size="13" font-weight="600">索引优化效果: 2,800ms → 50ms (56x 提升)</text>';
      svg+='<rect x="50" y="255" width="700" height="68" rx="8" fill="rgba(72,152,224,0.08)" stroke="#4898e0" stroke-width="1"/>';
      svg+='<text x="400" y="280" text-anchor="middle" fill="#4898e0" font-size="12" font-weight="600">诊断方法: EXPLAIN 输出中的 Seq Scan 提示需要建索引</text>';
      svg+='<text x="400" y="300" text-anchor="middle" fill="#e0eee8" font-size="11">规则: 连接列 (JOIN ON) 和过滤列 (WHERE) 必须建索引 — 这是最常见的慢查询原因</text>';
      svg+='<text x="400" y="317" text-anchor="middle" fill="#90a898" font-size="11">slow_query_log + EXPLAIN + pt-query-digest 是最有效的诊断工具链</text>';
      svg+='</svg>';
      return svg;
    }
  },
  {
    title:"步骤 3 / 4 — 连接顺序问题",
    desc:"当前执行计划选择了 Nested Loop Join：以小表 course（1K行）为驱动表，对每行全表扫描 sc（500K行），产生 1000 x 500K = 5 亿次比较。正确做法是使用 Hash Join：先在 sc 上建哈希表（按 sc.course_id），然后用 course 的每一行做 O(1) 哈希查找。",
    info:"当前: Nested Loop<br>course(1K) × sc(500K) = 5亿次比较<br><br>优化: Hash Join<br>Build Hash(sc, 500K) + Probe(course, 1K)<br>≈ 501K 次操作",
    badges:[{c:"badge--warn",t:"Nested Loop"},{c:"badge--tip",t:"Hash Join 建议"}],
    svg:function(){
      var svg='<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">';
      svg+='<text x="180" y="22" text-anchor="middle" fill="#e05050" font-size="14" font-weight="700">Nested Loop Join</text>';
      svg+='<text x="620" y="22" text-anchor="middle" fill="#40c870" font-size="14" font-weight="700">Hash Join</text>';
      svg+='<rect x="30" y="38" width="300" height="120" rx="8" fill="rgba(224,80,80,0.08)" stroke="#e05050" stroke-width="1.5"/>';
      svg+='<circle cx="80" cy="70" r="20" fill="none" stroke="#e05050" stroke-width="1.5"/><text x="80" y="75" text-anchor="middle" fill="#e05050" font-size="10">course</text>';
      svg+='<circle cx="80" cy="70" r="28" fill="none" stroke="#e05050" stroke-width="0.5" stroke-dasharray="3,3"/><text x="80" y="105" fill="#e05050" font-size="9">1K rows</text>';
      svg+='<text x="140" y="75" fill="#e05050" font-size="22" font-weight="700">x</text>';
      svg+='<circle cx="200" cy="70" r="20" fill="none" stroke="#e05050" stroke-width="1.5"/><text x="200" y="75" text-anchor="middle" fill="#e05050" font-size="10">sc</text>';
      svg+='<circle cx="200" cy="70" r="35" fill="none" stroke="#e05050" stroke-width="1" stroke-dasharray="4,3"/><text x="200" y="115" fill="#e05050" font-size="9">500K rows</text>';
      svg+='<text x="180" y="145" text-anchor="middle" fill="#e05050" font-size="11">= 500,000,000 次比较</text>';
      svg+='<rect x="410" y="38" width="360" height="120" rx="8" fill="rgba(64,200,112,0.08)" stroke="#40c870" stroke-width="1.5"/>';
      svg+='<rect x="430" y="55" width="140" height="38" rx="6" fill="rgba(64,200,112,0.12)" stroke="#40c870" stroke-width="1"/>';
      svg+='<text x="500" y="70" text-anchor="middle" fill="#40c870" font-size="11">Build Hash</text>';
      svg+='<text x="500" y="86" text-anchor="middle" fill="#90a898" font-size="10">sc(course_id)</text>';
      svg+='<text x="590" y="55" fill="#40c870" font-size="20" font-weight="700">+</text>';
      svg+='<rect x="610" y="55" width="140" height="38" rx="6" fill="rgba(64,200,112,0.12)" stroke="#40c870" stroke-width="1"/>';
      svg+='<text x="680" y="70" text-anchor="middle" fill="#40c870" font-size="11">Probe Hash</text>';
      svg+='<text x="680" y="86" text-anchor="middle" fill="#90a898" font-size="10">course O(1)</text>';
      svg+='<text x="590" y="130" text-anchor="middle" fill="#40c870" font-size="11">= ~501,000 次操作</text>';
      svg+='<rect x="200" y="175" width="400" height="36" rx="8" fill="rgba(64,200,112,0.1)" stroke="#40c870" stroke-width="1"/>';
      svg+='<text x="400" y="198" text-anchor="middle" fill="#40c870" font-size="13" font-weight="600">Join 优化效果: 500M → 501K (约 1,000x 减少)</text>';
      svg+='<rect x="50" y="230" width="700" height="95" rx="8" fill="rgba(72,152,224,0.08)" stroke="#4898e0" stroke-width="1"/>';
      svg+='<text x="400" y="252" text-anchor="middle" fill="#4898e0" font-size="12" font-weight="600">Hash Join 工作原理</text>';
      svg+='<text x="400" y="272" text-anchor="middle" fill="#e0eee8" font-size="11">1. 选择较小的表构建内存哈希表（Build Phase），以连接列为哈希键</text>';
      svg+='<text x="400" y="290" text-anchor="middle" fill="#e0eee8" font-size="11">2. 扫描较大的表，对每行用哈希键查找匹配（Probe Phase），O(1) 时间复杂度</text>';
      svg+='<text x="400" y="310" text-anchor="middle" fill="#90a898" font-size="11">前提: 哈希表能放入 work_mem（默认 4MB），否则降级为分批 Hash Join</text>';
      svg+='</svg>';
      return svg;
    }
  },
  {

    desc:"完整的优化方案三管齐下：① 在 sc.student_id 和 sc.course_id 上建联合索引；② 使用 Hash Join 替代 Nested Loop；③ 调整 work_mem 使排序在内存完成。最终执行时间从 8,500ms 降至 120ms，提升 70 倍。",
    info:"优化前: 8,500 ms<br>优化后: 120 ms<br>提升: 70.8x<br>核心优化: 索引 + Hash Join + work_mem",
    badges:[{c:"badge--tip",t:"70.8x 提升"},{c:"badge--tip",t:"三管齐下"}],
    svg:function(){
      var svg='<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">';
      svg+='<text x="155" y="25" text-anchor="middle" fill="#e05050" font-size="15" font-weight="700">优化前</text>';
      svg+='<text x="645" y="25" text-anchor="middle" fill="#40c870" font-size="15" font-weight="700">优化后</text>';
      svg+='<rect x="25" y="38" width="260" height="155" rx="10" fill="rgba(224,80,80,0.08)" stroke="#e05050" stroke-width="1.5"/>';
      svg+='<text x="60" y="62" fill="#e0eee8" font-size="12">数据读取</text>';
      svg+=hBar(155,50,120,16,30,'#e05050',0.5);

      svg+=hBar(155,102,120,16,80,'#e05050',0.6);

      svg+=hBar(155,128,120,16,155,'#e05050',0.7);
      svg+='<text x="285" y="141" fill="#e05050" font-size="10">3.50s</text>';
      svg+='<text x="155" y="178" text-anchor="middle" fill="#e05050" font-size="18" font-weight="700">8,500 ms</text>';
      svg+='<rect x="515" y="38" width="260" height="155" rx="10" fill="rgba(64,200,112,0.08)" stroke="#40c870" stroke-width="1.5"/>';
      svg+='<text x="550" y="62" fill="#e0eee8" font-size="12">数据读取</text>';

      svg+='<text x="550" y="88" fill="#e0eee8" font-size="12">Index Scan</text>';
      svg+=hBar(645,76,120,16,14,'#40c870',0.7);
      svg+='<text x="775" y="89" fill="#40c870" font-size="10">50ms</text>';
      svg+='<text x="550" y="114" fill="#e0eee8" font-size="12">Hash Join</text>';
      svg+=hBar(645,102,120,16,8,'#40c870',0.6);
      svg+='<text x="775" y="115" fill="#40c870" font-size="10">25ms</text>';
      svg+='<text x="550" y="140" fill="#e0eee8" font-size="12">内存排序</text>';
      svg+=hBar(645,128,120,16,12,'#40c870',0.7);
      svg+='<text x="775" y="141" fill="#40c870" font-size="10">30ms</text>';
      svg+='<text x="645" y="178" text-anchor="middle" fill="#40c870" font-size="18" font-weight="700">120 ms</text>';
      svg+='<rect x="305" y="55" width="190" height="36" rx="8" fill="rgba(64,200,112,0.12)" stroke="#40c870" stroke-width="1.5"/>';
      svg+='<text x="400" y="77" text-anchor="middle" fill="#40c870" font-size="14" font-weight="700">70.8x 加速</text>';
      svg+='<polygon points="295,73 305,68 305,78" fill="#40c870"/><polygon points="505,73 495,68 495,78" fill="#40c870"/>';
      svg+='<rect x="50" y="215" width="700" height="110" rx="10" fill="rgba(64,192,176,0.08)" stroke="#40c0b0" stroke-width="1"/>';
      svg+='<text x="400" y="240" text-anchor="middle" fill="#40c0b0" font-size="14" font-weight="700">慢查询诊断与优化清单</text>';
      svg+='<circle cx="80" cy="268" r="5" fill="#40c0b0"/><text x="95" y="273" fill="#e0eee8" font-size="12">EXPLAIN 查看执行计划 — 是否出现 Seq Scan / Nested Loop</text>';
      svg+='<circle cx="80" cy="293" r="5" fill="#40c0b0"/><text x="95" y="298" fill="#e0eee8" font-size="12">连接列和过滤列建索引 — WHERE / JOIN ON 列优先</text>';
      svg+='<circle cx="380" cy="268" r="5" fill="#40c0b0"/><text x="395" y="273" fill="#e0eee8" font-size="12">使用 Hash Join 替代 Nested Loop — 大表连接场景</text>';
      svg+='<circle cx="380" cy="293" r="5" fill="#40c0b0"/><text x="395" y="298" fill="#e0eee8" font-size="12">调整 work_mem — 内存充足时让排序/哈希在内存完成</text>';
      svg+='<circle cx="600" cy="268" r="5" fill="#40c0b0"/><text x="615" y="273" fill="#e0eee8" font-size="12">开启 slow_query_log — 持续监控慢查询</text>';
      svg+='</svg>';
      return svg;
    }
  }
];

function render(i){
  var s=S[i];
  document.getElementById('stepTitle').textContent=s.title;
  document.getElementById('stepDesc').textContent=s.desc;
  document.getElementById('infoLine').innerHTML=s.info;
  var br=document.getElementById('badgeRow');br.innerHTML='';
  for(var j=0;j<s.badges.length;j++){var b=s.badges[j];var sp=document.createElement('span');sp.className='badge '+b.c;sp.textContent=b.t;br.appendChild(sp);}
  document.getElementById('svgp').innerHTML=s.svg();
  var dots=document.getElementById('stepDots');dots.innerHTML='';
  for(var k=0;k<S.length;k++){var d=document.createElement('span');d.className='step-dot'+(k===i?' active':(k<i?' done':''));dots.appendChild(d);}
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===S.length-1;
  cur=i;
}
function changeStep(d){var n=cur+d;if(n>=0&&n<S.length){if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('autoBtn').innerHTML='&#9654; 自动播放';}render(n);}}
function resetStep(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('autoBtn').innerHTML='&#9654; 自动播放';}render(0);}
function toggleAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('autoBtn').innerHTML='&#9654; 自动播放';}else{document.getElementById('autoBtn').innerHTML='&#9646;&#9646; 停止';autoTimer=setInterval(function(){if(cur<S.length-1)render(cur+1);else{toggleAuto();}},4000);}}
document.addEventListener('keydown',function(e){if(e.key==='ArrowLeft'){e.preventDefault();changeStep(-1);}else if(e.key==='ArrowRight'){e.preventDefault();changeStep(1);}else if(e.key===' '){e.preventDefault();toggleAuto();}else if(e.key==='r'||e.key==='R'){e.preventDefault();resetStep();}});
render(0);
})();
</script>
</body>
</html>
