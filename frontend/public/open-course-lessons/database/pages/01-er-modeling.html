<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>实体-联系建模 (ER Modeling)</title><style>:root{--bg:#1a1e1d;--bg-soft:#25302d;--bg-code:#0d1111;--fg:#e0eee8;--fg-dim:#90a898;--line:#304038;--accent:#40c0b0;--accent-2:#4898e0;--grad:#4898e0;--success:#40c870;--danger:#e05050}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(72,152,224,.18);color:var(--grad)}.badge--tip{background:rgba(64,200,112,.18);color:var(--success)}.badge--warn{background:rgba(224,80,80,.18);color:var(--danger)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.info-line{font-family:"JetBrains Mono",monospace;font-size:15px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls <div class="demo-shell">
<div class="demo-header"><div><h1>实体-联系建模 (ER Modeling)</h1><div class="breadcrumb"><a href="../index.html">数据库系统概论</a> / 第一章 · 数据建模 / 实体-联系建模</div></div><span class="badge" style="border:1px solid var(--line)">4 个步骤</span></div>

</div>

</div>
</div>
<script>
function er0(sv){
  while(sv.firstChild)sv.firstChild.remove();
  // Background grid
  for(let i=0;i<800;i+=40){let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',i);l.setAttribute('y1',0);l.setAttribute('x2',i);l.setAttribute('y2',340);l.setAttribute('stroke','#1a2824');l.setAttribute('stroke-width','0.5');sv.appendChild(l);}
  for(let j=0;j<340;j+=40){let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',0);l.setAttribute('y1',j);l.setAttribute('x2',800);l.setAttribute('y2',j);l.setAttribute('stroke','#1a2824');l.setAttribute('stroke-width','0.5');sv.appendChild(l);}
  // Scenario text box
  let r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',20);r.setAttribute('y',10);r.setAttribute('width',760);r.setAttribute('height',100);
  r.setAttribute('rx',10);r.setAttribute('fill','#1a2824');r.setAttribute('stroke','var(--line)');r.setAttribute('stroke-width',1.5);
  sv.appendChild(r);
  // Title
  let t1=document.createElementNS('http://www.w3.org/2000/svg','text');
  t1.setAttribute('x',40);t1.setAttribute('y',38);t1.setAttribute('fill','#e0eee8');t1.setAttribute('font-size',15);t1.setAttribute('font-weight','bold');
  t1.textContent='场景描述：学生选课管理系统';
  sv.appendChild(t1);
  // Scenario text
  let lines=['某大学有多个<学院>，每个<学院>有多名<教师>和<学生>。',
             '<教师>教授<课程>，<学生>选修<课程>。',
             '每位<教师>可教多门课，每门课有多位<教师>教授。',
             '每个<学生>可选多门课，每门课可被多名<学生>选修。'];
  lines.forEach((line,i)=>{
    let parts=line.split(/(<[^>]+>)/g);
    let x=40;
    parts.forEach(part=>{
      let isEntity=part.startsWith('<')&&part.endsWith('>');
      let txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',x);txt.setAttribute('y',62+i*18);
      txt.setAttribute('font-size',13);
      if(isEntity){
        let word=part.slice(1,-1);
        txt.setAttribute('fill','#40c0b0');
        txt.setAttribute('font-weight','bold');
        txt.textContent=word;
        // Underline entity words
        let ul=document.createElementNS('http://www.w3.org/2000/svg','line');
        ul.setAttribute('x1',x);ul.setAttribute('y1',67+i*18);
        ul.setAttribute('x2',x+word.length*13);ul.setAttribute('y2',67+i*18);
        ul.setAttribute('stroke','#40c0b0');ul.setAttribute('stroke-width',1.5);
        ul.setAttribute('stroke-dasharray','3,3');
        sv.appendChild(ul);
      }else{
        txt.setAttribute('fill','#90a898');
        txt.textContent=part;
      }
      sv.appendChild(txt);
      x+=txt.getComputedTextLength?txt.getComputedTextLength():part.length*13;
    });
  });
  // Legend
  let lgx=40,lgy=125;
  let lr=document.createElementNS('http://www.w3.org/2000/svg','rect');
  lr.setAttribute('x',lgx-10);lr.setAttribute('y',lgy-5);lr.setAttribute('width',700);lr.setAttribute('height',40);
  lr.setAttribute('rx',8);lr.setAttribute('fill','#0d1111');lr.setAttribute('stroke','var(--line)');lr.setAttribute('stroke-width',1);
  sv.appendChild(lr);
  let lt=document.createElementNS('http://www.w3.org/2000/svg','text');
  lt.setAttribute('x',lgx);lt.setAttribute('y',lgy+14);lt.setAttribute('fill','#90a898');lt.setAttribute('font-size',13);
  lt.textContent='图例：';
  sv.appendChild(lt);
  // Entity legend box
  let eb=document.createElementNS('http://www.w3.org/2000/svg','rect');
  eb.setAttribute('x',lgx+50);eb.setAttribute('y',lgy+2);eb.setAttribute('width',50);eb.setAttribute('height',22);
  eb.setAttribute('rx',4);eb.setAttribute('fill','none');eb.setAttribute('stroke','#40c0b0');eb.setAttribute('stroke-width',2);
  sv.appendChild(eb);
  let elb=document.createElementNS('http://www.w3.org/2000/svg','text');
  elb.setAttribute('x',lgx+110);elb.setAttribute('y',lgy+19);elb.setAttribute('fill','#40c0b0');elb.setAttribute('font-size',12);
  elb.textContent='实体 (Entity)';
  sv.appendChild(elb);
  // Relationship legend box
  let rb=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  rb.setAttribute('points','240,113 260,124 240,135 220,124');
  rb.setAttribute('fill','none');rb.setAttribute('stroke','#4898e0');rb.setAttribute('stroke-width',2);
  sv.appendChild(rb);
  let rlb=document.createElementNS('http://www.w3.org/2000/svg','text');
  rlb.setAttribute('x',270);rlb.setAttribute('y',lgy+19);rlb.setAttribute('fill','#4898e0');rlb.setAttribute('font-size',12);
  rlb.textContent='联系 (Relationship)';
  sv.appendChild(rlb);
  // Attribute legend
  let ab=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
  ab.setAttribute('cx',455);ab.setAttribute('cy',124);ab.setAttribute('rx',22);ab.setAttribute('ry',12);
  ab.setAttribute('fill','none');ab.setAttribute('stroke','#e0eee8');ab.setAttribute('stroke-width',1.5);
  sv.appendChild(ab);
  let alb=document.createElementNS('http://www.w3.org/2000/svg','text');
  alb.setAttribute('x',485);alb.setAttribute('y',lgy+19);alb.setAttribute('fill','#e0eee8');alb.setAttribute('font-size',12);
  alb.textContent='属性 (Attribute)';
  sv.appendChild(alb);
  // Step hint arrow area
  let hint=document.createElementNS('http://www.w3.org/2000/svg','text');
  hint.setAttribute('x',400);hint.setAttribute('y',310);hint.setAttribute('fill','#4898e0');hint.setAttribute('font-size',14);
  hint.setAttribute('text-anchor','middle');
  hint.textContent='从业务描述中识别实体、属性和联系 —— 这是 ER 建模的第一步';
  sv.appendChild(hint);
  // Subtle arrow
  let arr=document.createElementNS('http://www.w3.org/2000/svg','text');
  arr.setAttribute('x',400);arr.setAttribute('y',330);arr.setAttribute('fill','#40c0b0');arr.setAttribute('font-size',20);
  arr.setAttribute('text-anchor','middle');
  arr.textContent='↓↓↓ 点击"下一步"查看 ER 图绘制 ↓↓↓';
  sv.appendChild(arr);
}

function er1(sv){
  while(sv.firstChild)sv.firstChild.remove();
  // Grid
  for(let i=0;i<800;i+=40){let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',i);l.setAttribute('y1',0);l.setAttribute('x2',i);l.setAttribute('y2',340);l.setAttribute('stroke','#1a2824');l.setAttribute('stroke-width',0.5);sv.appendChild(l);}
  for(let j=0;j<340;j+=40){let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',0);l.setAttribute('y1',j);l.setAttribute('x2',800);l.setAttribute('y2',j);l.setAttribute('stroke','#1a2824');l.setAttribute('stroke-width',0.5);sv.appendChild(l);}
  function entity(cx,cy,w,h,label,attrs){
    let r=document.createElementNS('http://www.w3.org/2000/svg','rect');

    r.setAttribute('rx',8);r.setAttribute('fill','rgba(64,192,176,0.12)');r.setAttribute('stroke','#40c0b0');r.setAttribute('stroke-width',2.5);
    sv.appendChild(r);
    // Title bar
    let tb=document.createElementNS('http://www.w3.org/2000/svg','rect');
    tb.setAttribute('x',cx-w/2);tb.setAttribute('y',cy-h/2);tb.setAttribute('width',w);tb.setAttribute('height',26);
    tb.setAttribute('rx',8);tb.setAttribute('fill','rgba(64,192,176,0.25)');
    sv.appendChild(tb);
    let bl=document.createElementNS('http://www.w3.org/2000/svg','rect');
    bl.setAttribute('x',cx-w/2);bl.setAttribute('y',cy-h/2+26);bl.setAttribute('width',w);bl.setAttribute('height',h-26);
    bl.setAttribute('fill','rgba(64,192,176,0.12)');
    sv.appendChild(bl);
    let t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx);t.setAttribute('y',cy-h/2+18);t.setAttribute('fill','#40c0b0');t.setAttribute('font-size',13);
    t.setAttribute('font-weight','bold');t.setAttribute('text-anchor','middle');
    t.textContent=label;sv.appendChild(t);
    if(attrs){
      attrs.forEach((a,i)=>{
        let at=document.createElementNS('http://www.w3.org/2000/svg','text');
        at.setAttribute('x',cx);at.setAttribute('y',cy-h/2+44+i*18);at.setAttribute('fill','#e0eee8');
        at.setAttribute('font-size',11);at.setAttribute('text-anchor','middle');
        at.textContent='• '+a;sv.appendChild(at);
      });
    }
  }
  function diamond(cx,cy,sz,label){
    let p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points',(cx)+','+(cy-sz)+' '+(cx+sz*0.7)+','+cy+' '+cx+','+(cy+sz)+' '+(cx-sz*0.7)+','+cy);
    p.setAttribute('fill','rgba(72,152,224,0.12)');p.setAttribute('stroke','#4898e0');p.setAttribute('stroke-width',2);
    sv.appendChild(p);
    let t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx);t.setAttribute('y',cy+5);t.setAttribute('fill','#4898e0');
    t.setAttribute('font-size',12);t.setAttribute('font-weight','bold');t.setAttribute('text-anchor','middle');
    t.textContent=label;sv.appendChild(t);
  }
  function line(x1,y1,x2,y2){
    let l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke','#90a898');l.setAttribute('stroke-width',1.5);
    sv.appendChild(l);
  }
  // Entities
  entity(130,120,100,105,'学生',['学号','姓名','年龄']);
  entity(400,70,100,105,'教师',['工号','姓名','职称']);
  entity(670,120,100,85,'课程',['课号','课名','学分']);
  entity(400,220,100,85,'学院',['院号','院名']);
  // Relationships
  diamond(265,120,28,'属于');
  diamond(400,147,28,'教授');
  diamond(535,120,28,'选修');
  diamond(400,180,28,'属于');
  // Lines
  line(180,120,237,120);
  line(310,70,372,70);
  line(310,170,372,170);
  line(428,147,468,120);
  line(510,120,550,120);
  line(563,120,620,120);
  line(350,120,372,120);
  line(428,180,468,220);
  // Title
  let tl=document.createElementNS('http://www.w3.org/2000/svg','text');
  tl.setAttribute('x',400);tl.setAttribute('y',305);tl.setAttribute('fill','#4898e0');
  tl.setAttribute('font-size',13);tl.setAttribute('text-anchor','middle');
  tl.textContent='矩形 = 实体 | 菱形 = 联系 | 连线表示关联';
  sv.appendChild(tl);
  // Step number
  let sn=document.createElementNS('http://www.w3.org/2000/svg','text');
  sn.setAttribute('x',400);sn.setAttribute('y',328);sn.setAttribute('fill','#40c0b0');
  sn.setAttribute('font-size',18);sn.setAttribute('text-anchor','middle');
  sn.textContent='↓↓↓ 还需标注基数约束 (Cardinality) ↓↓↓';
  sv.appendChild(sn);
}

  }
  function diamond(cx,cy,sz,label){
    let p=document.createElementNS('http://www.w3.org/2000/svg','polygon');

  }
  function line(x1,y1,x2,y2,label,color,offsetY){

function er3(sv){
  while(sv.firstChild)sv.firstChild.remove();
  for(let i=0;i<800;i+=40){let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',i);l.setAttribute('y1',0);l.setAttribute('x2',i);l.setAttribute('y2',340);l.setAttribute('stroke','#1a2824');l.setAttribute('stroke-width',0.5);sv.appendChild(l);}

const S=[
  {t:'场景分析 - 识别实体',l:'从自然语言描述中提取实体和联系',d:'<p>在数据库设计中，我们首先从<span style="color:var(--accent);font-weight:700">业务需求描述</span>中识别关键概念。</p><p>步骤：</p><p><span style="color:var(--accent)">1.</span> 找出名词 → <span style="color:var(--accent)">实体</span></p><p><span style="color:var(--accent-2)">2.</span> 找出动词 → <span style="color:var(--accent-2)">联系</span></p><p><span style="color:var(--fg)">3.</span> 修饰词 → <span style="color:var(--fg)">属性</span></p><p style="margin-top:8px;color:var(--fg-dim);font-size:12px">提示：右侧图中用下划线标示了已识别的实体</p>',b:[{t:'概念',c:'def'},{t:'分析',c:'tip'}],r:er0},
  {t:'绘制 ER 图 - 实体与联系',l:'实体(矩形) — 联系(菱形) — 属性(椭圆)',d:'<p>将上一步识别的元素用<span style="color:var(--accent)">标准 ER 符号</span>绘制：</p><p><span style="display:inline-block;width:12px;height:12px;background:var(--accent);border-radius:2px;margin-right:6px"></span> <span style="color:var(--accent)">矩形</span> = 实体（学生、教师、课程、学院）</p><p><span style="display:inline-block;width:12px;height:12px;background:var(--accent-2);margin-right:6px;transform:rotate(45deg)"></span> <span style="color:var(--accent-2)">菱形</span> = 联系（属于、教授、选修）</p><p style="color:var(--fg-dim);font-size:12px">椭圆虚线 = 属性（置于实体旁）</p>',b:[{t:'ER图',c:'def'},{t:'可视化',c:'tip'}],r:er1},
  {t:'标注基数约束',l:'1:1, 1:N, M:N — 定义实体间的数量关系',d:'<p>基数约束定义了<span style="color:var(--accent)">实体间参与联系的数量关系</span>：</p><p><span style="color:var(--accent)">学生 属于 学院</span> = <b>N:1</b>（多对一）</p><p><span style="color:var(--accent)">教师 教授 课程</span> = <b>M:N</b>（多对多）</p><p><span style="color:var(--accent)">学生 选修 课程</span> = <b>M:N</b>（多对多）</p><p style="color:var(--fg-dim);font-size:12px">M:N 关系在转换时需要额外的中间表</p>',b:[{t:'基数约束',c:'def'},{t:'M:N',c:'warn'},{t:'1:N',c:'tip'}],r:er2},

let step=0,timer=null;
const dotsEl=document.getElementById('dots'),svEl=document.getElementById('stage');
svEl.innerHTML='<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"></svg>';
const sv=svEl.querySelector('svg');
for(let i=0;i<S.length;i++){let d=document.createElement('div');d.className='step-dot';d.onclick=()=>go(i);dotsEl.appendChild(d);}
function render(){const s=S[step];document.getElementById('stepTitle').textContent=s.t;document.getElementById('infoLine').textContent=s.l;document.getElementById('stepDesc').innerHTML=s.d;let bd=document.getElementById('badges');bd.innerHTML='';s.b.forEach(b=>{let sp=document.createElement('span');sp.className='badge badge--'+b.c;sp.textContent=b.t;bd.appendChild(sp);});s.r(sv);document.querySelectorAll('.step-dot').forEach((d,i)=>{d.className='step-dot'+(i===step?' active':i<step?' done':'');});document.getElementById('btnPrev').disabled=step===0;document.getElementById('btnNext').disabled=step===S.length-1;}
function go(n){step=Math.max(0,Math.min(n,S.length-1));render();}function changeStep(d){go(step+d);}function resetStep(){stop();go(0);}function toggleAuto(){timer?stop():start();}
function start(){timer=setInterval(()=>{if(step<S.length-1)go(step+1);else stop();},1600);document.getElementById('btnAuto').textContent='⏸';}
function stop(){clearInterval(timer);timer=null;document.getElementById('btnAuto').textContent='▶';}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')changeStep(-1);if(e.key==='ArrowRight')changeStep(1);if(e.key===' ')e.preventDefault(),toggleAuto();if(e.key==='r'||e.key==='R')resetStep();});render();
</script></body></html>
