<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAL 日志与恢复 — 数据库系统概论</title>
<style>
:root{--bg:#1a1e1d;--bg-soft:#25302d;--bg-code:#0d1111;--fg:#e0eee8;--fg-dim:#90a898;--line:#304038;--accent:#40c0b0;--accent-2:#4898e0;--grad:#4898e0;--success:#40c870;--danger:#e05050}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(72,152,224,.18);color:var(--grad)}.badge--tip{background:rgba(64,200,112,.18);color:var(--success)}.badge--warn{background:rgba(224,80,80,.18);color:var(--danger)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.info-line{font-family:"JetBrains Mono",monospace;font-size:15px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-header">
    <div>
      <h1>WAL 日志与恢复</h1>
      <div class="breadcrumb"><a href="#">第四章</a> · 事务与应用开发</div>
    </div>
    <div class="badge-row">
      <span class="badge badge--def">WAL</span>
      <span class="badge badge--warn">Crash</span>
      <span class="badge badge--tip">REDO</span>
      <span class="badge badge--warn">UNDO</span>
    </div>
  </div>
  <div class="demo-main">
    <div class="panel-explain" id="explain">
      <div class="step-title" id="stepTitle">WAL 日志记录</div>
      <div class="step-desc" id="stepDesc">
        WAL（Write-Ahead Log）在数据修改前先写入日志。每个日志条目有唯一的 LSN（Log Sequence Number），记录操作类型、前镜像（Before Image）和后镜像（After Image）。LSN 1-10 分布在时间线上。
      </div>
      <div class="badge-row" id="badges">
        <span class="badge badge--def">LSN 1-10</span>
      </div>
      <div class="info-line" id="infoLine">WAL: 先写日志，后写数据页 — Write-Ahead Logging</div>
    </div>
    <div class="panel-stage" id="stage">
      <svg id="svg" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  <div class="demo-controls">
    <button id="prevBtn" onclick="S.changeStep(-1)">上一步</button>
    <div class="step-dots" id="dots"></div>
    <button id="nextBtn" onclick="S.changeStep(1)">下一步</button>
    <button id="autoBtn" onclick="S.toggleAuto()">自动播放</button>
    <button id="resetBtn" onclick="S.resetStep()">重置</button>
  </div>
</div>
<script>
const $=s=>document.querySelector(s);
const NS='http://www.w3.org/2000/svg';
const E=(t,a={})=>{const e=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;};
const T=(x,y,t,c='var(--fg-dim)',s=11,ta='middle',ff='PingFang SC,Microsoft YaHei,sans-serif')=>{const e=E('text',{x,y,fill:c,'font-size':s,'text-anchor':ta,'font-family':ff});e.textContent=t;return e;};
const L=(x1,y1,x2,y2,c='var(--line)',w=1,dash='')=>E('line',{x1,y1,x2,y2,stroke:c,'stroke-width':w,'stroke-dasharray':dash||'none'});
const R=(x,y,w,h,rx=4,c='var(--bg-soft)',sw=1,sc='var(--line)')=>E('rect',{x,y,width:w,height:h,rx,fill:c,stroke:sc,'stroke-width':sw});
const ARROW=(x1,y,x2,color='var(--line)')=>{const e=E('path',{d:`M${x1},${y} L${x2-10},${y} L${x2-18},${y-6} M${x2-10},${y} L${x2-18},${y+6}`,fill:'none',stroke:color,'stroke-width':2});return e;};
const DANGER='#e05050', SUCCESS='#40c870', ACCENT='#40c0b0', ACC2='#4898e0', FGDIM='#90a898', FG='#e0eee8', BGCODE='#0d1111', BGS='#25302d', LINE='#304038';
const WARN='#f0a030';

function clearSvg(svg){while(svg.firstChild)svg.removeChild(svg.firstChild);}

// Draw a WAL entry box
function drawWALEntry(x,y,w,lsn,op,before,after,color,rx){
  const g=E('g',{});
  g.appendChild(R(x,y,w,65,rx||4,color||BGS,1.5,LINE));
  g.appendChild(T(x+w/2,y+14,'LSN '+lsn,ACC2,11,'bold'));
  g.appendChild(T(x+w/2,y+30,op,ACCENT,12,'bold'));
  g.appendChild(T(x+w/2,y+46,'← '+before,FGDIM,9));
  g.appendChild(T(x+w/2,y+59,'→ '+after,FGDIM,9));
  return g;
}

// ── data ──
const S={
  step:0, total:4, autoId:null,
  titles:[
    'WAL 日志记录',
    '系统崩溃',
    'REDO 阶段',
    'UNDO 阶段'
  ],
  descs:[
    'WAL（Write-Ahead Log）在数据修改前先写入日志。每个日志条目有唯一的 LSN（Log Sequence Number），记录操作类型（INSERT/UPDATE/DELETE）以及前镜像和后镜像。LSN 1-10 按时间顺序排列在 WAL 文件中。',
    '系统在 LSN 7 时刻崩溃（掉电/进程异常）。此时最近一次检查点（Checkpoint）在 LSN 4。数据页状态停留在检查点时刻，LSN 5-7 的修改虽然在 WAL 中记录了，但尚未刷入数据页。',
    'REDO 阶段从检查点（LSN 4）开始，将 WAL 中 LSN 5-10 的所有已提交事务操作重新应用到数据页。每个日志条目按 LSN 顺序执行，pageLSN 逐次推进，确保持久化所有已提交修改。',
    'UNDO 阶段扫描 WAL 反向查找未提交事务（T2 在崩溃时未提交），从后往前逐个回滚其修改。撤销操作的逆操作写入 Compensation Log Record (CLR)，最终数据达到一致性状态。'
  ],
  badges:[
    ['LSN 1-10 时间线','def'],
    ['Crash @ LSN 7','warn'],
    ['重放 LSN 5-10','tip'],
    ['回滚未提交事务','warn']
  ],
  infoLines:[
    'WAL: LSN 1→10, Checkpoint @ LSN 4, 已提交: T1, 未提交: T2',
    '崩溃 @ LSN 7 | 数据页状态 = 检查点 LSN 4 | WAL 完整保留',
    'REDO: 从 LSN 5→10 重放所有操作, pageLSN 逐个推进',
    'UNDO: 反向回滚 T2 (未提交), 最终一致性状态'
  ],
  render(svg){
    clearSvg(svg);
    switch(this.step){
      case 0: this.r0(svg); break;
      case 1: this.r1(svg); break;
      case 2: this.r2(svg); break;
      case 3: this.r3(svg); break;
    }
  },
  r0(svg){
    // ── WAL Entries Timeline ──
    svg.appendChild(R(20,10,760,320,10,BGCODE,1.5,LINE));
    svg.appendChild(T(400,32,'WAL 日志记录 — LSN 时间线',ACCENT,16));

    // Timeline axis
    svg.appendChild(L(40,55,760,55,LINE,2));
    svg.appendChild(T(400,50,'时间 →',FGDIM,10));

    // WAL entries
    const entries=[
      {lsn:1,op:'INSERT',before:'-',after:'A=100',color:'rgba(64,200,112,.12)'},
      {lsn:2,op:'UPDATE',before:'A=100',after:'A=200',color:'rgba(72,152,224,.12)'},
      {lsn:3,op:'INSERT',before:'-',after:'B=50',color:'rgba(64,200,112,.12)'},
      {lsn:4,op:'CKPT',before:'T1,T2',after:'-',color:'rgba(240,160,48,.15)'},
      {lsn:5,op:'UPDATE',before:'B=50',after:'B=80',color:'rgba(72,152,224,.12)'},
      {lsn:6,op:'DELETE',before:'C=30',after:'-',color:'rgba(224,80,80,.12)'},
      {lsn:7,op:'UPDATE',before:'A=200',after:'A=300',color:'rgba(72,152,224,.12)'},
      {lsn:8,op:'INSERT',before:'-',after:'D=99',color:'rgba(64,200,112,.12)'},
      {lsn:9,op:'COMMIT',before:'T1',after:'-',color:'rgba(64,200,112,.18)'},
      {lsn:10,op:'UPDATE',before:'D=99',after:'D=120',color:'rgba(72,152,224,.12)'}
    ];

    const ew=62, eh=55, gap=4, startY=68;
    const totalW=entries.length*ew+(entries.length-1)*gap;
    let sx=(800-totalW)/2;

    entries.forEach((e,i)=>{
      const x=sx+i*(ew+gap);
      const fill=e.color;
      const stroke=e.op==='COMMIT'?SUCCESS:e.op==='CKPT'?WARN:LINE;
      svg.appendChild(R(x,startY,ew,eh,4,fill,1.5,stroke));
      svg.appendChild(T(x+ew/2,startY+13,'LSN '+e.lsn,ACC2,10,'bold'));
      svg.appendChild(T(x+ew/2,startY+28,e.op,e.op==='COMMIT'?SUCCESS:e.op==='CKPT'?WARN:ACCENT,11,'bold'));
      svg.appendChild(T(x+ew/2,startY+43,e.before==='-'?'':('←'+e.before),FGDIM,8));
      svg.appendChild(T(x+ew/2,startY+56,e.after==='-'?'':('→'+e.after),FGDIM,8));

      // Connect to timeline
      svg.appendChild(L(x+ew/2,55,x+ew/2,startY,LINE,1));
      svg.appendChild(E('circle',{cx:x+ew/2,cy:55,r:3,fill:LINE}));
    });

    // Checkpoint highlight
    const cpx=sx+3*(ew+gap);
    svg.appendChild(R(cpx-2,startY-4,ew+4,eh+8,6,'transparent',2,WARN));

    // Legend
    svg.appendChild(T(400,142,'日志记录格式: <LSN, 操作类型, 前镜像, 后镜像, 事务ID>',FGDIM,10));

    // Transaction info below
    svg.appendChild(R(100,160,260,45,6,'rgba(64,200,112,.12)',1.5,SUCCESS));
    svg.appendChild(T(230,180,'T1 (已提交): LSN 1-8, COMMIT @ LSN 9',SUCCESS,12,'bold'));
    svg.appendChild(T(230,197,'所有修改将在 REDO 阶段持久化',FGDIM,10));

    svg.appendChild(R(420,160,210,45,6,'rgba(224,80,80,.12)',1.5,DANGER));
    svg.appendChild(T(525,180,'T2 (未提交): LSN 5,7,10',DANGER,12,'bold'));
    svg.appendChild(T(525,197,'崩溃时未 COMMIT，须 UNDO',DANGER,10));

    // WAL principle
    svg.appendChild(R(180,220,440,55,8,'rgba(72,152,224,.12)',1.5,ACC2));
    svg.appendChild(T(400,240,'WAL 核心原则',ACC2,13,'bold'));
    svg.appendChild(T(400,262,'日志写入磁盘 (fsync) 早于数据页写入 — 保证崩溃后可恢复',FGDIM,10));
  },
  r1(svg){
    // ── Crash at LSN 7 ──
    svg.appendChild(R(20,10,760,320,10,BGCODE,1.5,LINE));
    svg.appendChild(T(400,32,'系统崩溃 @ LSN 7 — 数据页 vs WAL',ACCENT,16));

    // Left: Data pages
    svg.appendChild(R(30,55,360,135,8,'rgba(224,80,80,.08)',1.5,DANGER));
    svg.appendChild(T(210,75,'数据页 (Data Pages)',DANGER,13,'bold'));
    svg.appendChild(T(210,95,'状态停留在检查点 LSN 4',FGDIM,10));

    // Data page blocks
    const pages=[
      {id:'Page 1',lsn:4,data:'A=100',color:'rgba(64,200,112,.15)',stroke:SUCCESS},
      {id:'Page 2',lsn:4,data:'B=50',color:'rgba(64,200,112,.15)',stroke:SUCCESS},
      {id:'Page 3',lsn:4,data:'C=30',color:'rgba(64,200,112,.15)',stroke:SUCCESS}
    ];
    pages.forEach((p,i)=>{
      const px=50+i*120;
      svg.appendChild(R(px,108,105,70,6,p.color,1.5,p.stroke));
      svg.appendChild(T(px+52,128,p.id,SUCCESS,12,'bold'));
      svg.appendChild(T(px+52,148,'LSN: '+p.lsn,FGDIM,10));
      svg.appendChild(T(px+52,168,p.data,SUCCESS,11,'bold'));
    });

    // Right: WAL (intact)
    svg.appendChild(R(410,55,360,135,8,'rgba(64,200,112,.08)',1.5,SUCCESS));
    svg.appendChild(T(590,75,'WAL 日志 (完整)',SUCCESS,13,'bold'));
    svg.appendChild(T(590,95,'已持久化到磁盘，未丢失',FGDIM,10));

    // WAL mini entries
    for(let i=5;i<=10;i++){
      const wx=425+(i-5)*55;
      const isCommit=i===9;
      svg.appendChild(R(wx,108,48,70,4,'rgba(72,152,224,.12)',1,isCommit?SUCCESS:LINE));
      svg.appendChild(T(wx+24,126,'LSN '+i,ACC2,9,'bold'));
      svg.appendChild(T(wx+24,148,i===9?'COMMIT':'OP',isCommit?SUCCESS:ACCENT,9));
      svg.appendChild(T(wx+24,165,i===9?'T1':'data',FGDIM,8));
    }

    // Crash marker
    svg.appendChild(L(30,202,770,202,DANGER,2,'8,4'));
    svg.appendChild(T(400,220,'▲ 崩溃点 (LSN 7)',DANGER,13,'bold'));

    // Gap illustration
    svg.appendChild(R(120,240,560,55,8,'rgba(224,80,80,.12)',1.5,DANGER));
    svg.appendChild(T(180,268,'数据页 (LSN 4)',DANGER,12,'bold'));
    svg.appendChild(T(400,268,'LSN 5-7 修改丢失',DANGER,12,'bold'));
    svg.appendChild(T(580,268,'WAL 完整',SUCCESS,12,'bold'));

    svg.appendChild(ARROW(260,268,380,LINE));
    svg.appendChild(ARROW(460,268,560,LINE));
  },
  r2(svg){
    // ── REDO Phase ──
    svg.appendChild(R(20,10,760,320,10,BGCODE,1.5,LINE));
    svg.appendChild(T(400,32,'REDO 阶段 — 重放已提交事务',SUCCESS,16));

    // Data pages (before REDO)
    svg.appendChild(R(30,55,220,100,8,'rgba(224,80,80,.08)',1.5,DANGER));
    svg.appendChild(T(140,75,'数据页 (REDO前)',DANGER,12,'bold'));
    svg.appendChild(T(140,95,'pageLSN = 4',FGDIM,10));
    svg.appendChild(T(140,125,'A=100, B=50, C=30',FG,10));

    // REDO arrows area
    svg.appendChild(R(270,55,260,100,8,'rgba(64,200,112,.10)',1.5,SUCCESS));
    svg.appendChild(T(400,75,'REDO 重放',SUCCESS,13,'bold'));

    // Arrows showing redo
    const redoSteps=[
      [300,95,490,95,'LSN 5: B=50→80'],
      [300,115,490,115,'LSN 6: 删 C=30'],
      [300,135,490,135,'LSN 7: A=200→300'],
      [300,155,490,155,'LSN 8: 插入 D=99']
    ];
    redoSteps.forEach((r,i)=>{
      svg.appendChild(ARROW(r[0],r[1],r[2],SUCCESS));
      svg.appendChild(T(395,r[3]-3,r[3],SUCCESS,9));
    });

    // Data pages (after REDO)
    svg.appendChild(R(550,55,220,100,8,'rgba(64,200,112,.12)',1.5,SUCCESS));
    svg.appendChild(T(660,75,'数据页 (REDO后)',SUCCESS,12,'bold'));
    svg.appendChild(T(660,95,'pageLSN = 10',SUCCESS,10));
    svg.appendChild(T(660,125,'A=300, B=80, D=99',SUCCESS,10));

    // Timeline bar
    svg.appendChild(R(40,175,720,35,6,'rgba(72,152,224,.08)',1.5,ACC2));
    svg.appendChild(T(400,184,'LSN 时间线 (REDO 阶段)',ACC2,11,'bold'));

    for(let i=1;i<=10;i++){
      const tx=55+(i-1)*70;
      const isAfterCheckpoint=i>=5;
      svg.appendChild(R(tx,198,60,8,3,isAfterCheckpoint?'rgba(64,200,112,.3)':'rgba(72,152,224,.2)',0.5,isAfterCheckpoint?SUCCESS:LINE));
      svg.appendChild(T(tx+30,204,i+'',isAfterCheckpoint?SUCCESS:FGDIM,9,'bold'));
    }

    // Status boxes
    svg.appendChild(R(60,230,220,45,6,'rgba(64,200,112,.15)',1.5,SUCCESS));
    svg.appendChild(T(170,252,'LSN 5-10 已重放完成',SUCCESS,12,'bold'));
    svg.appendChild(T(170,268,'所有已提交修改已持久化 ✓',SUCCESS,10));

    svg.appendChild(R(320,230,220,45,6,'rgba(224,80,80,.15)',1.5,DANGER));
    svg.appendChild(T(430,252,'但 T2 尚未提交',DANGER,12,'bold'));
    svg.appendChild(T(430,268,'T2 的操作也被重放了?!',DANGER,10));

    // Note
    svg.appendChild(R(580,230,180,45,6,'rgba(72,152,224,.12)',1.5,ACC2));
    svg.appendChild(T(670,252,'→ 需要 UNDO',ACC2,12,'bold'));
    svg.appendChild(T(670,268,'回滚未提交事务',FGDIM,10));
  },
  r3(svg){
    // ── UNDO Phase ──
    svg.appendChild(R(20,10,760,320,10,BGCODE,1.5,LINE));
    svg.appendChild(T(400,32,'UNDO 阶段 — 回滚未提交事务 (T2)',DANGER,16));

    // T2 operations to undo (reversed)
    svg.appendChild(R(30,55,260,110,8,'rgba(224,80,80,.12)',1.5,DANGER));
    svg.appendChild(T(160,75,'T2 操作链 (反向遍历)',DANGER,13,'bold'));

    const undos=[
      ['LSN 10: D=120→99','(逆: UPDATE D SET=99)'],
      ['LSN 7: A=300→200','(逆: UPDATE A SET=200)'],
      ['LSN 5: B=80→50','(逆: UPDATE B SET=50)']
    ];
    undos.forEach((u,i)=>{
      svg.appendChild(T(160,98+i*20,u[0],DANGER,10));
      svg.appendChild(T(160,98+i*20+10,u[1],FGDIM,9));
    });

    // UNDO process visualization
    svg.appendChild(R(310,55,210,110,8,'rgba(240,160,48,.12)',1.5,WARN));
    svg.appendChild(T(415,75,'UNDO 执行',WARN,13,'bold'));

    svg.appendChild(ARROW(230,90,305,WARN));
    svg.appendChild(T(268,85,'逆序',WARN,9));

    const undoSteps=[
      '① UNDO LSN 10',
      '② UNDO LSN 7',
      '③ UNDO LSN 5',
      '✓ T2 已完全回滚'
    ];
    undoSteps.forEach((s,i)=>{
      svg.appendChild(T(415,98+i*15,s,i===3?SUCCESS:WARN,10));
    });

    // CLR
    svg.appendChild(R(540,55,220,110,8,'rgba(72,152,224,.12)',1.5,ACC2));
    svg.appendChild(T(650,75,'CLR 记录',ACC2,13,'bold'));
    svg.appendChild(T(650,95,'Compensation Log',ACC2,11));
    svg.appendChild(T(650,115,'Record',ACC2,11));
    svg.appendChild(T(650,138,'记录 UNDO 操作',FGDIM,10));
    svg.appendChild(T(650,155,'防止重复回滚',FGDIM,10));

    // Final state
    svg.appendChild(R(30,180,730,50,8,'rgba(64,200,112,.15)',1.5,SUCCESS));
    svg.appendChild(T(180,205,'最终一致性状态',SUCCESS,14,'bold'));
    svg.appendChild(T(400,205,'A=200, B=50, D=99  (未提交的 T2 修改已撤销)',FG,11));
    svg.appendChild(T(620,205,'pageLSN = 10',SUCCESS,11,'bold'));

    // Recovery timeline
    svg.appendChild(R(40,248,720,60,8,'rgba(72,152,224,.08)',1.5,ACC2));
    svg.appendChild(T(400,266,'恢复时间线: 检查点 → 分析 → REDO → UNDO → 一致状态',ACC2,12));

    // Phase blocks
    const phases=[
      ['CKPT','LSN 4',SUCCESS],
      ['ANALYSIS','确定起点',ACC2],
      ['REDO','LSN 5→10',SUCCESS],
      ['UNDO','回滚 T2',DANGER],
      ['DONE','一致性',SUCCESS]
    ];
    let px=60;
    phases.forEach((p,i)=>{
      svg.appendChild(R(px,268,120,30,4,'rgba(72,152,224,.12)',1,p[2]));
      svg.appendChild(T(px+60,288,p[0],p[2],11,'bold'));
      if(i<phases.length-1){
        svg.appendChild(ARROW(px+120,283,px+144,ACC2));
      }
      px+=144;
    });
  },
  go(s){
    this.step=s;
    $('#stepTitle').textContent=this.titles[s];
    $('#stepDesc').textContent=this.descs[s];
    $('#infoLine').textContent=this.infoLines[s];
    const b=this.badges[s];
    $('#badges').innerHTML=`<span class="badge badge--${b[1]}">${b[0]}</span>`;
    this.render($('#svg'));
    this.updateDots(); this.updateBtns();
  },
  changeStep(d){const ns=this.step+d;if(ns<0||ns>=this.total)return;this.go(ns);},
  resetStep(){this.go(0);},
  updateDots(){
    let h='';
    for(let i=0;i<this.total;i++){
      let cls='';
      if(i===this.step)cls='active';
      else if(i<this.step)cls='done';
      h+=`<span class="step-dot ${cls}"></span>`;
    }
    $('#dots').innerHTML=h;
  },
  updateBtns(){
    $('#prevBtn').disabled=this.step===0;
    $('#nextBtn').disabled=this.step===this.total-1;
  },
  toggleAuto(){
    if(this.autoId){clearInterval(this.autoId);this.autoId=null;$('#autoBtn').textContent='自动播放';return;}
    $('#autoBtn').textContent='停止';
    this.autoId=setInterval(()=>{
      if(this.step<this.total-1)this.go(this.step+1);
      else{clearInterval(this.autoId);this.autoId=null;$('#autoBtn').textContent='自动播放';}
    },3000);
  },
  init(){$('#svg').setAttribute('viewBox','0 0 800 340');this.go(0);}
};

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')S.changeStep(1);
  else if(e.key==='ArrowLeft')S.changeStep(-1);
  else if(e.key===' ') {e.preventDefault();S.toggleAuto();}
  else if(e.key==='r'||e.key==='R')S.resetStep();
});

S.init();
</script>
</body>
</html>
