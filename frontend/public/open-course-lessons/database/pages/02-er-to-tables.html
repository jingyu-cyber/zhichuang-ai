<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ER 图转关系表 (ER to Relational)</title><style>:root{--bg:#1a1e1d;--bg-soft:#25302d;--bg-code:#0d1111;--fg:#e0eee8;--fg-dim:#90a898;--line:#304038;--accent:#40c0b0;--accent-2:#4898e0;--grad:#4898e0;--success:#40c870;--danger:#e05050}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(72,152,224,.18);color:var(--grad)}.badge--tip{background:rgba(64,200,112,.18);color:var(--success)}.badge--warn{background:rgba(224,80,80,.18);color:var(--danger)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.info-line{font-family:"JetBrains Mono",monospace;font-size:15px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-co <div class="demo-shell">

<script>
function drawTable(sv,x,y,w,cols,rows,title,highlightCol){
  // cols: [{w:width,label:'col name'}]
  // rows: [[cell values...]]
  let totalW=cols.reduce((s,c)=>s+c.w,0);
  let rowH=26;
  let headerH=24;
  let totalH=headerH+rows.length*rowH;
  // Table background
  let bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x',x);bg.setAttribute('y',y);bg.setAttribute('width',totalW);bg.setAttribute('height',totalH);
  bg.setAttribute('rx',6);bg.setAttribute('fill','#0d1111');bg.setAttribute('stroke','#304038');bg.setAttribute('stroke-width',1.5);
  sv.appendChild(bg);
  // Title above
  if(title){
    let tl=document.createElementNS('http://www.w3.org/2000/svg','text');
    tl.setAttribute('x',x+totalW/2);tl.setAttribute('y',y-8);tl.setAttribute('fill','#40c0b0');
    tl.setAttribute('font-size',13);tl.setAttribute('font-weight','bold');tl.setAttribute('text-anchor','middle');
    tl.textContent=title;sv.appendChild(tl);
  }
  let cx=x;
  // Header row
  cols.forEach((col,colIdx)=>{
    let hr=document.createElementNS('http://www.w3.org/2000/svg','rect');
    hr.setAttribute('x',cx);hr.setAttribute('y',y);hr.setAttribute('width',col.w);hr.setAttribute('height',headerH);
    hr.setAttribute('fill',highlightCol===colIdx?'rgba(64,192,176,0.2)':'rgba(64,192,176,0.08)');
    hr.setAttribute('stroke','#304038');hr.setAttribute('stroke-width',0.5);
    sv.appendChild(hr);
    let ht=document.createElementNS('http://www.w3.org/2000/svg','text');
    ht.setAttribute('x',cx+col.w/2);ht.setAttribute('y',y+headerH-8);ht.setAttribute('fill','#40c0b0');
    ht.setAttribute('font-size',10);ht.setAttribute('font-weight','bold');ht.setAttribute('text-anchor','middle');
    ht.textContent=col.label;sv.appendChild(ht);
    cx+=col.w;
  });
  // Data rows
  rows.forEach((row,rowIdx)=>{
    let rx=x;
    let ry=y+headerH+rowIdx*rowH;
    let rowBg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rowBg.setAttribute('x',rx);rowBg.setAttribute('y',ry);rowBg.setAttribute('width',totalW);rowBg.setAttribute('height',rowH);
    rowBg.setAttribute('fill',rowIdx%2===0?'rgba(72,152,224,0.03)':'transparent');
    sv.appendChild(rowBg);
    row.forEach((cell,colIdx)=>{
      let cy=ry;
      let ct=document.createElementNS('http://www.w3.org/2000/svg','text');
      ct.setAttribute('x',rx+cols[colIdx].w/2);ct.setAttribute('y',cy+rowH-8);
      ct.setAttribute('fill',colIdx===highlightCol?'#40c0b0':'#e0eee8');
      ct.setAttribute('font-size',10);ct.setAttribute('text-anchor','middle');
      ct.textContent=cell;sv.appendChild(ct);
      rx+=cols[colIdx].w;
    });
  });
  return {x:x,totalW:totalW,y:y,totalH:totalH};
}

function drawFKArrow(sv,x1,y1,x2,y2,label){
  // Curved arrow
  let midX=(x1+x2)/2;
  let path=document.createElementNS('http://www.w3.org/2000/svg','path');
  let d='M'+x1+' '+y1+' C'+(x1+30)+' '+(y1+10)+' '+(x2-30)+' '+(y2+10)+' '+x2+' '+y2;
  path.setAttribute('d',d);
  path.setAttribute('fill','none');path.setAttribute('stroke','#4898e0');path.setAttribute('stroke-width',1.5);
  path.setAttribute('stroke-dasharray','4,3');
  sv.appendChild(path);
  // Arrow head
  let ah=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  ah.setAttribute('points',(x2-6)+','+(y2-4)+' '+x2+','+y2+' '+(x2-6)+','+(y2+4));
  ah.setAttribute('fill','#4898e0');
  sv.appendChild(ah);
  // Label
  if(label){
    let lt=document.createElementNS('http://www.w3.org/2000/svg','text');
    lt.setAttribute('x',midX);lt.setAttribute('y',y2+10);lt.setAttribute('fill','#4898e0');
    lt.setAttribute('font-size',9);lt.setAttribute('text-anchor','middle');
    lt.textContent=label;sv.appendChild(lt);
  }
}

function step3(sv){

  for(let i=0;i<800;i+=40){let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',i);l.setAttribute('y1',0);l.setAttribute('x2',i);l.setAttribute('y2',340);l.setAttribute('stroke','#1a2824');l.setAttribute('stroke-width',0.5);sv.appendChild(l);}
  for(let j=0;j<340;j+=40){let l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',0);l.setAttribute('y1',j);l.setAttribute('x2',800);l.setAttribute('y2',j);l.setAttribute('stroke','#1a2824');l.setAttribute('stroke-width',0.5);sv.appendChild(l);}
  // Dept table
  let dept=drawTable(sv,20,30,[{w:60,label:'dept_id'},{w:80,label:'dept_name'}],[
    ['D01','计算机学院'],
    ['D02','数学学院'],
    ['D03','物理学院']
  ],'Department',0);
  // Student table
  let stu=drawTable(sv,20,150,[{w:60,label:'sid'},{w:55,label:'name'},{w:40,label:'age'},{w:60,label:'dept_id'}],[
    ['S001','张三',20,'D01'],
    ['S002','李四',21,'D01'],
    ['S003','王五',19,'D02']
  ],'Student',0);
  // Course table
  let course=drawTable(sv,400,30,[{w:55,label:'cid'},{w:90,label:'title'},{w:50,label:'credit'}],[
    ['C001','数据库系统','3'],
    ['C002','操作系统','4'],
    ['C003','数据结构','3']
  ],'Course',0);
  // Enroll table
  let enroll=drawTable(sv,350,190,[{w:55,label:'sid'},{w:55,label:'cid'},{w:50,label:'grade'},{w:65,label:'semester'}],[
    ['S001','C001','85','2025春'],
    ['S001','C003','92','2025春'],
    ['S002','C001','78','2025春']
  ],'Enroll (关联表)',0);
  // FK arrows
  // Student.dept_id -> Department.dept_id
  drawFKArrow(sv,220,150+10,140,30+24+26+26,'FK');
  // Enroll.sid -> Student.sid
  drawFKArrow(sv,350+27,190+5,220,150+5,'FK');
  // Enroll.cid -> Course.cid
  drawFKArrow(sv,350+27+55,190+5,400+27,30+5,'FK');
  // Schema summary box
  let sumR=document.createElementNS('http://www.w3.org/2000/svg','rect');
  sumR.setAttribute('x',220);sumR.setAttribute('y',255);sumR.setAttribute('width',350);sumR.setAttribute('height',75);
  sumR.setAttribute('rx',8);sumR.setAttribute('fill','rgba(64,200,112,0.06)');sumR.setAttribute('stroke','#40c870');sumR.setAttribute('stroke-width',1);
  sv.appendChild(sumR);
  let sumT=document.createElementNS('http://www.w3.org/2000/svg','text');
  sumT.setAttribute('x',395);sumT.setAttribute('y',278);sumT.setAttribute('fill','#40c870');sumT.setAttribute('font-size',12);
  sumT.setAttribute('font-weight','bold');sumT.setAttribute('text-anchor','middle');
  sumT.textContent='最终关系模式 (4表)';sv.appendChild(sumT);
  let sumLines=[
    'Student(sid, name, age, dept_id)  — PK: sid, FK: dept_id',
    'Course(cid, title, credit)        — PK: cid',
    'Department(dept_id, dept_name)    — PK: dept_id',
    'Enroll(sid, cid, grade, semester) — PK: (sid,cid), FK: sid, cid'
  ];
  sumLines.forEach((l,i)=>{
    let st=document.createElementNS('http://www.w3.org/2000/svg','text');
    st.setAttribute('x',235);st.setAttribute('y',298+i*14);st.setAttribute('fill','#90a898');st.setAttribute('font-size',9);
    st.textContent=l;sv.appendChild(st);
  });
}

const S=[
  {t:'实体 → 表：学生表',l:'Student(sid PK, name, age, dept_id FK)',d:'<p><span style="color:var(--accent)">转换规则 1：</span>ER 图中的每个<span style="color:var(--accent)">实体</span>转化为一张关系表。</p><p>实体名 → <span style="color:var(--accent-2)">表名</span></p><p>属性 → <span style="color:var(--accent-2)">列 (字段)</span></p><p>主键属性 → <span style="color:var(--accent)">PRIMARY KEY</span></p><p style="margin-top:6px;color:var(--fg-dim);font-size:12px">dept_id 作为外键，指向 Department 表</p>',b:[{t:'实体转换',c:'def'},{t:'主键',c:'tip'}],r:step0},
  {t:'更多实体转换',l:'Course(cid PK, title, credit) | Teacher(tid PK, tname, title)',d:'<p>所有实体适用相同规则：</p><p><span style="color:var(--accent)">课程</span> → <code>Course(cid, title, credit)</code></p><p><span style="color:var(--accent)">教师</span> → <code>Teacher(tid, tname, title)</code></p><p><span style="color:var(--accent)">学院</span> → <code>Department(dept_id, dept_name)</code></p><p style="color:var(--fg-dim);font-size:12px">每个实体独立成表，主键保证行唯一性</p>',b:[{t:'实体转换',c:'def'},{t:'主键',c:'tip'},{t:'表结构',c:'def'}],r:step1},
  {t:'M:N 联系 → 关联表',l:'Enroll(sid FK, cid FK, grade, semester) — PK(sid, cid)',d:'<p><span style="color:var(--danger);font-weight:700">关键规则：</span>M:N 联系不能合并到任意一端，必须<span style="color:var(--danger)">单独建表</span>。</p><p><span style="color:var(--accent)">选修联系</span> → <code>Enroll</code> 关联表</p><p>两端实体主键 → <span style="color:var(--accent-2)">外键列</span> (sid, cid)</p><p>两端外键组成 → <span style="color:var(--accent)">联合主键</span></p><p style="color:var(--fg-dim);font-size:12px">附加属性(grade, semester)放在关联表中</p>',b:[{t:'M:N联系',c:'warn'},{t:'关联表',c:'tip'},{t:'联合主键',c:'def'}],r:step2},
  {t:'完整四表模式',l:'Student | Course | Department | Enroll (完整外键视图)',d:'<p><span style="color:var(--accent)">最终关系模式（4张表）：</span></p><p>1. <code>Student(sid, name, age, dept_id)</code></p><p>2. <code>Course(cid, title, credit)</code></p><p>3. <code>Department(dept_id, dept_name)</code></p><p>4. <code>Enroll(sid, cid, grade, semester)</code></p><p style="color:var(--fg-dim);font-size:12px">虚线箭头 = 外键引用 | Enroll 用两个 FK 构成联合 PK</p>',b:[{t:'完整模式',c:'tip'},{t:'外键',c:'def'},{t:'关联表',c:'warn'}],r:step3}
];
let step=0,timer=null;
const dotsEl=document.getElementById('dots'),svEl=document.getElementById('stage');
svEl.innerHTML='<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"></svg>';
const sv=svEl.querySelector('svg');
for(let i=0;i<S.length;i++){let d=document.createElement('div');d.className='step-dot';d.onclick=()=>go(i);dotsEl.appendChild(d);}
function render(){const s=S[step];document.getElementById('stepTitle').textContent=s.t;document.getElementById('infoLine').textContent=s.l;document.getElementById('stepDesc').innerHTML=s.d;let bd=document.getElementById('badges');bd.innerHTML='';s.b.forEach(b=>{let sp=document.createElement('span');sp.className='badge badge--'+b.c;sp.textContent=b.t;bd.appendChild(sp);});s.r(sv);document.querySelectorAll('.step-dot').forEach((d,i)=>{d.className='step-dot'+(i===step?' active':i<step?' done':'');});document.getElementById('btnPrev').disabled=step===0;document.getElementById('btnNext').disabled=step===S.length-1;}
function go(n){step=Math.max(0,Math.min(n,S.length-1));render();}function changeStep(d){go(step+d);}function resetStep(){stop();go(0);}function toggleAuto(){timer?stop():start();}
function start(){timer=setInterval(()=>{if(step<S.length-1)go(step+1);else stop();},1600);document.getElementById('btnAuto').textContent='⏸';}
function stop(){clearInterval(timer);timer=null;document.getElementById('btnAuto').textContent='▶';}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')changeStep(-1);if(e.key==='ArrowRight')changeStep(1);if(e.key===' ')e.preventDefault(),toggleAuto();if(e.key==='r'||e.key==='R')resetStep();});render();
</script></body></html>
