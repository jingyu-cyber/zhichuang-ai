<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>反向传播与梯度 · 深度学习框架</title>
<style>
:root{--bg:#1e1a1a;--bg-soft:#2d2525;--bg-code:#141010;--fg:#f0e8e0;--fg-dim:#b0a090;--line:#3d3030;--accent:#ff9050;--accent-2:#ffc040;--grad:#7b8cff;--success:#50d890;--danger:#f05060;--shadow:0 10px 30px rgba(0,0,0,.35);--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}
.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}
.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
.demo-header h1{font-size:20px;font-weight:700}
.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}
.demo-header .breadcrumb a{color:var(--accent);text-decoration:none}
.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}
.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:14px}
.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}
.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}
.panel-explain .grad-val{font-family:"JetBrains Mono","Fira Code",monospace;font-size:22px;color:var(--accent-2);text-align:center;padding:12px;background:var(--bg-code);border-radius:var(--radius-sm)}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge--def{background:rgba(123,140,255,.18);color:var(--grad)}
.badge--tip{background:rgba(80,216,144,.18);color:var(--success)}
.badge--warn{background:rgba(240,80,96,.18);color:var(--danger)}
.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.panel-stage svg{max-width:100%;max-height:100%}
.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}
.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;transition:.15s}
.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}
.demo-controls button:disabled{opacity:.35;cursor:default}
.step-dots{display:flex;gap:8px;align-items:center}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}
.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}
.step-dot.done{background:var(--success)}
.back-arrow{transition:all .3s ease}
@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-header">
    <div>
      <h1>反向传播与梯度</h1>
      <div class="breadcrumb"><a href="../index.html">深度学习框架</a> / 第二章 / 05</div>
    </div>
    <span class="badge badge--def">backward pass · chain rule</span>
  </div>

  <div class="demo-main">
    <div class="panel-explain" id="explain">
      <div class="step-title" id="stepTitle">计算图回顾</div>
      <div class="grad-val" id="gradDisplay">forward: 数据 → loss</div>
      <div class="step-desc" id="stepDesc">反向传播（backpropagation）是训练神经网络的核心算法。它的本质是<b>链式法则（Chain Rule）</b>在计算图上的高效实现。<br><br>forward 构建计算图并缓存中间值；backward 从 loss 出发，沿计算图逆向计算每个参数的梯度。</div>
      <div class="badge-row" id="badges">
        <span class="badge badge--def">链式法则</span><span class="badge badge--tip">计算图</span>
      </div>
    </div>
    <div class="panel-stage" id="stage"></div>
  </div>

  <div class="demo-controls">
    <button id="btnPrev" onclick="changeStep(-1)">← 上一步</button>
    <div class="step-dots" id="dots"></div>
    <button id="btnNext" onclick="changeStep(1)">下一步 →</button>
    <button onclick="resetStep()">⟳ 重置</button>
    <button id="btnAuto" onclick="toggleAuto()">▶ 自动</button>
  </div>
</div>

<script>
const steps = [
  {
    title: "链式法则 = 反向传播的数学基础",
    grad: "dz/dx = dz/dy × dy/dx",
    desc: '假设 <b>y = 3x²</b>，<b>z = 2y + 1</b>。想知道 x 变化时 z 怎么变？<br><br>链式法则：<b>dz/dx = dz/dy × dy/dx = 2 × 6x = 12x</b><br><br>在神经网络中：loss 依赖于输出层，输出层依赖于隐层，隐层依赖于输入。梯度就是链式法则「逐层回传」的乘积。',
    badges: [{t:'链式法则',c:'def'},{t:'逐层乘积',c:'tip'}],
    render(svg){
      svg.innerHTML = `<rect x="40" y="80" width="150" height="60" rx="10" fill="var(--grad)" opacity=".7"/><text x="115" y="116" text-anchor="middle" font-size="16" fill="#fff" font-weight="700">x</text>
<text x="220" y="116" text-anchor="middle" font-size="22" fill="var(--fg-dim)">→</text>
<rect x="260" y="80" width="150" height="60" rx="10" fill="var(--accent)" opacity=".7"/><text x="335" y="111" text-anchor="middle" font-size="14" fill="#1e1a1a" font-weight="700">y = 3x²</text>
<text x="440" y="116" text-anchor="middle" font-size="22" fill="var(--fg-dim)">→</text>
<rect x="480" y="80" width="150" height="60" rx="10" fill="var(--accent-2)" opacity=".7"/><text x="555" y="111" text-anchor="middle" font-size="14" fill="#1e1a1a" font-weight="700">z = 2y+1</text>
<text x="400" y="190" text-anchor="middle" font-size="15" fill="var(--accent-2)" font-family="JetBrains Mono">dz/dx = dz/dy × dy/dx = 2 × 6x = 12x</text>
<text x="400" y="220" text-anchor="middle" font-size="13" fill="var(--fg-dim)">反向传播时：梯度从 z 流向 y，再从 y 流向 x</text>
<line x1="555" y1="140" x2="555" y2="185" stroke="var(--accent-2)" stroke-width="2" marker-end="url(#arrowA)"/>
<line x1="555" y1="185" x2="335" y2="185" stroke="var(--accent-2)" stroke-width="2" marker-end="url(#arrowA)"/>
<line x1="335" y1="185" x2="115" y2="140" stroke="var(--accent-2)" stroke-width="2" marker-end="url(#arrowA)"/>`;
    }
  },
  {
    title: "计算图：正向建图，反向求导",
    grad: "forward(): 存中间值  backward(): 算梯度",
    desc: '每个算子 = 两个函数：<b>forward()</b> 计算输出 + 缓存所需值；<b>backward()</b> 接收上游梯度，乘上本地导数，传给下游。<br><br>以乘法 z = x × y 为例：<br>forward: z = x·y，缓存 x 和 y<br>backward: dz/dx = y·dz（上游梯度 × y），dz/dy = x·dz</b><br><br>PyTorch 的 autograd 自动为每个操作注册 forward 和 backward。',
    badges: [{t:'forward+backward',c:'def'},{t:'autograd',c:'tip'}],
    render(svg){
      svg.innerHTML = `<rect x="60" y="40" width="160" height="80" rx="10" fill="var(--bg-soft)" stroke="var(--grad)" stroke-width="2"/>
<text x="140" y="70" text-anchor="middle" font-size="14" fill="var(--grad)" font-weight="700">z = x × y</text>
<text x="140" y="95" text-anchor="middle" font-size="11" fill="var(--fg-dim)" font-family="JetBrains Mono">forward: z=6</text>
<text x="140" y="112" text-anchor="middle" font-size="10" fill="var(--fg-dim)">x=2, y=3</text>
<rect x="300" y="40" width="200" height="80" rx="10" fill="var(--bg-soft)" stroke="var(--accent)" stroke-width="2"/>
<text x="400" y="70" text-anchor="middle" font-size="14" fill="var(--accent)" font-weight="700">MulBackward</text>
<text x="400" y="95" text-anchor="middle" font-size="11" fill="var(--fg-dim)" font-family="JetBrains Mono">dx = dz × y = 3</text>
<text x="400" y="112" text-anchor="middle" font-size="11" fill="var(--fg-dim)" font-family="JetBrains Mono">dy = dz × x = 2</text>
<rect x="580" y="40" width="160" height="80" rx="10" fill="var(--bg-soft)" stroke="var(--success)" stroke-width="2"/>
<text x="660" y="70" text-anchor="middle" font-size="14" fill="var(--success)" font-weight="700">上游梯度</text>
<text x="660" y="95" text-anchor="middle" font-size="11" fill="var(--fg-dim)" font-family="JetBrains Mono">dz = 1.0</text>
<line x1="220" y1="80" x2="295" y2="80" stroke="var(--grad)" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="500" y1="80" x2="575" y2="80" stroke="var(--accent-2)" stroke-width="2" marker-end="url(#arrowA)"/>
<text x="400" y="165" text-anchor="middle" font-size="13" fill="var(--fg-dim)">.backward() 触发时, PyTorch 从 loss 开始, 逆序遍历计算图中的每个算子, 调用其 backward()</text>
<text x="400" y="195" text-anchor="middle" font-size="13" fill="var(--accent-2)">关键机制：链式法则 = 上游梯度 × 本地导数</text>`;
    }
  },
  {
    title: "三层网络的反向传播之旅",
    grad: "Linear → ReLU → Linear → loss.backward()",
    desc: '具体追踪一个简单网络的梯度流：<br><br><b>Layer 2 (输出层)</b>: dL/dW₂ = (pred−true) × h₁ᵀ<br><b>ReLU</b>: dL/dh₁ = W₂ᵀ × dL/dz₂，对 h₁≤0 的位置梯度=0<br><b>Layer 1 (输入层)</b>: dL/dW₁ = (dL/dh₁ ⊙ ReLU"(z₁)) × xᵀ<br><br>ReLU 的反向传播：正数原样通过，负数梯度为 0。这就是为什么 ReLU 会造成「死神经元」——一旦输出恒为负，梯度永远为 0。',
    badges: [{t:'梯度流',c:'def'},{t:'ReLU特性',c:'warn'},{t:'死神经元',c:'warn'}],
    render(svg){
      svg.innerHTML = `<rect x="30" y="30" width="120" height="50" rx="8" fill="var(--grad)" opacity=".7"/><text x="90" y="60" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Input x</text>
<text x="170" y="60" text-anchor="middle" font-size="18" fill="var(--fg-dim)">→</text>
<rect x="190" y="30" width="120" height="50" rx="8" fill="var(--grad)" opacity=".7"/><text x="250" y="60" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Linear₁ W₁</text>
<text x="330" y="60" text-anchor="middle" font-size="18" fill="var(--fg-dim)">→</text>
<rect x="350" y="30" width="120" height="50" rx="8" fill="var(--success)" opacity=".7"/><text x="410" y="60" text-anchor="middle" font-size="13" fill="#1e1a1a" font-weight="700">ReLU</text>
<text x="490" y="60" text-anchor="middle" font-size="18" fill="var(--fg-dim)">→</text>
<rect x="510" y="30" width="120" height="50" rx="8" fill="var(--accent)" opacity=".7"/><text x="570" y="60" text-anchor="middle" font-size="13" fill="#1e1a1a" font-weight="700">Linear₂ W₂</text>
<text x="650" y="60" text-anchor="middle" font-size="18" fill="var(--fg-dim)">→</text>
<rect x="670" y="30" width="100" height="50" rx="8" fill="var(--accent-2)" opacity=".7"/><text x="720" y="60" text-anchor="middle" font-size="13" fill="#1e1a1a" font-weight="700">Loss</text>
<!-- backward arrows -->
<line x1="720" y1="85" x2="720" y2="130" stroke="var(--accent-2)" stroke-width="2.5" marker-end="url(#arrowA)"/>
<line x1="720" y1="130" x2="570" y2="130" stroke="var(--accent-2)" stroke-width="2.5" marker-end="url(#arrowA)"/>
<text x="645" y="148" text-anchor="middle" font-size="11" fill="var(--accent-2)" font-family="JetBrains Mono">dL/dW₂</text>
<line x1="570" y1="130" x2="410" y2="130" stroke="var(--accent-2)" stroke-width="2.5" marker-end="url(#arrowA)"/>
<line x1="410" y1="130" x2="250" y2="130" stroke="var(--accent-2)" stroke-width="2.5" marker-end="url(#arrowA)"/>
<text x="330" y="148" text-anchor="middle" font-size="11" fill="var(--accent-2)" font-family="JetBrains Mono">dL/dW₁</text>
<line x1="250" y1="130" x2="90" y2="130" stroke="var(--accent-2)" stroke-width="2.5" marker-end="url(#arrowA)"/>
<text x="400" y="180" text-anchor="middle" font-size="13" fill="var(--fg-dim)">梯度从 Loss 一路「反向流动」到 Input —— 每个参数得到自己的梯度</text>
<text x="400" y="205" text-anchor="middle" font-size="13" fill="var(--accent-2)">注意：ReLU 负值区梯度=0 → 对应神经元「死亡」→ 不再学习</text>`;
    }
  },
  {
    title: "梯度累加 vs 清零",
    grad: "zero_grad() 为什么必须调用?",
    desc: 'PyTorch 中，<b>梯度默认累加</b>，不会自动清零。每次 .backward() 会把新梯度 <b>加到</b> 已有的 .grad 上。<br><br>如果不调 zero_grad()：<br>• batch 1: grad = [1, 1, 1]<br>• batch 2: grad = [1, 1, 1] + [2, 2, 2] = [3, 3, 3] ❌<br><br>这是因为 PyTorch 故意设计成累加模式——支持<b>梯度累积</b>（多个小 batch 的梯度加起来再更新，模拟大 batch）。',
    badges: [{t:'必须清零',c:'warn'},{t:'梯度累积',c:'tip'},{t:'设计特性',c:'def'}],
    render(svg){
      svg.innerHTML = `<rect x="20" y="20" width="360" height="170" rx="10" fill="var(--bg-soft)" stroke="var(--danger)" stroke-width="2"/>
<text x="200" y="55" text-anchor="middle" font-size="15" fill="var(--danger)" font-weight="700">忘记 zero_grad() → 错误！</text>
<text x="40" y="85" font-size="12" fill="var(--fg-dim)" font-family="JetBrains Mono">batch 1: .backward() → grad = [1,1,1]</text>
<text x="40" y="108" font-size="12" fill="var(--fg-dim)" font-family="JetBrains Mono">batch 2: .backward() → grad = [1,1,1] + [2,2,2]</text>
<text x="40" y="131" font-size="12" fill="var(--danger)" font-family="JetBrains Mono">                     = [3,3,3] ← 错误！</text>
<text x="40" y="158" font-size="11" fill="var(--fg-dim)">每次更新用的梯度是累加值，方向不对</text>
<rect x="420" y="20" width="360" height="170" rx="10" fill="var(--bg-soft)" stroke="var(--success)" stroke-width="2"/>
<text x="600" y="55" text-anchor="middle" font-size="15" fill="var(--success)" font-weight="700">正确训练循环</text>
<text x="440" y="85" font-size="12" fill="var(--fg-dim)" font-family="JetBrains Mono">for batch in dataloader:</text>
<text x="440" y="108" font-size="12" fill="var(--success)" font-family="JetBrains Mono">    optimizer.zero_grad()  # ← 清零!</text>
<text x="440" y="131" font-size="12" fill="var(--fg-dim)" font-family="JetBrains Mono">    loss = model(batch)</text>
<text x="440" y="154" font-size="12" fill="var(--fg-dim)" font-family="JetBrains Mono">    loss.backward()</text>
<text x="440" y="177" font-size="12" fill="var(--fg-dim)" font-family="JetBrains Mono">    optimizer.step()</text>
<text x="400" y="230" text-anchor="middle" font-size="13" fill="var(--accent-2)">梯度累积技巧：每 4 个 batch 调一次 step()，等效 batch_size×4</text>`;
    }
  },
  {
    title: "梯度消失与爆炸",
    grad: "深度网络的阿克琉斯之踵",
    desc: '当梯度流经多层时，每一步都在乘以权重矩阵和激活函数的导数。<br><br><b>梯度消失</b>：|导数|<1 × 多步 → grad→0。Sigmoid 导数最大仅 0.25，10 层后就只剩 0.25¹⁰≈0。早期层几乎不更新。<br><br><b>梯度爆炸</b>：|导数|>1 × 多步 → grad→∞。权重初始化过大会导致梯度指数增长，loss 变成 NaN。<br><br><b>解决方案</b>：ReLU（导数=1不衰减）、BatchNorm、残差连接（ResNet）、梯度裁剪。',
    badges: [{t:'深度训练难题',c:'warn'},{t:'ReLU解决',c:'tip'},{t:'残差连接',c:'def'}],
    render(svg){
      svg.innerHTML = `<rect x="10" y="20" width="380" height="160" rx="10" fill="var(--bg-soft)" stroke="var(--danger)" stroke-width="2"/>
<text x="200" y="55" text-anchor="middle" font-size="15" fill="var(--danger)" font-weight="700">梯度消失 Vanishing</text>
<text x="30" y="85" font-size="12" fill="var(--fg-dim)">Sigmoid: σ"(x) ≤ 0.25</text>
<text x="30" y="108" font-size="12" fill="var(--fg-dim)">10层后梯度: 0.25¹⁰ ≈ 0.000001</text>
<text x="30" y="131" font-size="12" fill="var(--fg-dim)">→ 前几层几乎收不到梯度信号</text>
<text x="30" y="154" font-size="12" fill="var(--success)">解决: ReLU (导数为1), BatchNorm</text>
<rect x="410" y="20" width="380" height="160" rx="10" fill="var(--bg-soft)" stroke="var(--accent)" stroke-width="2"/>
<text x="600" y="55" text-anchor="middle" font-size="15" fill="var(--accent)" font-weight="700">梯度爆炸 Exploding</text>
<text x="430" y="85" font-size="12" fill="var(--fg-dim)">权重初始化过大 (如 std=10)</text>
<text x="430" y="108" font-size="12" fill="var(--fg-dim)">每层梯度×权重 → 指数级放大</text>
<text x="430" y="131" font-size="12" fill="var(--fg-dim)">→ loss=NaN, 模型崩溃</text>
<text x="430" y="154" font-size="12" fill="var(--success)">解决: 梯度裁剪, Xavier/Kaiming初始化</text>
<text x="400" y="210" text-anchor="middle" font-size="13" fill="var(--accent-2)">核心: 保持梯度在各层间的稳定流动 = 深度网络可训练的关键</text>`;
    }
  },
  {
    title: "总结：backward 的完整链路",
    grad: "loss.backward() → optimizer.step()",
    desc: '完整流程：<br>1. <b>forward</b>：数据流过网络，构建计算图，缓存中间值<br>2. <b>loss</b>：把预测和标签的差距压缩成一个标量<br>3. <b>backward</b>：从 loss 开始，链式法则逐层回传，每个参数得到梯度<br>4. <b>zero_grad + step</b>：清零旧梯度 → 用新梯度更新参数<br><br>框架（PyTorch/TF）自动处理 1-3，你只需关注模型架构和训练逻辑。',
    badges: [{t:'完整链路',c:'def'},{t:'框架自动',c:'tip'},{t:'下一节→',c:'tip'}],
    render(svg){
      svg.innerHTML = `<rect x="20" y="30" width="170" height="50" rx="8" fill="var(--grad)" opacity=".7"/><text x="105" y="60" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">1. Forward Pass</text>
<text x="105" y="95" text-anchor="middle" font-size="11" fill="var(--fg-dim)">数据→预测,建图</text>
<text x="220" y="60" text-anchor="middle" font-size="22" fill="var(--fg-dim)">→</text>
<rect x="240" y="30" width="170" height="50" rx="8" fill="var(--accent)" opacity=".7"/><text x="325" y="60" text-anchor="middle" font-size="13" fill="#1e1a1a" font-weight="700">2. Compute Loss</text>
<text x="325" y="95" text-anchor="middle" font-size="11" fill="#1e1a1a">标量:差距大小</text>
<text x="440" y="60" text-anchor="middle" font-size="22" fill="var(--fg-dim)">→</text>
<rect x="460" y="30" width="170" height="50" rx="8" fill="var(--accent-2)" opacity=".7"/><text x="545" y="60" text-anchor="middle" font-size="13" fill="#1e1a1a" font-weight="700">3. Backward</text>
<text x="545" y="95" text-anchor="middle" font-size="11" fill="#1e1a1a">链式求导,回传梯度</text>
<text x="660" y="60" text-anchor="middle" font-size="22" fill="var(--fg-dim)">→</text>
<rect x="680" y="30" width="110" height="50" rx="8" fill="var(--success)" opacity=".7"/><text x="735" y="60" text-anchor="middle" font-size="13" fill="#1e1a1a" font-weight="700">4. Update</text>
<text x="735" y="95" text-anchor="middle" font-size="11" fill="#1e1a1a">W-=lr×grad</text>

  s.render(svg);
  document.querySelectorAll('.step-dot').forEach((d,i)=>{d.className='step-dot'+(i===step?' active':i<step?' done':'');});

function gotoStep(n){step=Math.max(0,Math.min(n,steps.length-1));renderStep();}
function changeStep(d){gotoStep(step+d);}
function resetStep(){stopAuto();gotoStep(0);}
function toggleAuto(){timer?stopAuto():startAuto();}
function startAuto(){timer=setInterval(()=>{if(step<steps.length-1)gotoStep(step+1);else stopAuto();},1800);document.getElementById('btnAuto').textContent='⏸ 暂停';}
function stopAuto(){clearInterval(timer);timer=null;document.getElementById('btnAuto').textContent='▶ 自动';}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')changeStep(-1);if(e.key==='ArrowRight')changeStep(1);if(e.key===' ')e.preventDefault(),toggleAuto();if(e.key==='r'||e.key==='R')resetStep();});
renderStep();
