<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>前向传播可视化 · 深度学习框架</title>
<style>
:root{--bg:#1e1a1a;--bg-soft:#2d2525;--bg-code:#141010;--fg:#f0e8e0;--fg-dim:#b0a090;--line:#3d3030;--accent:#ff9050;--accent-2:#ffc040;--grad:#7b8cff;--success:#50d890;--danger:#f05060;--shadow:0 10px 30px rgba(0,0,0,.35);--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}
.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}
.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
.demo-header h1{font-size:20px;font-weight:700}
.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}
.demo-header .breadcrumb a{color:var(--accent);text-decoration:none}
.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}
.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:14px}
.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}
.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge--def{background:rgba(123,140,255,.18);color:var(--grad)}
.badge--tip{background:rgba(80,216,144,.18);color:var(--success)}
.badge--warn{background:rgba(240,80,96,.18);color:var(--danger)}
.panel-explain .activations{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--fg-dim);padding:10px;background:var(--bg-code);border-radius:var(--radius-sm);max-height:160px;overflow-y:auto;line-height:1.8}
.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.panel-stage svg{max-width:100%;max-height:100%}
.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}
.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;transition:.15s}
.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}
.demo-controls button:disabled{opacity:.35;cursor:default}
.step-dots{display:flex;gap:8px;align-items:center}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}
.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}
.step-dot.done{background:var(--success)}
.nd{transition:all .4s}
.nd rect{transition:all .4s}
.flow{transition:all .5s}
@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-header">
    <div><h1>前向传播可视化</h1><div class="breadcrumb"><a href="../index.html">深度学习框架</a> / 第一章 / 03</div></div>
    <span class="badge badge--def">forward pass</span>
  </div>
  <div class="demo-main">
    <div class="panel-explain" id="explain">
      <div class="step-title" id="stepTitle">准备输入数据</div>
      <div class="step-desc" id="stepDesc">前向传播 = 数据从输入层流向输出层的过程。每一步：<b>接收上层的输出 → 经过当前层变换 → 传给下一层</b>。<br><br>我们追踪一个简单的二分类网络：输入 4 维特征 → Linear(4,3) → ReLU → Linear(3,2) → Sigmoid。</div>
      <div class="activations" id="activations">输入 x = [0.5, -0.3, 0.8, 0.1]</div>
      <div class="badge-row" id="badges"><span class="badge badge--def">4维输入</span></div>
    </div>
    <div class="panel-stage" id="stage"></div>
  </div>
  <div class="demo-controls">
    <button id="btnPrev" onclick="changeStep(-1)">← 上一步</button>
    <div class="step-dots" id="dots"></div>
    <button id="btnNext" onclick="changeStep(1)">下一步 →</button>
    <button onclick="resetStep()">⟳ 重置</button>
    <button id="btnAuto" onclick="toggleAuto()">▶ 自动</button>
  </div>
</div>

<script>
const steps=[
  {title:"准备输入数据",desc:'前向传播 = 数据从输入层流向输出层的过程。每一步：<b>接收上层的输出 → 经过当前层变换 → 传给下一层</b>。<br><br>我们追踪一个简单的二分类网络：输入 4 维特征 → Linear(4,3) → ReLU → Linear(3,2) → Sigmoid。',acts:'输入 x = [0.5, -0.3, 0.8, 0.1]',badges:[{t:'4维输入',c:'def'}],active:[],highlight:null},
  {title:"Linear(4,3) 全连接",desc:'<b>y = xWᵀ + b</b>。4 维输入 × 权重矩阵 (3,4)ᵀ = 3 维输出。<br><br>这是<b>仿射变换</b>——每个输出神经元是全部输入的加权和加上偏置。权重的每个值决定了对应输入特征的重要性。',acts:'h₁ = x·W₁ᵀ + b₁ = [0.42, -0.15, 0.63]',badges:[{t:'仿射变换',c:'warn'},{t:'4→3',c:'def'}],active:['input','fc1'],highlight:null},
  {title:"ReLU 激活",desc:'<b>h₁\' = max(0, h₁)</b>。负值 -0.15 被清零，正值保留。<br><br>ReLU 的作用：引入非线性 + 稀疏激活（约 50% 神经元输出 0）。这防止了梯度消失，让深层网络可训练。',acts:'h₁\' = ReLU(h₁) = [0.42, 0.00, 0.63]',badges:[{t:'非线性',c:'tip'},{t:'负值清零',c:'warn'}],active:['input','fc1','relu'],highlight:null},
  {title:"Linear(3,2) 输出层",desc:'<b>h₂ = h₁\'·W₂ᵀ + b₂</b>。3 维隐层 → 2 维输出，对应二分类的两个 logit。<br><br>输出 [0.85, -0.30] 还不是概率——正值倾向类别 0，负值倾向类别 1。需要 Sigmoid 转为概率。',acts:'h₂ = h₁\'·W₂ᵀ + b₂ = [0.85, -0.30]',badges:[{t:'logits',c:'def'},{t:'3→2',c:'def'}],active:['input','fc1','relu','fc2'],highlight:null},
  {title:"Sigmoid 输出概率",desc:'<b>p = σ(h₂) = 1/(1+e⁻ʰ²)</b>。把 logits 映射到 (0,1) 区间。<br><br>Sigmoid(0.85) ≈ 0.70，Sigmoid(-0.30) ≈ 0.43。预测：类别 0 概率 70%，高于类别 1。如果阈值 0.5，预测为类别 0。',acts:'p = Sigmoid(h₂) = [0.70, 0.43] → 预测类别 0',badges:[{t:'概率',c:'tip'},{t:'Sigmoid',c:'warn'}],active:['input','fc1','relu','fc2','sigmoid'],highlight:'sigmoid'},
  {title:"完整前向传播总结",desc:'前向传播的每一步都是<b>可微的</b>——这意味着反向传播时梯度可以沿着同一条路径流回去。<br><br>框架（PyTorch/TensorFlow）在你调用 <code>model(x)</code> 时自动记录每一步的操作，构建计算图，为后续的 loss 计算和 backward 做准备。',acts:'Input → Linear → ReLU → Linear → Sigmoid → Prediction',badges:[{t:'可微',c:'tip'},{t:'自动构建图',c:'def'}],active:['input','fc1','relu','fc2','sigmoid'],highlight:null}
];

const NODE_DEFS=[
  {id:'input',label:'Input',sh:'4',x:60,y:180,w:90,h:56,color:'grad'},
  {id:'fc1',label:'Linear',sh:'4→3',x:210,y:180,w:100,h:56,color:'grad'},
  {id:'relu',label:'ReLU',sh:'3',x:370,y:180,w:90,h:56,color:'success'},
  {id:'fc2',label:'Linear',sh:'3→2',x:520,y:180,w:100,h:56,color:'accent'},
  {id:'sigmoid',label:'Sigmoid',sh:'2→2',x:680,y:180,w:110,h:56,color:'accent-2'},
  {id:'pred',label:'Pred',sh:'类别0',x:850,y:180,w:90,h:56,color:'accent-2'},
];

function drawFlow(activeIds,highlightId){
  svg.querySelectorAll('.nd,.flow,.edge-line').forEach(e=>e.remove());
  const activeSet=new Set(activeIds);
  // Edges
  for(let i=0;i<NODE_DEFS.length-1;i++){
    const fn=NODE_DEFS[i],tn=NODE_DEFS[i+1];
    const bothActive=activeSet.has(fn.id)&&activeSet.has(tn.id);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',fn.x+fn.w);line.setAttribute('y1',fn.y+fn.h/2);
    line.setAttribute('x2',tn.x);line.setAttribute('y2',tn.y+tn.h/2);
    line.setAttribute('stroke',bothActive?'var(--accent)':'var(--line)');
    line.setAttribute('stroke-width',bothActive?'3':'1.5');
    line.setAttribute('opacity',bothActive?'1':'.3');
    line.classList.add('edge-line');
    if(bothActive){
      const anim=document.createElementNS('http://www.w3.org/2000/svg','animate');
      anim.setAttribute('attributeName','stroke-dashoffset');
      anim.setAttribute('from','20');anim.setAttribute('to','0');
      anim.setAttribute('dur','0.6s');anim.setAttribute('repeatCount','indefinite');
      line.setAttribute('stroke-dasharray','8 4');
      line.appendChild(anim);
    }
    svg.appendChild(line);
  }
  // Data flow dots
  if(activeIds.length>=2){
    for(let i=0;i<activeIds.length-1;i++){
      const fn=NODE_DEFS.find(n=>n.id===activeIds[i]);
      const tn=NODE_DEFS.find(n=>n.id===activeIds[i+1]);
      if(!fn||!tn)continue;
      const cx=fn.x+fn.w,cy=fn.y+fn.h/2;
      const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',cx);dot.setAttribute('cy',cy);dot.setAttribute('r','5');
      dot.setAttribute('fill','var(--accent-2)');dot.classList.add('flow');
      const anim=document.createElementNS('http://www.w3.org/2000/svg','animate');
      anim.setAttribute('attributeName','cx');
      anim.setAttribute('from',fn.x+fn.w);anim.setAttribute('to',tn.x);
      anim.setAttribute('dur','1.5s');anim.setAttribute('repeatCount','indefinite');
      dot.appendChild(anim);
      svg.appendChild(dot);
    }
  }
  // Nodes
  NODE_DEFS.forEach(n=>{
    const isActive=activeSet.has(n.id);
    const isHighlight=n.id===highlightId;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.classList.add('nd');
    const colors={accent:'#ff9050','accent-2':'#ffc040',grad:'#7b8cff',success:'#50d890'};
    const fill=colors[n.color]||'#7b8cff';
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',n.x);r.setAttribute('y',n.y);r.setAttribute('width',n.w);r.setAttribute('height',n.h);
    r.setAttribute('rx','10');
    r.setAttribute('fill',isActive?fill:'var(--bg-soft)');
    r.setAttribute('stroke',isHighlight?'var(--accent-2)':isActive?fill:'var(--line)');
    r.setAttribute('stroke-width',isHighlight?'3':isActive?'2':'1');
    r.setAttribute('opacity',isActive?'1':'.4');
    g.appendChild(r);
    const t1=document.createElementNS('http://www.w3.org/2000/svg','text');
    t1.setAttribute('x',n.x+n.w/2);t1.setAttribute('y',n.y+24);
    t1.setAttribute('text-anchor','middle');t1.setAttribute('font-size','13');t1.setAttribute('font-weight','700');
    t1.setAttribute('fill',isActive?'#1e1a1a':'var(--fg-dim)');t1.textContent=n.label;g.appendChild(t1);
    const t2=document.createElementNS('http://www.w3.org/2000/svg','text');
    t2.setAttribute('x',n.x+n.w/2);t2.setAttribute('y',n.y+44);
    t2.setAttribute('text-anchor','middle');t2.setAttribute('font-size','11');
    t2.setAttribute('fill',isActive?'rgba(30,26,26,.7)':'var(--fg-dim)');
    t2.textContent=n.sh;g.appendChild(t2);
    if(isHighlight){
      const glow=document.createElementNS('http://www.w3.org/2000/svg','rect');
      glow.setAttribute('x',n.x-4);glow.setAttribute('y',n.y-4);glow.setAttribute('width',n.w+8);glow.setAttribute('height',n.h+8);
      glow.setAttribute('rx','12');glow.setAttribute('fill','none');glow.setAttribute('stroke','var(--accent-2)');glow.setAttribute('stroke-width','3');
      glow.setAttribute('opacity','0.7');
      const a2=document.createElementNS('http://www.w3.org/2000/svg','animate');
      a2.setAttribute('attributeName','opacity');a2.setAttribute('values','1;0.3;1');
      a2.setAttribute('dur','1s');a2.setAttribute('repeatCount','indefinite');
      glow.appendChild(a2);
      g.appendChild(glow);
    }
    svg.appendChild(g);
  });
}

let step=0,timer=null;
const dotsEl=document.getElementById('dots'),svgEl=document.getElementById('stage');
svgEl.innerHTML='<svg viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--fg-dim)"/></marker></defs></svg>';
const svg=svgEl.querySelector('svg');
for(let i=0;i<steps.length;i++){let d=document.createElement('div');d.className='step-dot';d.onclick=()=>gotoStep(i);dotsEl.appendChild(d);}

function renderStep(){
  const s=steps[step];
  document.getElementById('stepTitle').textContent=s.title;
  document.getElementById('stepDesc').innerHTML=s.desc;
  document.getElementById('activations').textContent=s.acts;
  let bd=document.getElementById('badges');bd.innerHTML='';
  s.badges.forEach(b=>{let sp=document.createElement('span');sp.className='badge badge--'+b.c;sp.textContent=b.t;bd.appendChild(sp);});
  drawFlow(s.active,s.highlight);
  document.querySelectorAll('.step-dot').forEach((d,i)=>{d.className='step-dot'+(i===step?' active':i<step?' done':'');});
  document.getElementById('btnPrev').disabled=step===0;
  document.getElementById('btnNext').disabled=step===steps.length-1;
}
function gotoStep(n){step=Math.max(0,Math.min(n,steps.length-1));renderStep();}
function changeStep(d){gotoStep(step+d);}
function resetStep(){stopAuto();gotoStep(0);}
function toggleAuto(){timer?stopAuto():startAuto();}
function startAuto(){timer=setInterval(()=>{if(step<steps.length-1)gotoStep(step+1);else stopAuto();},1600);document.getElementById('btnAuto').textContent='⏸ 暂停';}
function stopAuto(){clearInterval(timer);timer=null;document.getElementById('btnAuto').textContent='▶ 自动';}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')changeStep(-1);if(e.key==='ArrowRight')changeStep(1);if(e.key===' ')e.preventDefault(),toggleAuto();if(e.key==='r'||e.key==='R')resetStep();});
renderStep();
</script>
</body>
</html>
