<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>实验报告整理 · 深度学习框架</title>
<style>
:root{
  --bg:#1e1a1a; --bg-soft:#2d2525; --bg-code:#141010;
  --fg:#f0e8e0; --fg-dim:#b0a090; --line:#3d3030;
  --accent:#ff9050; --accent-2:#ffc040;
  --success:#50d890; --danger:#f05060; --purple:#7b8cff;
  --shadow:0 10px 30px rgba(0,0,0,0.35);
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);
  font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  height:100%;overflow:hidden}
code,.mono{font-family:"JetBrains Mono","Fira Code",Menlo,Consolas,monospace}
.demo-shell{display:flex;flex-direction:column;height:100vh}
.demo-header{
  display:flex;align-items:center;gap:16px;padding:12px 22px;
  background:linear-gradient(90deg,#2a2222,#352a2a);
  border-bottom:1px solid var(--line);box-shadow:var(--shadow)
}
.demo-header h1{font-size:18px;margin:0;letter-spacing:.5px}
.demo-header h1 .sub{color:var(--fg-dim);font-weight:400;margin-left:8px;font-size:13px}
.back-btn{color:var(--fg);text-decoration:none;padding:6px 12px;border:1px solid var(--line);
  border-radius:var(--radius-sm);background:var(--bg-soft);font-size:13px;transition:all .2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.header-spacer{flex:1}
.shape-badge{padding:6px 14px;background:var(--bg-code);border:1px solid var(--line);
  border-radius:var(--radius-sm);color:var(--accent);font-size:14px}
.demo-main{flex:1;display:flex;min-height:0}
.panel-explain{width:32%;min-width:340px;padding:18px 20px;overflow-y:auto;
  background:var(--bg-soft);border-right:1px solid var(--line)}
.panel-stage{flex:1;position:relative;background:var(--bg);overflow:hidden}
.phase-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;
  background:rgba(255,144,80,.12);color:var(--accent);
  border:1px solid rgba(255,144,80,.35);margin-bottom:10px}
.step-title{font-size:20px;margin:0 0 10px;line-height:1.4}
.step-body{font-size:14px;line-height:1.75;color:var(--fg)}
.step-body p{margin:8px 0}
.step-body code{background:var(--bg-code);padding:1px 6px;border-radius:4px;color:var(--accent);font-size:13px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;
  margin-right:6px;font-weight:600;letter-spacing:.5px}
.badge--def{background:rgba(123,140,255,.18);color:var(--purple);border:1px solid rgba(123,140,255,.4)}
.badge--tip{background:rgba(80,216,144,.15);color:var(--success);border:1px solid rgba(80,216,144,.4)}
.badge--warn{background:rgba(240,80,96,.15);color:var(--danger);border:1px solid rgba(240,80,96,.4)}
.tip-block{border-left:3px solid var(--accent);padding:8px 12px;margin:10px 0;
  background:rgba(255,144,80,.06);border-radius:4px;font-size:13px;line-height:1.7}
.stage-title{position:absolute;top:14px;left:24px;font-size:13px;color:var(--fg-dim);z-index:2;
  display:flex;align-items:center;gap:6px}
.stage-title .num{display:inline-block;padding:2px 8px;border-radius:4px;
  background:var(--accent);color:var(--bg);font-weight:800;font-size:12px}
.stage-svg{width:100%;height:100%}
.demo-controls{display:flex;align-items:center;gap:10px;padding:10px 22px;
  background:var(--bg-soft);border-top:1px solid var(--line);box-shadow:var(--shadow)}
.ctrl-btn{padding:6px 14px;font-size:13px;font-weight:600;border:1px solid var(--line);
  border-radius:var(--radius-sm);background:var(--bg);color:var(--fg-dim);
  cursor:pointer;transition:all .2s;font-family:inherit}
.ctrl-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.ctrl-btn:disabled{opacity:.3;cursor:default}
.ctrl-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.ctrl-btn.primary:hover:not(:disabled){background:var(--accent-2)}
.step-indicator{display:flex;gap:5px;flex:1;justify-content:center;align-items:center;overflow-x:auto}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:all .3s;
  cursor:pointer;flex-shrink:0}
.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent);transform:scale(1.3)}
.step-dot.done{background:var(--success)}
@media(max-width:860px){.demo-main{flex-direction:column}.panel-explain{width:100%;min-width:0;max-height:40vh}}
</style>
</head>
<body>
<div class="demo-shell">
<header class="demo-header">
  <a class="back-btn" href="../index.html">← 返回目录</a>
  <h1>实验报告整理<span class="sub">代码 · 曲线 · 结论</span></h1>
  <span class="header-spacer"></span>
  <span class="shape-badge" id="stepBadge">1/16</span>
</header>

<div class="demo-main">
<section class="panel-explain" id="explainPanel"></section>
<section class="panel-stage">
  <div class="stage-title"><span class="num">实验报告</span> 可视化区域</div>
  <svg class="stage-svg" id="stageSvg" viewBox="0 0 800 520"></svg>
</section>
</div>

<footer class="demo-controls">
  <button class="ctrl-btn" id="btnReset" title="R">↺ 重置</button>
  <button class="ctrl-btn" id="btnPrev" title="←">◀ 上一步</button>
  <button class="ctrl-btn primary" id="btnNext" title="→">下一步 ▶</button>
  <button class="ctrl-btn" id="btnAuto" title="Space">▶ 自动</button>
  <div class="step-indicator" id="stepDots"></div>
</footer>
</div>

<script>
const W=800,H=520;
const steps=[
  {phase:"报告结构",title:"一份完整的实验报告",body:`<p>深度学习实验报告不是简单记录"跑了什么模型"，而是<code>用证据支撑结论</code>的完整叙事。</p>
  <p><span class="badge badge--def">标准结构</span> 标题 → 摘要 → 引言 → 方法 → 实验 → 结论</p>
  <div class="tip-block">📋 <b>核心原则：</b>任何人不看代码，只读报告就能复现你的实验。</div>`,
   draw(g){g.reportSkeleton()}},
  {phase:"报告结构",title:"标题与摘要 — 第一印象",body:`<p><span class="badge badge--tip">标题</span> 要包含<code>任务+方法+数据集</code>三要素。</p>
  <p>例：<code>MLP vs CNN 在 CIFAR-10 上的分类性能对比</code></p>
  <p><span class="badge badge--tip">摘要</span> 4句话模板：①问题是什么 ②用了什么方法 ③核心实验结果 ④主要结论</p>`,
   draw(g){g.titleAbstract()}},
  {phase:"报告结构",title:"引言与相关工作",body:`<p>引言回答三个问题：</p>
  <p>① <span class="badge badge--def">Why</span> 为什么这个任务重要？</p>
  <p>② <span class="badge badge--def">What</span> 已有方法做了什么？还有什么不足？</p>
  <p>③ <span class="badge badge--def">How</span> 你的方法如何改进？</p>
  <div class="tip-block">💡 引言是"倒三角"结构：从大背景逐步聚焦到你的具体贡献。</div>`,
   draw(g){g.introduction()}},
  {phase:"方法记录",title:"模型架构文档化",body:`<p>报告中必须包含<code>模型架构图或表格</code>：</p>
  <p>每层：<code>类型 → 输入shape → 输出shape → 参数量</code></p>
  <p><span class="badge badge--warn">常见遗漏</span> 激活函数类型、初始化方式、归一化层位置</p>`,
   draw(g){g.modelArch()}},
  {phase:"方法记录",title:"超参数清单",body:`<p>完整记录所有训练配置：</p>
  <p><code>lr=0.001, batch_size=64, epochs=50</code></p>
  <p><code>optimizer=Adam(β₁=0.9,β₂=0.999)</code></p>
  <p><span class="badge badge--warn">关键</span> 学习率调度策略（StepLR/CosineAnnealing）直接影响收敛！</p>`,
   draw(g){g.hyperparams()}},
  {phase:"方法记录",title:"数据预处理文档",body:`<p>数据部分需要说明：</p>
  <p>① 数据集来源与版本（如 CIFAR-10 v1.0）</p>
  <p>② 训练/验证/测试划分比例（如 7:1.5:1.5）</p>
  <p>③ 预处理流程：<code>Resize → ToTensor → Normalize</code></p>
  <p>④ 数据增强策略（RandomCrop, RandomHorizontalFlip）</p>`,
   draw(g){g.dataPrep()}},
  {phase:"训练曲线",title:"Loss 曲线 — 核心诊断工具",body:`<p>同时绘制<code>训练loss</code>和<code>验证loss</code>：</p>
  <p><span class="badge badge--warn">过拟合</span> 训练loss↓ 验证loss↑，两条曲线"开口"变大</p>
  <p><span class="badge badge--tip">正常收敛</span> 两条曲线同步下降并趋于平稳</p>
  <p><span class="badge badge--def">欠拟合</span> 两条曲线都在高位，模型容量不足</p>`,
   draw(g){g.lossCurves()}},
  {phase:"训练曲线",title:"准确率曲线与早停",body:`<p>在验证集准确率最高的点保存模型：</p>
  <p><code>best_model = model with max(val_acc)</code></p>
  <p><span class="badge badge--tip">Early Stopping</span> 验证指标连续N个epoch不提升就停止训练，防止过拟合。</p>`,
   draw(g){g.accCurves()}},
  {phase:"训练曲线",title:"混淆矩阵 — 分类问题必备",body:`<p>混淆矩阵展示每类样本被分到哪一类：</p>
  <p>对角线 = 正确分类，非对角线 = 错误分类</p>
  <p>从错误中分析：哪些类别容易混淆？数据不平衡是否存在？</p>`,
   draw(g){g.confusionMatrix()}},
  {phase:"模型对比",title:"公平对比的三原则",body:`<p><span class="badge badge--def">1</span> 相同数据划分 — 所有模型用同一份 train/val/test</p>
  <p><span class="badge badge--def">2</span> 相同预处理 — 数据增强、归一化必须一致</p>
  <p><span class="badge badge--def">3</span> 多次运行取均值±标准差 — 至少跑3次消除随机性</p>`,
   draw(g){g.fairComparison()}},
  {phase:"模型对比",title:"结果对比表",body:`<p>标准对比表格包含：</p>
  <p>模型 | 参数量 | 训练时间 | Train Acc | Val Acc | Test Acc</p>
  <p><span class="badge badge--tip">最佳</span> 用<b>粗体</b>标注最优结果</p>
  <p>建议从简单baseline（逻辑回归/随机森林）逐步到复杂模型</p>`,
   draw(g){g.comparisonTable()}},
  {phase:"模型对比",title:"过拟合量化指标",body:`<p><span class="badge badge--def">LOR</span> 对数过拟合比 = log(MAE_train / MAE_test)</p>
  <p>LOR=0 理想 | LOR&lt;0 过拟合 | LOR&gt;0 欠拟合</p>
  <p><span class="badge badge--def">COS</span> 综合过拟合分 = α×(MAE_train/MAE_test) + β×(σ_train/σ_test)</p>
  <p>COS≈1 最优泛化 | COS&gt;1 过拟合+不稳定</p>`,
   draw(g){g.overfitMetrics()}},
  {phase:"可视化",title:"预测 vs 真实值散点图",body:`<p>回归任务：横轴=真实值，纵轴=预测值</p>
  <p>理想情况所有点落在 y=x 对角线上</p>
  <p>偏离对角线越远 → 预测误差越大</p>
  <p><span class="badge badge--tip">建议</span> 同时标注 R² 和 MAE 在图上</p>`,
   draw(g){g.predVsTrue()}},
  {phase:"可视化",title:"特征重要性与可解释性",body:`<p>不仅仅是"模型多准确"，还要问"模型为什么这样判断"：</p>
  <p>① 权重可视化（第一层卷积核）</p>
  <p>② 特征重要性排序（随机森林/Gradient Boosting）</p>
  <p>③ 注意力热力图（Transformer模型）</p>`,
   draw(g){g.featureImportance()}},
  {phase:"结论",title:"结论与未来工作",body:`<p>结论部分三段式：</p>
  <p>① 回顾核心发现（用数字说话）</p>
  <p>② 分析局限性与意外发现</p>
  <p>③ 提出下一步改进方向</p>
  <div class="tip-block">📝 <b>最终检查清单：</b>超参数表 ✓ | 训练曲线 ✓ | 混淆矩阵 ✓ | 对比表 ✓ | 过拟合指标 ✓</div>`,
   draw(g){g.conclusion()}},
  {phase:"总结",title:"实验报告 = 可复现的科学记录",body:`<p>从本章开始，你的每次训练都应该：</p>
  <p>✅ 记录完整的超参数和配置</p>
  <p>✅ 绘制训练/验证曲线（loss + accuracy）</p>
  <p>✅ 用对比表展示多模型结果</p>
  <p>✅ 量化过拟合程度（LOR/COS）</p>
  <p>✅ 保存最佳模型和实验日志</p>
  <p><span class="badge badge--tip">下一步</span> 将实验报告模板应用到你的项目中！</p>`,
   draw(g){g.finalSummary()}},
];

const g={
  svg:null,
  clear(){while(this.svg.firstChild)this.svg.removeChild(this.svg.firstChild)},
  text(x,y,t,opt={}){
    const el=document.createElementNS("http://www.w3.org/2000/svg","text");
    el.setAttribute("x",x);el.setAttribute("y",y);el.setAttribute("fill",opt.fill||"#f0e8e0");
    el.setAttribute("font-size",opt.size||14);el.setAttribute("text-anchor",opt.anchor||"start");
    if(opt.weight)el.setAttribute("font-weight",opt.weight);
    if(opt.family)el.setAttribute("font-family",opt.family);
    el.textContent=t;this.svg.appendChild(el);return el},
  rect(x,y,w,h,opt={}){
    const el=document.createElementNS("http://www.w3.org/2000/svg","rect");
    el.setAttribute("x",x);el.setAttribute("y",y);el.setAttribute("width",w);el.setAttribute("height",h);
    el.setAttribute("fill",opt.fill||"#2d2525");el.setAttribute("rx",opt.rx||4);
    if(opt.stroke){el.setAttribute("stroke",opt.stroke);el.setAttribute("stroke-width",opt.sw||1)}
    if(opt.dash)el.setAttribute("stroke-dasharray",opt.dash);
    this.svg.appendChild(el);return el},
  line(x1,y1,x2,y2,opt={}){
    const el=document.createElementNS("http://www.w3.org/2000/svg","line");
    el.setAttribute("x1",x1);el.setAttribute("y1",y1);el.setAttribute("x2",x2);el.setAttribute("y2",y2);
    el.setAttribute("stroke",opt.stroke||"#3d3030");el.setAttribute("stroke-width",opt.sw||1.5);
    if(opt.dash)el.setAttribute("stroke-dasharray",opt.dash);
    this.svg.appendChild(el);return el},
  circle(cx,cy,r,opt={}){
    const el=document.createElementNS("http://www.w3.org/2000/svg","circle");
    el.setAttribute("cx",cx);el.setAttribute("cy",cy);el.setAttribute("r",r);
    el.setAttribute("fill",opt.fill||"#ff9050");this.svg.appendChild(el);return el},

  reportSkeleton(){
    const bw=140,bh=50,gap=20,sx=50,y=200;
    const labels=["标题","摘要","引言","方法","实验","结论"];
    const colors=["#ff9050","#ffc040","#7b8cff","#50d890","#f05060","#ff9050"];
    labels.forEach((l,i)=>{
      const x=sx+i*(bw+gap);
      this.rect(x,y,bw,bh,{fill:colors[i]+"22",stroke:colors[i],rx:8,sw:2});
      this.text(x+bw/2,y+bh/2+5,l,{fill:colors[i],size:15,anchor:"middle",weight:"700"});
      if(i<labels.length-1){this.line(x+bw,y+bh/2,x+bw+gap,y+bh/2,{stroke:colors[i],sw:2});this.circle(x+bw+gap,y+bh/2,4,{fill:colors[i]})}
    });
    this.text(50,160,"📄 实验报告标准六段式结构",{size:16,weight:"700"});
    const qs=["研究什么?","发现了什么?","为什么做?","怎么做的?","结果如何?","意味着什么?"];
    qs.forEach((q,i)=>{const x=sx+i*(bw+gap);this.text(x+bw/2,y+bh+28,q,{size:10,anchor:"middle",fill:"#b0a090"})});
  },

  titleAbstract(){
    this.rect(180,140,440,280,{fill:"#2d2525",stroke:"#ff9050",rx:10,sw:2});
    this.text(210,180,"标题: MLP vs CNN 在 CIFAR-10",{size:18,weight:"700",fill:"#ff9050"});
    this.text(210,205,"上的分类性能对比",{size:18,weight:"700",fill:"#ff9050"});
    this.line(210,225,590,225,{stroke:"#3d3030"});
    this.text(210,255,"摘要",{size:16,weight:"700",fill:"#50d890"});
    this.text(210,285,"① 图像分类是CV基础任务，模型选择影响性能",{size:12,fill:"#b0a090"});
    this.text(210,308,"② 对比MLP/CNN/ResNet在CIFAR-10上的表现",{size:12,fill:"#b0a090"});
    this.text(210,331,"③ CNN准确率92.3% > MLP 58.7%，参数量仅1.2M",{size:12,fill:"#f0e8e0"});
    this.text(210,354,"④ 卷积归纳偏置对小样本图像分类至关重要",{size:12,fill:"#b0a090"});
    this.text(210,390,"⭐ 4句话: 问题→方法→结果→结论",{size:12,fill:"#ffc040",weight:"700"});
  },

  introduction(){
    this.circle(400,130,8,{fill:"#ff9050"});this.text(415,135,"AI for Science 成为新范式",{size:11,fill:"#b0a090"});
    this.line(400,145,400,170,{stroke:"#3d3030"});
    this.rect(340,170,120,36,{fill:"rgba(123,140,255,.15)",stroke:"#7b8cff",rx:6});
    this.text(400,193,"图像分类广泛应用",{size:12,fill:"#7b8cff",anchor:"middle"});
    this.line(400,210,400,235,{stroke:"#3d3030"});
    this.rect(310,235,180,36,{fill:"rgba(80,216,144,.15)",stroke:"#50d890",rx:6});
    this.text(400,258,"已有CNN方法缺少系统对比",{size:12,fill:"#50d890",anchor:"middle"});
    this.line(400,275,400,300,{stroke:"#3d3030"});
    this.rect(280,300,240,40,{fill:"rgba(255,144,80,.2)",stroke:"#ff9050",rx:8,sw:2});
    this.text(400,325,"本文：公平对比 + 过拟合量化分析",{size:13,fill:"#ff9050",anchor:"middle",weight:"700"});
    this.text(50,440,"倒三角结构：从宏观背景聚焦到具体贡献",{size:12,fill:"#b0a090"});
  },

  modelArch(){
    const layers=[{n:"Conv2d(3,32)",i:"[B,3,32,32]",o:"[B,32,28,28]",p:"2,432",c:"#7b8cff"},
      {n:"ReLU + MaxPool",i:"[B,32,28,28]",o:"[B,32,14,14]",p:"0",c:"#50d890"},
      {n:"Conv2d(32,64)",i:"[B,32,14,14]",o:"[B,64,10,10]",p:"51,264",c:"#7b8cff"},
      {n:"Flatten + Linear",i:"[B,6400]",o:"[B,10]",p:"64,010",c:"#ffc040"}];
    layers.forEach((l,i)=>{
      const y=120+i*90;
      this.rect(50,y,700,75,{fill:l.c+"15",stroke:l.c,rx:8,sw:1.5});
      this.text(70,y+25,l.n,{size:14,weight:"700",fill:l.c});
      this.text(70,y+50,"in: "+l.i+"  →  out: "+l.o,{size:11,fill:"#b0a090",family:"JetBrains Mono"});
      this.text(70,y+68,"参数量: "+l.p,{size:11,fill:"#ff9050",family:"JetBrains Mono"});
      if(i<layers.length-1){this.circle(400,y+80,5,{fill:l.c});this.line(400,y+85,400,y+115,{stroke:l.c,sw:2})}
    });
    this.text(50,490,"总参数量: 117,706 | 必须记录每一层的shape转换",{size:12,fill:"#b0a090"});
  },

  hyperparams(){
    const items=[{k:"learning_rate",v:"0.001",c:"#ff9050"},{k:"batch_size",v:"64",c:"#ffc040"},
      {k:"epochs",v:"50",c:"#7b8cff"},{k:"optimizer",v:"Adam",c:"#50d890"},
      {k:"weight_decay",v:"1e-4",c:"#f05060"},{k:"lr_scheduler",v:"CosineAnnealing",c:"#ff9050"},
      {k:"loss_fn",v:"CrossEntropyLoss",c:"#ffc040"},{k:"seed",v:"42",c:"#7b8cff"}];
    items.forEach((it,i)=>{

let currentStep=0,autoTimer=null,isAuto=false;
const totalSteps=steps.length;

function init(){
  g.svg=document.getElementById("stageSvg");
  const dots=document.getElementById("stepDots");
  for(let i=0;i<totalSteps;i++){const dot=document.createElement("div");dot.className="step-dot";dot.onclick=()=>goTo(i);dots.appendChild(dot)}
  render();
}
function goTo(i){if(i<0||i>=totalSteps)return;currentStep=i;render()}
function render(){
  g.clear();const s=steps[currentStep];
  document.getElementById("stepBadge").textContent=(currentStep+1)+"/"+totalSteps;
  const panel=document.getElementById("explainPanel");
  panel.innerHTML='<div class="phase-tag">'+s.phase+'</div><h2 class="step-title">'+s.title+'</h2><div class="step-body">'+s.body+'</div>';
  s.draw(g);
  const dots=document.querySelectorAll(".step-dot");
  dots.forEach((d,i)=>{d.className="step-dot"+(i===currentStep?" active":i<currentStep?" done":"")});
  document.getElementById("btnPrev").disabled=currentStep===0;
  document.getElementById("btnNext").disabled=currentStep===totalSteps-1;
}
function next(){if(currentStep<totalSteps-1){currentStep++;render()}else stopAuto()}
function prev(){if(currentStep>0){currentStep--;render()}}
function reset(){stopAuto();currentStep=0;render()}
function toggleAuto(){isAuto?stopAuto():startAuto()}
function startAuto(){isAuto=true;document.getElementById("btnAuto").textContent="⏸ 暂停";document.getElementById("btnAuto").classList.add("primary");autoTimer=setInterval(next,2000)}
function stopAuto(){isAuto=false;if(autoTimer){clearInterval(autoTimer);autoTimer=null}document.getElementById("btnAuto").textContent="▶ 自动";document.getElementById("btnAuto").classList.remove("primary")}
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight"){e.preventDefault();next()}
  else if(e.key==="ArrowLeft"){e.preventDefault();prev()}
  else if(e.key===" "||e.key==="Spacebar"){e.preventDefault();toggleAuto()}
  else if(e.key==="r"||e.key==="R"){e.preventDefault();reset()}
});
document.getElementById("btnPrev").onclick=prev;
document.getElementById("btnNext").onclick=next;
document.getElementById("btnReset").onclick=reset;
document.getElementById("btnAuto").onclick=toggleAuto;
window.onload=init;
</script>
