<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>loss 标量化 · 深度学习框架</title>
<style>
:root{--bg:#1e1a1a;--bg-soft:#2d2525;--bg-code:#141010;--fg:#f0e8e0;--fg-dim:#b0a090;--line:#3d3030;--accent:#ff9050;--accent-2:#ffc040;--grad:#7b8cff;--success:#50d890;--danger:#f05060;--shadow:0 10px 30px rgba(0,0,0,.35);--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}
.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}
.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
.demo-header h1{font-size:20px;font-weight:700}
.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}
.demo-header .breadcrumb a{color:var(--accent);text-decoration:none}
.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}
.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:14px}
.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}
.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}
.panel-explain .loss-val{font-family:"JetBrains Mono","Fira Code",monospace;font-size:28px;color:var(--accent-2);text-align:center;padding:12px;background:var(--bg-code);border-radius:var(--radius-sm);letter-spacing:2px}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge--def{background:rgba(123,140,255,.18);color:var(--grad)}
.badge--tip{background:rgba(80,216,144,.18);color:var(--success)}
.badge--warn{background:rgba(240,80,96,.18);color:var(--danger)}
.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.panel-stage svg{max-width:100%;max-height:100%}
.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}
.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;transition:.15s}
.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}
.demo-controls button:disabled{opacity:.35;cursor:default}
.step-dots{display:flex;gap:8px;align-items:center}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}
.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}
.step-dot.done{background:var(--success)}
@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-header">
    <div>
      <h1>loss 标量化</h1>
      <div class="breadcrumb"><a href="../index.html">深度学习框架</a> / 第二章 / 04</div>
    </div>
    <span class="badge badge--def">预测 → 差距 → 标量</span>
  </div>

  <div class="demo-main">
    <div class="panel-explain" id="explain">
      <div class="step-title" id="stepTitle">为什么需要 Loss</div>
      <div class="loss-val" id="lossDisplay">loss = ?</div>
      <div class="step-desc" id="stepDesc">神经网络的输出是一个<b>向量</b>（多个预测值），但我们优化需要<b>一个标量</b>来判断好坏。<br><br>loss 函数的作用：把「模型输出」和「正确答案」之间的差距压缩成一个标量。越小 = 越好。</div>
      <div class="badge-row" id="badges">
        <span class="badge badge--def">向量→标量</span><span class="badge badge--tip">越小越好</span>
      </div>
    </div>
    <div class="panel-stage" id="stage"></div>
  </div>

  <div class="demo-controls">
    <button id="btnPrev" onclick="changeStep(-1)">← 上一步</button>
    <div class="step-dots" id="dots"></div>
    <button id="btnNext" onclick="changeStep(1)">下一步 →</button>
    <button onclick="resetStep()">⟳ 重置</button>
    <button id="btnAuto" onclick="toggleAuto()">▶ 自动</button>
  </div>
</div>

<script>
const steps = [
  {
    title: "为什么需要 Loss",
    loss: "loss = ?",
    desc: '神经网络的输出是一个<b>向量</b>（多个预测值），但我们优化需要<b>一个标量</b>来判断好坏。<br><br>loss 函数的作用：把「模型输出」和「正确答案」之间的差距压缩成一个标量。<b>越小 = 越好</b>，优化器的目标就是最小化这个值。',
    badges: [{t:'向量→标量',c:'def'},{t:'越小越好',c:'tip'}],
    render(svg){
      svg.innerHTML = '<rect x="80" y="100" width="200" height="100" rx="12" fill="var(--bg-soft)" stroke="var(--grad)" stroke-width="2"/><text x="180" y="135" text-anchor="middle" font-size="16" fill="var(--grad)" font-weight="700">模型预测</text><text x="180" y="160" text-anchor="middle" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">[0.7, 0.2, 0.1]</text><text x="180" y="180" text-anchor="middle" font-size="11" fill="var(--fg-dim)">向量: 3个值</text><text x="340" y="150" text-anchor="middle" font-size="32" fill="var(--accent-2)">→</text><rect x="420" y="100" width="200" height="100" rx="12" fill="var(--bg-soft)" stroke="var(--accent)" stroke-width="2"/><text x="520" y="135" text-anchor="middle" font-size="16" fill="var(--accent)" font-weight="700">Loss 函数</text><text x="520" y="160" text-anchor="middle" font-size="13" fill="var(--accent-2)" font-family="JetBrains Mono">0.83</text><text x="520" y="180" text-anchor="middle" font-size="11" fill="var(--fg-dim)">标量: 1个值</text><text x="400" y="240" text-anchor="middle" font-size="14" fill="var(--fg-dim)">优化器只看 loss 这一个数字来调整参数</text>';
    }
  },
  {
    title: "均方误差 MSE",
    loss: "MSE = 200.0",
    desc: '回归任务最常用的 loss：<b>MSE = (1/n) Σ(y_predᵢ − y_trueᵢ)²</b>。<br><br>预测房价：预测 [300, 210, 480] 真实 [310, 200, 500]。<br>MSE = ((300-310)²+(210-200)²+(480-500)²)/3 = (100+100+400)/3 = <b>200/3 ≈ 66.7</b><br><br>平方惩罚：差 10 罚 100，对大误差特别敏感。',
    badges: [{t:'回归',c:'def'},{t:'平方惩罚',c:'warn'},{t:'对大误差敏感',c:'tip'}],
    render(svg){
      let yp=[300,210,480],yt=[310,200,500];
      let h='<text x="400" y="30" text-anchor="middle" font-size="14" fill="var(--fg-dim)">MSE = 平均平方误差 · batch=3 个样本</text>';
      for(let i=0;i<3;i++){
        let diff=yp[i]-yt[i],sq=diff*diff;
        h+=`<text x="60" y="${80+i*55}" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">样本${i+1}: pred=${yp[i]}, true=${yt[i]}</text>`;
        h+=`<text x="360" y="${80+i*55}" font-size="13" fill="var(--accent)" font-family="JetBrains Mono">误差 = ${diff>0?"+"+diff:diff}</text>`;
        h+=`<text x="550" y="${80+i*55}" font-size="13" fill="var(--accent-2)" font-family="JetBrains Mono">平方 = ${sq}</text>`;
      }
      h+=`<line x1="50" y1="235" x2="750" y2="235" stroke="var(--line)" stroke-width="1"/>`;
      h+=`<text x="60" y="265" font-size="14" fill="var(--success)" font-weight="700" font-family="JetBrains Mono">MSE = (100+100+400)/3 = 200.0</text>`;
      h+=`<text x="60" y="295" font-size="12" fill="var(--fg-dim)">异常值会因平方被急剧放大 → 模型被迫关注异常样本</text>`;
      svg.innerHTML=h;
    }
  },
  {
    title: "交叉熵 CrossEntropy",
    loss: "CE = 0.357",
    desc: '分类任务的标准 loss：<b>CE = −Σ y_trueᵢ × log(y_predᵢ)</b>。<br><br>真实标签=[1,0,0]（类别0），预测=[0.7, 0.2, 0.1]。<br>CE = −(1×log(0.7) + 0×log(0.2) + 0×log(0.1)) = <b>−log(0.7) ≈ 0.357</b><br><br>预测正确类别的概率越高 → loss 越小。如果预测概率→1.0，loss→0。',
    badges: [{t:'分类',c:'def'},{t:'负对数',c:'warn'},{t:'0~∞',c:'tip'}],
    render(svg){
      svg.innerHTML = `<rect x="40" y="40" width="720" height="140" rx="10" fill="var(--bg-soft)"/>
<text x="400" y="70" text-anchor="middle" font-size="15" fill="var(--accent)" font-weight="700">CE = -Σ 真实标签 × log(预测概率)</text>
<text x="80" y="110" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">真实: [1, 0, 0] (类别0)</text>
<text x="80" y="135" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">预测: [0.7, 0.2, 0.1]</text>
<text x="380" y="110" font-size="13" fill="var(--accent-2)" font-family="JetBrains Mono">-log(0.7) = 0.357</text>
<text x="380" y="135" font-size="13" fill="var(--accent-2)" font-family="JetBrains Mono">-log(0.2) = 1.609 × 0 = 0</text>
<text x="380" y="160" font-size="13" fill="var(--accent-2)" font-family="JetBrains Mono">-log(0.1) = 2.302 × 0 = 0</text>
<rect x="40" y="210" width="350" height="140" rx="8" fill="var(--bg-soft)" stroke="var(--success)" stroke-width="1"/>
<text x="215" y="240" text-anchor="middle" font-size="13" fill="var(--success)" font-weight="700">预测正确、高置信 ✓</text>
<text x="215" y="265" text-anchor="middle" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">pred=[0.95,0.03,0.02]</text>
<text x="215" y="290" text-anchor="middle" font-size="14" fill="var(--success)" font-family="JetBrains Mono">loss = -log(0.95) ≈ 0.051</text>
<text x="215" y="315" text-anchor="middle" font-size="11" fill="var(--fg-dim)">很小 → 模型很自信，答对了</text>
<rect x="420" y="210" width="350" height="140" rx="8" fill="var(--bg-soft)" stroke="var(--danger)" stroke-width="1"/>
<text x="595" y="240" text-anchor="middle" font-size="13" fill="var(--danger)" font-weight="700">预测错误、高置信 ✗</text>
<text x="595" y="265" text-anchor="middle" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">pred=[0.05,0.10,0.85]</text>
<text x="595" y="290" text-anchor="middle" font-size="14" fill="var(--danger)" font-family="JetBrains Mono">loss = -log(0.05) ≈ 2.996</text>
<text x="595" y="315" text-anchor="middle" font-size="11" fill="var(--fg-dim)">极大 → 自信答错，惩罚最重！</text>`;
    }
  },
  {
    title: "常用 Loss 对比",
    loss: "选对 loss = 成功一半",
    desc: '<b>回归问题</b>：MSE（最常用）、MAE（抗异常值）、Huber（折中）<br><b>分类问题</b>：CrossEntropy（多分类）、BCE（二分类）<br><b>其他</b>：KL散度（分布匹配）、Contrastive Loss（对比学习）<br><br>选错 loss 函数 = 模型在学习错误的目标。比如用 MSE 做分类，梯度信号会很弱。',
    badges: [{t:'回归vs分类',c:'def'},{t:'选对很重要',c:'warn'}],
    render(svg){
      svg.innerHTML = `<rect x="10" y="20" width="240" height="160" rx="10" fill="var(--bg-soft)" stroke="var(--grad)" stroke-width="2"/>
<text x="130" y="55" text-anchor="middle" font-size="15" fill="var(--grad)" font-weight="700">回归 Loss</text>
<text x="130" y="85" text-anchor="middle" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">MSE</text>
<text x="130" y="110" text-anchor="middle" font-size="12" fill="var(--fg-dim)">均方误差 · 最常用</text>
<text x="130" y="135" text-anchor="middle" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">MAE</text>
<text x="130" y="158" text-anchor="middle" font-size="12" fill="var(--fg-dim)">绝对误差 · 抗异常值</text>
<rect x="280" y="20" width="240" height="160" rx="10" fill="var(--bg-soft)" stroke="var(--accent)" stroke-width="2"/>
<text x="400" y="55" text-anchor="middle" font-size="15" fill="var(--accent)" font-weight="700">分类 Loss</text>
<text x="400" y="85" text-anchor="middle" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">CrossEntropy</text>
<text x="400" y="110" text-anchor="middle" font-size="12" fill="var(--fg-dim)">多分类 · 标准选择</text>
<text x="400" y="135" text-anchor="middle" font-size="13" fill="var(--fg-dim)" font-family="JetBrains Mono">BCEWithLogits</text>
<text x="400" y="158" text-anchor="middle" font-size="12" fill="var(--fg-dim)">二分类/多标签</text>
<rect x="550" y="20" width="230" height="160" rx="10" fill="var(--bg-soft)" stroke="var(--success)" stroke-width="2"/>
<text x="665" y="55" text-anchor="middle" font-size="15" fill="var(--success)" font-weight="700">特殊 Loss</text>
<text x="665" y="85" text-anchor="middle" font-size="12" fill="var(--fg-dim)">KL Divergence</text>
<text x="665" y="108" text-anchor="middle" font-size="12" fill="var(--fg-dim)">分布匹配</text>
<text x="665" y="131" text-anchor="middle" font-size="12" fill="var(--fg-dim)">Contrastive</text>
<text x="665" y="154" text-anchor="middle" font-size="12" fill="var(--fg-dim)">对比学习</text>
<text x="400" y="215" text-anchor="middle" font-size="14" fill="var(--fg-dim)">PyTorch 中都在 torch.nn 下：nn.MSELoss(), nn.CrossEntropyLoss(), nn.BCEWithLogitsLoss()</text>
<text x="400" y="245" text-anchor="middle" font-size="12" fill="var(--accent-2)">所有 loss 函数的输出 → 一个标量 → 调用 .backward() → 梯度传播</text>`;
    }
  },
  {
    title: "loss → backward 的分工",
    loss: "loss 是计算图的终点",
    desc: 'loss 在计算图中的位置：<b>数据流的最末端</b>。<br><br>Input → Layers → Prediction → <b style="color:var(--accent)">Loss(预测, 标签) → 标量</b><br><br>loss 算出之后，调用 <code>loss.backward()</code> 触发反向传播——梯度从 loss 出发，沿计算图一路回传到输入层。loss 是反向传播的「起点」。',
    badges: [{t:'计算图终点',c:'def'},{t:'backward起点',c:'warn'},{t:'下一节→',c:'tip'}],
    render(svg){
      svg.innerHTML = `<rect x="30" y="60" width="130" height="50" rx="8" fill="var(--grad)" opacity=".7"/><text x="95" y="91" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Input</text>
<text x="190" y="91" text-anchor="middle" font-size="20" fill="var(--fg-dim)">→</text>
<rect x="220" y="60" width="130" height="50" rx="8" fill="var(--grad)" opacity=".7"/><text x="285" y="91" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Model</text>
<text x="380" y="91" text-anchor="middle" font-size="20" fill="var(--fg-dim)">→</text>
<rect x="410" y="60" width="130" height="50" rx="8" fill="var(--grad)" opacity=".7"/><text x="475" y="91" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Prediction</text>
<text x="570" y="91" text-anchor="middle" font-size="20" fill="var(--fg-dim)">→</text>
<rect x="600" y="50" width="150" height="70" rx="12" fill="var(--accent)" opacity=".85"/><text x="675" y="79" text-anchor="middle" font-size="15" fill="#1e1a1a" font-weight="700">Loss 函数</text><text x="675" y="102" text-anchor="middle" font-size="13" fill="#1e1a1a" font-family="JetBrains Mono">标量: 0.357</text>
<text x="400" y="170" text-anchor="middle" font-size="14" fill="var(--accent-2)">loss.backward() → 梯度从这里出发！</text>
<line x1="675" y1="125" x2="675" y2="195" stroke="var(--accent-2)" stroke-width="3" marker-end="url(#arrowA)"/>
<text x="400" y="220" text-anchor="middle" font-size="13" fill="var(--fg-dim)">反向传播：梯度沿计算图逆向流动，更新每一个参数</text>
<rect x="600" y="195" width="150" height="55" rx="8" fill="var(--bg-soft)" stroke="var(--line)"/><text x="675" y="218" text-anchor="middle" font-size="12" fill="var(--fg-dim)">第05节详解</text><text x="675" y="238" text-anchor="middle" font-size="12" fill="var(--accent)">backward 链路→</text>`;
    }
  }
];

let step=0,timer=null;
const dotsEl=document.getElementById('dots'),svgEl=document.getElementById('stage');
svgEl.innerHTML='<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%"><defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--fg-dim)"/></marker><marker id="arrowA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="var(--accent-2)"/></marker></defs></svg>';
const svg=svgEl.querySelector('svg');

for(let i=0;i<steps.length;i++){let d=document.createElement('div');d.className='step-dot';d.onclick=()=>gotoStep(i);dotsEl.appendChild(d);}

function renderStep(){
  const s=steps[step  {
    title: "自定义损失函数: 继承 nn.Module",
    info: "Loss = Module with forward(self, pred, target)",
    desc: 'PyTorch 的损失函数都是 <b>nn.Module 的子类</b>——实现 <code>forward(pred, target) -> scalar</code> 即可在训练循环中无缝使用。<br><br><b>为什么继承 Module？</b> 损失函数可能需要可学习参数（如 Focal Loss 的 alpha、Label Smoothing 的 epsilon），或者内部状态（如统计量）。Module 的自动参数管理让这些变得简单。<br><br><code>class MyLoss(nn.Module):</code><br><code>  def forward(self, pred, target):</code><br><code>    return (pred - target).pow(2).mean()</code>',
    badges: [{t:"nn.Module",c:"def"},{t:"forward()",c:"tip"},{t:"可学习参数",c:"warn"}],
    render(svg){
      svg.innerHTML = `<text x="400" y="25" text-anchor="middle" font-size="14" fill="var(--accent)">Custom Loss = nn.Module Subclass</text><rect x="40" y="50" width="680" height="130" rx="8" fill="var(--bg-soft)" stroke="var(--grad)" stroke-width="1.5"/><text x="60" y="78" font-size="12" fill="var(--accent)">class FocalLoss(nn.Module):</text><text x="80" y="102" font-size="11" fill="var(--fg-dim)">def __init__(self, alpha=0.25, gamma=2.0):</text><text x="100" y="125" font-size="11" fill="var(--fg-dim)">self.alpha = alpha  # class weight</text><text x="100" y="148" font-size="11" fill="var(--fg-dim)">self.gamma = gamma  # focusing param</text><text x="80" y="170" font-size="11" fill="var(--fg-dim)">def forward(self, pred, target):</text><text x="100" y="192" font-size="11" fill="var(--accent-2)">ce = F.cross_entropy(pred, target, reduction=none)</text><text x="100" y="212" font-size="11" fill="var(--accent-2)">pt = torch.exp(-ce)  # probability of correct class</text><text x="100" y="232" font-size="11" fill="var(--accent-2)">return (self.alpha * (1-pt)**self.gamma * ce).mean()</text><text x="400" y="270" text-anchor="middle" font-size="11" fill="var(--fg-dim)">Focal Loss down-weights easy examples -> focus on hard cases</text>`;
    }
  },
  {
    title: "自定义损失函数: 继承 nn.Module",
    info: "Loss = Module with forward(self, pred, target)",
    desc: 'PyTorch 的损失函数都是 <b>nn.Module 的子类</b>——实现 <code>forward(pred, target) -> scalar</code> 即可在训练循环中无缝使用。<br><br><b>为什么继承 Module？</b> 损失函数可能需要可学习参数（如 Focal Loss 的 alpha、Label Smoothing 的 epsilon），或者内部状态（如统计量）。Module 的自动参数管理让这些变得简单。<br><br><code>class MyLoss(nn.Module):</code><br><code>  def forward(self, pred, target):</code><br><code>    return (pred - target).pow(2).mean()</code>',
    badges: [{t:"nn.Module",c:"def"},{t:"forward()",c:"tip"},{t:"可学习参数",c:"warn"}],
    render(svg){
      svg.innerHTML = `<text x="400" y="25" text-anchor="middle" font-size="14" fill="var(--accent)">Custom Loss = nn.Module Subclass</text><rect x="40" y="50" width="680" height="130" rx="8" fill="var(--bg-soft)" stroke="var(--grad)" stroke-width="1.5"/><text x="60" y="78" font-size="12" fill="var(--accent)">class FocalLoss(nn.Module):</text><text x="80" y="102" font-size="11" fill="var(--fg-dim)">def __init__(self, alpha=0.25, gamma=2.0):</text><text x="100" y="125" font-size="11" fill="var(--fg-dim)">self.alpha = alpha  # class weight</text><text x="100" y="148" font-size="11" fill="var(--fg-dim)">self.gamma = gamma  # focusing param</text><text x="80" y="170" font-size="11" fill="var(--fg-dim)">def forward(self, pred, target):</text><text x="100" y="192" font-size="11" fill="var(--accent-2)">ce = F.cross_entropy(pred, target, reduction=none)</text><text x="100" y="212" font-size="11" fill="var(--accent-2)">pt = torch.exp(-ce)  # probability of correct class</text><text x="100" y="232" font-size="11" fill="var(--accent-2)">return (self.alpha * (1-pt)**self.gamma * ce).mean()</text><text x="400" y="270" text-anchor="middle" font-size="11" fill="var(--fg-dim)">Focal Loss down-weights easy examples -> focus on hard cases</text>`;
    }
  },
];
  document.getElementById('stepTitle').textContent=s.title;
  document.getElementById('lossDisplay').textContent=s.loss;
  document.getElementById('stepDesc').innerHTML=s.desc;
  let bd=document.getElementById('badges');bd.innerHTML='';
  s.badges.forEach(b=>{let sp=document.createElement('span');sp.className='badge badge--'+b.c;sp.textContent=b.t;bd.appendChild(sp);});
  s.render(svg);
  document.querySelectorAll('.step-dot').forEach((d,i)=>{d.className='step-dot'+(i===step?' active':i<step?' done':'');});
  document.getElementById('btnPrev').disabled=step===0;
  document.getElementById('btnNext').disabled=step===steps.length-1;
}
function gotoStep(n){step=Math.max(0,Math.min(n,steps.length-1));renderStep();}
function changeStep(d){gotoStep(step+d);}
function resetStep(){stopAuto();gotoStep(0);}
function toggleAuto(){timer?stopAuto():startAuto();}
function startAuto(){timer=setInterval(()=>{if(step<steps.length-1)gotoStep(step+1);else stopAuto();},1600);document.getElementById('btnAuto').textContent='⏸ 暂停';}
function stopAuto(){clearInterval(timer);timer=null;document.getElementById('btnAuto').textContent='▶ 自动';}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')changeStep(-1);if(e.key==='ArrowRight')changeStep(1);if(e.key===' ')e.preventDefault(),toggleAuto();if(e.key==='r'||e.key==='R')resetStep();});
renderStep();
</script>
</body>
</html>
