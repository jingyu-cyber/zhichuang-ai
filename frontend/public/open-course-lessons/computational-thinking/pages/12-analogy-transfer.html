nd:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;box-shadow:var(--shadow)}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>

<script>

{

[{x1:80,y1:100,x2:180,y2:80,w:"5km"},{x1:180,y1:80,x2:260,y2:120,w:"3km"},{x1:80,y1:110,x2:140,y2:160,w:"7km"},{x1:180,y1:90,x2:140,y2:160,w:"4km"},{x1:260,y1:120,x2:140,y2:170,w:"6km"}].forEach(e=>{

nrt.textContent="网络路由";

[{cx:430,cy:100,r:10,label:"R1",col:"var(--accent)"},{cx:530,cy:80,r:10,label:"R2",col:"var(--accent-2)"},{cx:610,cy:120,r:10,label:"R3",col:"var(--accent-2)"},{cx:490,cy:170,r:10,label:"R4",col:"var(--success)"}].forEach(n=>{

svg.appendChild(t);
});
[{x1:430,y1:100,x2:530,y2:80,w:"10ms"},{x1:530,y1:80,x2:610,y2:120,w:"5ms"},{x1:430,y1:110,x2:490,y2:160,w:"15ms"},{x1:530,y1:90,x2:490,y2:160,w:"8ms"},{x1:610,y1:120,x2:490,y2:170,w:"12ms"}].forEach(e=>{
const l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",e.x1);l.setAttribute("y1",e.y1);l.setAttribute("x2",e.x2);l.setAttribute("y2",e.y2);

// Bottom: common algorithm
const ca=document.createElementNS("http://www.w3.org/2000/svg","rect");
ca.setAttribute("x","80");ca.setAttribute("y","255");ca.setAttribute("width","540");ca.setAttribute("height","50");

{
t:"类比表格：更多经典映射",

b:[{t:"类比库",c:"def"},{t:"知识迁移",c:"tip"}],
r(svg){
svg.innerHTML='';
// Analogy table

const data=[
["地图导航","网络路由","带权图最短路径","Dijkstra"],
["数独求解","N皇后","约束满足 + 回溯","Backtracking"],
["文件压缩","DNA序列压缩","无损压缩编码","Huffman"],
["语法解析","XML解析","树结构解析","递归下降"],
["括号匹配","HTML标签配对","栈的FILO匹配","Stack"],
["排课表","寄存器分配","图着色问题","贪心着色"],

{

b:[{t:"三步法",c:"def"},{t:"元认知",c:"tip"}],
r(svg){
svg.innerHTML='';
// Three-step flow
const steps=[
{x:40,y:80,w:180,h:100,title:"Step 1: 抽象",desc:"去掉领域外壳\n提取核心结构\n\n例: \"地图导航\" →\n\"带权图最短路径\"",col:"var(--accent)"},
{x:260,y:80,w:180,h:100,title:"Step 2: 分析",desc:"分析新问题本质\n识别关键要素\n\n例: \"网络路由\" →\n节点+边+权重",col:"var(--grad)"},
{x:480,y:80,w:180,h:100,title:"Step 3: 迁移",desc:"判断同构性\n直接复用解法\n\n例: 结构相同 →\n复用 Dijkstra",col:"var(--success)"},

let step=0,autoTimer=null,autoOn=false;
const stepTitle=document.getElementById("stepTitle");
const stepDesc=document.getElementById("stepDesc");
const badges=document.getElementById("badges");
const codeLine=document.getElementById("codeLine");
const stage=document.getElementById("stage");
const dots=document.getElementById("dots");
const btnPrev=document.getElementById("btnPrev");
const btnNext=document.getElementById("btnNext");
const btnAuto=document.getElementById("btnAuto");

function renderDots(){
dots.innerHTML='';
S.forEach((_,i)=>{
const d=document.createElement("span");
d.className="step-dot"+(i===step?" active":i<step?" done":"");
d.onclick=()=>goTo(i);
dots.appendChild(d);
});
}
function goTo(i){
step=Math.max(0,Math.min(S.length-1,i));
const s=S[step];
stepTitle.textContent=s.t;
stepDesc.innerHTML=s.d;
badges.innerHTML=s.b.map(b=>`<span class="badge badge--${b.c}">${b.t}</span>`).join('');
codeLine.textContent=s.l;
const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
svg.setAttribute("viewBox","0 0 700 340");
svg.setAttribute("preserveAspectRatio","xMidYMid meet");
stage.innerHTML='';
stage.appendChild(svg);
s.r(svg);
btnPrev.disabled=step===0;
btnNext.disabled=step===S.length-1;
renderDots();
}
btnPrev.onclick=()=>goTo(step-1);
btnNext.onclick=()=>{if(step<S.length-1)goTo(step+1);else{autoOn=false;btnAuto.innerHTML="&#9654; 自动播放";clearInterval(autoTimer);}};
btnAuto.onclick=()=>{autoOn=!autoOn;btnAuto.innerHTML=autoOn?"&#9632; 停止":"&#9654; 自动播放";if(autoOn){autoTimer=setInterval(()=>{if(step<S.length-1)goTo(step+1);else goTo(0);},3500);}else clearInterval(autoTimer);};
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")goTo(step-1);if(e.key==="ArrowRight"){if(step<S.length-1)goTo(step+1);}});
goTo(0);
</script>
