<script>
const S=[{
t:"什么是剪枝？提前排除不可能的分支",
l:"if current_cost + lower_bound >= best_known: return  // Prune!",

{

pet.textContent="4-皇后剪枝过程";
svg.appendChild(pet);
[
"第1行Q放(0,1) → 检查第2行：",
"  (1,0)空? → 列冲突 ✂ (同列有Q)",
"  (1,1)空? → 对角冲突 ✂",
"  (1,2)空? → 对角冲突 ✂",
"  (1,3)空? → ✅ 放置(1,3)",
"第2行Q(1,3) → 检查第3行...",
"  继续递归判断 → 找到解!"
].forEach((l,i)=>{
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x","260");t.setAttribute("y",80+i*18);t.setAttribute("font-size","11");t.setAttribute("fill","var(--fg-dim)");
t.textContent=l;
svg.appendChild(t);
});

const bc=document.createElementNS("http://www.w3.org/2000/svg","text");

{

b:[{t:"A*",c:"def"},{t:"分支定界",c:"tip"}],
r(svg){

});

[{f:2,t:3,col:"var(--line)",w:"6"},{f:2,t:4,col:"var(--line)",w:"4"}].forEach(e=>{

svg.appendChild(bbt);
["已知最优: 16","当前部分: A→B→C = 8","去D后最小剩余 ≥ 10","8+10=18 > 16 → 剪掉C→D!"].forEach((l,i)=>{
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x","480");t.setAttribute("y",205+i*18);t.setAttribute("font-size","10");t.setAttribute("fill","var(--fg-dim)");
t.textContent=l;
svg.appendChild(t);
});

{

});

let step=0,autoTimer=null,autoOn=false;
const stepTitle=document.getElementById("stepTitle");
const stepDesc=document.getElementById("stepDesc");
const badges=document.getElementById("badges");
const codeLine=document.getElementById("codeLine");
const stage=document.getElementById("stage");
const dots=document.getElementById("dots");
const btnPrev=document.getElementById("btnPrev");
const btnNext=document.getElementById("btnNext");
const btnAuto=document.getElementById("btnAuto");

function renderDots(){
dots.innerHTML='';
S.forEach((_,i)=>{
const d=document.createElement("span");
d.className="step-dot"+(i===step?" active":i<step?" done":"");
d.onclick=()=>goTo(i);
dots.appendChild(d);
});
}
function goTo(i){
step=Math.max(0,Math.min(S.length-1,i));
const s=S[step];
stepTitle.textContent=s.t;
stepDesc.innerHTML=s.d;
badges.innerHTML=s.b.map(b=>`<span class="badge badge--${b.c}">${b.t}</span>`).join('');
codeLine.textContent=s.l;
const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
svg.setAttribute("viewBox","0 0 700 340");
svg.setAttribute("preserveAspectRatio","xMidYMid meet");
stage.innerHTML='';
stage.appendChild(svg);
s.r(svg);
btnPrev.disabled=step===0;
btnNext.disabled=step===S.length-1;
renderDots();
}
btnPrev.onclick=()=>goTo(step-1);
btnNext.onclick=()=>{if(step<S.length-1)goTo(step+1);else{autoOn=false;btnAuto.innerHTML="&#9654; 自动播放";clearInterval(autoTimer);}};
btnAuto.onclick=()=>{autoOn=!autoOn;btnAuto.innerHTML=autoOn?"&#9632; 停止":"&#9654; 自动播放";if(autoOn){autoTimer=setInterval(()=>{if(step<S.length-1)goTo(step+1);else goTo(0);},3500);}else clearInterval(autoTimer);};
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")goTo(step-1);if(e.key==="ArrowRight"){if(step<S.length-1)goTo(step+1);}});
goTo(0);
</script>
