<script>

{

["for i in range(len(arr)):","    print(arr[i+1])  # i=7时 arr[8]越界!"].forEach((l,i)=>{

["for i in range(len(arr) - 1):","    print(arr[i+1])  # i最大为6, arr[7]安全"].forEach((l,i)=>{

{

b:[{t:"逻辑错误",c:"warn"},{t:"断言测试",c:"def"}],
r(svg){
svg.innerHTML='';
// Visual: two parallel tracks

wr.setAttribute("x","30");wr.setAttribute("y","30");wr.setAttribute("width","280");wr.setAttribute("height","180");

cr.setAttribute("rx","8");cr.setAttribute("fill","var(--success)");cr.setAttribute("opacity","0.05");cr.setAttribute("stroke","var(--success)");cr.setAttribute("stroke-width","2");
svg.appendChild(cr);
const crt=document.createElementNS("http://www.w3.org/2000/svg","text");
crt.setAttribute("x","515");crt.setAttribute("y","55");crt.setAttribute("text-anchor","middle");crt.setAttribute("font-size","13");crt.setAttribute("font-weight","700");crt.setAttribute("fill","var(--success)");
crt.textContent="✅ 正确条件";
svg.appendChild(crt);
[{x:515,y:80,label:"score=85",col:"var(--fg)"},{x:515,y:110,label:"85 >= 90?",col:"var(--success)"},{x:465,y:140,label:"False → 继续检查",col:"var(--fg)"},{x:565,y:140,label:"(True → grade 'A')",col:"var(--fg-dim)"}].forEach(n=>{
const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
r.setAttribute("x",n.x-65);r.setAttribute("y",n.y-11);r.setAttribute("width","130");r.setAttribute("height","22");

const bt=document.createElementNS("http://www.w3.org/2000/svg","rect");

bt.setAttribute("rx","6");bt.setAttribute("fill","var(--accent)");bt.setAttribute("opacity","0.06");bt.setAttribute("stroke","var(--accent)");bt.setAttribute("stroke-width","1");
svg.appendChild(bt);

btt.setAttribute("x","350");btt.setAttribute("y","267");btt.setAttribute("text-anchor","middle");btt.setAttribute("font-size","12");btt.setAttribute("fill","var(--accent)");btt.setAttribute("font-weight","600");
btt.textContent="对策：用 assert grade == 'B' 做断言测试，覆盖每个分支的预期输出";
svg.appendChild(btt);
}},
{
t:"构建你的错误分类直觉",

let step=0,autoTimer=null,autoOn=false;
const stepTitle=document.getElementById("stepTitle");
const stepDesc=document.getElementById("stepDesc");
const badges=document.getElementById("badges");
const codeLine=document.getElementById("codeLine");
const stage=document.getElementById("stage");
const dots=document.getElementById("dots");
const btnPrev=document.getElementById("btnPrev");
const btnNext=document.getElementById("btnNext");
const btnAuto=document.getElementById("btnAuto");

function renderDots(){
dots.innerHTML='';
S.forEach((_,i)=>{
const d=document.createElement("span");
d.className="step-dot"+(i===step?" active":i<step?" done":"");
d.onclick=()=>goTo(i);
dots.appendChild(d);
});
}
function goTo(i){
step=Math.max(0,Math.min(S.length-1,i));
const s=S[step];
stepTitle.textContent=s.t;
stepDesc.innerHTML=s.d;
badges.innerHTML=s.b.map(b=>`<span class="badge badge--${b.c}">${b.t}</span>`).join('');
codeLine.textContent=s.l;
const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
svg.setAttribute("viewBox","0 0 700 340");
svg.setAttribute("preserveAspectRatio","xMidYMid meet");
stage.innerHTML='';
stage.appendChild(svg);
s.r(svg);
btnPrev.disabled=step===0;
btnNext.disabled=step===S.length-1;
renderDots();
}
btnPrev.onclick=()=>goTo(step-1);
btnNext.onclick=()=>{if(step<S.length-1)goTo(step+1);else{autoOn=false;btnAuto.innerHTML="&#9654; 自动播放";clearInterval(autoTimer);}};
btnAuto.onclick=()=>{autoOn=!autoOn;btnAuto.innerHTML=autoOn?"&#9632; 停止":"&#9654; 自动播放";if(autoOn){autoTimer=setInterval(()=>{if(step<S.length-1)goTo(step+1);else goTo(0);},3500);}else clearInterval(autoTimer);};
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")goTo(step-1);if(e.key==="ArrowRight"){if(step<S.length-1)goTo(step+1);}});
goTo(0);
</script>
