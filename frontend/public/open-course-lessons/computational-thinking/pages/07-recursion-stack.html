<script>
const S=[{
t:"递归的两个要素",
l:"def fib(n): if n<=1: return n; return fib(n-1) + fib(n-2)",
d:"递归需要两个条件：<strong>基准情况</strong>（Base Case，停止递归）和<strong>递归情况</strong>（Recursive Case，分解为更小问题）。缺一不可。",
b:[{t:"Base Case",c:"def"},{t:"Recursive Case",c:"tip"}],
r(svg){
svg.innerHTML='';
// Left: recursive tree for fib(5)

{cx:350,cy:25,r:20,label:"F(5)",col:"var(--grad)"},

{cx:230,cy:75,r:18,label:"F(4)",col:"var(--accent)"},
{cx:470,cy:75,r:18,label:"F(3)",col:"var(--accent)"},

{cx:520,cy:130,r:14,label:"F(1)",col:"var(--success)"},

svg.appendChild(t);
});
// edges
[{x1:350,y1:45,x2:230,y2:57},{x1:350,y1:45,x2:470,y2:57},{x1:230,y1:93,x2:140,y2:114},{x1:230,y1:93,x2:320,y2:114},{x1:470,y1:93,x2:420,y2:114},{x1:470,y1:93,x2:520,y2:116},{x1:140,y1:146,x2:80,y2:176},{x1:140,y1:146,x2:190,y2:178},{x1:320,y1:146,x2:270,y2:178},{x1:320,y1:146,x2:370,y2:178},{x1:420,y1:146,x2:470,y2:176}].forEach(e=>{

an.textContent="F(0)和F(1)不需要再分解 → Base Case";

}},
{
t:"调用栈的压栈与弹栈",

d:"每次递归调用都在调用栈上<strong>压入一个新帧</strong>。到达 Base Case 后开始<strong>弹栈</strong>，返回值逐层向上传递。",
b:[{t:"调用栈",c:"def"},{t:"压栈/弹栈",c:"tip"}],
r(svg){
svg.innerHTML='';

{y:116,h:30,label:"fib(4)",col:"var(--accent)",push:true},

];

sr.setAttribute("x","40");sr.setAttribute("y","70");sr.setAttribute("width","220");sr.setAttribute("height","190");
sr.setAttribute("fill","none");sr.setAttribute("stroke","var(--accent)");sr.setAttribute("stroke-width","2");sr.setAttribute("rx","6");

svg.appendChild(st);
stackFrames.forEach(f=>{
const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
r.setAttribute("x","50");r.setAttribute("y",f.y);r.setAttribute("width","200");r.setAttribute("height",f.h);
r.setAttribute("rx","4");r.setAttribute("fill","var(--bg-soft)");r.setAttribute("stroke",f.col);r.setAttribute("stroke-width","1");

svg.appendChild(t);
});
// right side: call tree with highlight

{cx:400,cy:70,r:18,label:"F(5)",col:"var(--grad)"},
{cx:320,cy:130,r:16,label:"F(4)",col:"var(--accent)"},
{cx:260,cy:190,r:14,label:"F(3)",col:"var(--accent-2)"},
{cx:220,cy:250,r:12,label:"F(2)",col:"var(--accent-2)"},
{cx:190,cy:300,r:10,label:"F(1)",col:"var(--success)"},
];
// highlight path
rnodes.forEach((n,i)=>{
const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
c.setAttribute("cx",n.cx);c.setAttribute("cy",n.cy);c.setAttribute("r",n.r);
c.setAttribute("fill",i===4?"var(--success)":"var(--bg-soft)");
c.setAttribute("fill-opacity",i===4?"0.2":"1");
c.setAttribute("stroke",n.col);c.setAttribute("stroke-width",i===4?"2.5":"1.5");
svg.appendChild(c);
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",n.cx);t.setAttribute("y",n.cy+4);t.setAttribute("text-anchor","middle");t.setAttribute("font-size","9");t.setAttribute("fill",n.col);t.setAttribute("font-weight","600");
t.textContent=n.label;
svg.appendChild(t);
if(i<rnodes.length-1){
const l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",n.cx);l.setAttribute("y1",n.cy+n.r);l.setAttribute("x2",rnodes[i+1].cx);l.setAttribute("y2",rnodes[i+1].cy-rnodes[i+1].r);
l.setAttribute("stroke",n.col);l.setAttribute("stroke-width","1.5");
svg.appendChild(l);
}
});
// arrow labels
const ar=document.createElementNS("http://www.w3.org/2000/svg","text");
ar.setAttribute("x","440");ar.setAttribute("y","100");ar.setAttribute("font-size","10");ar.setAttribute("fill","var(--success)");ar.setAttribute("font-weight","600");

svg.appendChild(ar);
const ar2=document.createElementNS("http://www.w3.org/2000/svg","text");

svg.appendChild(ar2);
const ar3=document.createElementNS("http://www.w3.org/2000/svg","text");
ar3.setAttribute("x","440");ar3.setAttribute("y","136");ar3.setAttribute("font-size","10");ar3.setAttribute("fill","var(--accent-2)");
ar3.textContent="→ 到达Base Case";
svg.appendChild(ar3);
const ar4=document.createElementNS("http://www.w3.org/2000/svg","text");
ar4.setAttribute("x","440");ar4.setAttribute("y","154");ar4.setAttribute("font-size","10");ar4.setAttribute("fill","var(--accent-2)");
ar4.textContent="  开始弹栈返回";
svg.appendChild(ar4);
}},
{
t:"汉诺塔：经典递归问题",
l:"def hanoi(n, src, aux, dst): if n==1: move(src,dst); else: hanoi(n-1,src,dst,aux); move(src,dst); hanoi(n-1,aux,src,dst)",

b:[{t:"经典问题",c:"def"},{t:"递归思维",c:"tip"}],

svg.innerHTML='';
// Tower of Hanoi visualization for n=3
const baseY=260,pegX=[120,350,580];

const br=document.createElementNS("http://www.w3.org/2000/svg","rect");
br.setAttribute("x","40");br.setAttribute("y",baseY);br.setAttribute("width","620");br.setAttribute("height","8");
br.setAttribute("rx","4");br.setAttribute("fill","var(--fg-dim)");
svg.appendChild(br);
// pegs
pegX.forEach(px=>{
const pr=document.createElementNS("http://www.w3.org/2000/svg","rect");
pr.setAttribute("x",px-3);pr.setAttribute("y","90");pr.setAttribute("width","6");pr.setAttribute("height",baseY-90);

[{x:120,label:"A (源柱)"},{x:350,label:"B (辅助柱)"},{x:580,label:"C (目标柱)"}].forEach(p=>{

});

disks.forEach(d=>{

r.setAttribute("rx","4");r.setAttribute("fill",d.col);r.setAttribute("opacity","0.7");

dt.setAttribute("x","120");dt.setAttribute("y",d.y-2);dt.setAttribute("text-anchor","middle");dt.setAttribute("font-size","8");dt.setAttribute("fill","#fff");
dt.textContent=d.w===80?"3":d.w===60?"2":"1";
svg.appendChild(dt);
});
// recursive formula display
const formula=[
{x:40,y:40,text:"hanoi(n, src, aux, dst):"},
{x:55,y:62,text:"if n == 1: move(src→dst)"},
{x:55,y:82,text:"else:"},
{x:75,y:100,text:"hanoi(n-1, src, dst, aux)  // 移 n-1 到辅助柱"},
{x:75,y:118,text:"move(src→dst)                 // 移最大的直接到目标"},
{x:75,y:136,text:"hanoi(n-1, aux, src, dst)  // 移 n-1 到目标柱顶"},
];
formula.forEach(f=>{
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",f.x);t.setAttribute("y",f.y);t.setAttribute("font-size","10");t.setAttribute("fill","var(--fg)");t.setAttribute("font-family","JetBrains Mono,monospace");
t.textContent=f.text;
svg.appendChild(t);
});
const note=document.createElementNS("http://www.w3.org/2000/svg","text");
note.setAttribute("x","350");note.setAttribute("y","160");note.setAttribute("text-anchor","middle");note.setAttribute("font-size","12");note.setAttribute("fill","var(--grad)");
note.textContent="步骤数 = 2ⁿ-1，n=3 时需要 7 步";
svg.appendChild(note);
}},
{
t:"递归 vs 迭代的对比",
l:"# 递归: 简洁但可能有重复计算\n# 迭代 (备忘录): 自底向上，避免重复\n# 尾递归优化: 编译器将递归转为迭代",
d:"递归代码<strong>简洁优雅</strong>，但可能有重复计算（如斐波那契指数级重复）。迭代+备忘录可达 O(n)。尾递归可被编译器优化为循环。",
b:[{t:"性能",c:"warn"},{t:"优化",c:"tip"}],
r(svg){
svg.innerHTML='';
// side by side comparison
// Left: Recursive fib
const lr=document.createElementNS("http://www.w3.org/2000/svg","rect");
lr.setAttribute("x","30");lr.setAttribute("y","40");lr.setAttribute("width","280");lr.setAttribute("height","210");
lr.setAttribute("rx","8");lr.setAttribute("fill","var(--bg-soft)");lr.setAttribute("stroke","var(--grad)");lr.setAttribute("stroke-width","2");
svg.appendChild(lr);
const lt=document.createElementNS("http://www.w3.org/2000/svg","text");
lt.setAttribute("x","170");lt.setAttribute("y","65");lt.setAttribute("text-anchor","middle");lt.setAttribute("font-size","14");lt.setAttribute("font-weight","700");lt.setAttribute("fill","var(--grad)");
lt.textContent="递归 (自顶向下)";
svg.appendChild(lt);
["def fib(n):","  if n<=1: return n","  return fib(n-1)+fib(n-2)","","时间: O(2^n) 😰","空间: O(n) 调用栈"].forEach((l,i)=>{
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x","45");t.setAttribute("y",90+i*22);t.setAttribute("font-size","11");t.setAttribute("fill","var(--fg-dim)");t.setAttribute("font-family","JetBrains Mono,monospace");
t.textContent=l;
svg.appendChild(t);
});
// Right: Iterative fib
const rr=document.createElementNS("http://www.w3.org/2000/svg","rect");
rr.setAttribute("x","350");rr.setAttribute("y","40");rr.setAttribute("width","320");rr.setAttribute("height","210");
rr.setAttribute("rx","8");rr.setAttribute("fill","var(--bg-soft)");rr.setAttribute("stroke","var(--success)");rr.setAttribute("stroke-width","2");
svg.appendChild(rr);
const rt=document.createElementNS("http://www.w3.org/2000/svg","text");

];

let step=0,autoTimer=null,autoOn=false;
const stepTitle=document.getElementById("stepTitle");
const stepDesc=document.getElementById("stepDesc");
const badges=document.getElementById("badges");
const codeLine=document.getElementById("codeLine");
const stage=document.getElementById("stage");
const dots=document.getElementById("dots");
const btnPrev=document.getElementById("btnPrev");
const btnNext=document.getElementById("btnNext");
const btnAuto=document.getElementById("btnAuto");

function renderDots(){
dots.innerHTML='';
S.forEach((_,i)=>{
const d=document.createElement("span");
d.className="step-dot"+(i===step?" active":i<step?" done":"");
d.onclick=()=>goTo(i);
dots.appendChild(d);
});
}
function goTo(i){
step=Math.max(0,Math.min(S.length-1,i));
const s=S[step];
stepTitle.textContent=s.t;
stepDesc.innerHTML=s.d;
badges.innerHTML=s.b.map(b=>`<span class="badge badge--${b.c}">${b.t}</span>`).join('');
codeLine.textContent=s.l;
const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
svg.setAttribute("viewBox","0 0 700 340");
svg.setAttribute("preserveAspectRatio","xMidYMid meet");
stage.innerHTML='';

btnPrev.onclick=()=>goTo(step-1);
btnNext.onclick=()=>{if(step<S.length-1)goTo(step+1);else{autoOn=false;btnAuto.innerHTML="&#9654; 自动播放";clearInterval(autoTimer);}};
btnAuto.onclick=()=>{autoOn=!autoOn;btnAuto.innerHTML=autoOn?"&#9632; 停止":"&#9654; 自动播放";if(autoOn){autoTimer=setInterval(()=>{if(step<S.length-1)goTo(step+1);else goTo(0);},3500);}else clearInterval(autoTimer);};
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")goTo(step-1);if(e.key==="ArrowRight"){if(step<S.length-1)goTo(step+1);}});
goTo(0);
</script>
