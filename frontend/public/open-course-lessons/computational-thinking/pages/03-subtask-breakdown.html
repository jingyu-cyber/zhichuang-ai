<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>03 子任务拆分 — 计算思维</title>
<style>
:root{--bg:#f5f5f8;--bg-soft:#ffffff;--bg-code:#f0f0f4;--fg:#2c2c38;--fg-dim:#6c6c80;--line:#dcdce4;--accent:#5b6abf;--accent-2:#36a2b8;--grad:#f09840;--success:#40c878;--danger:#e04860;--shadow:0 2px 12px rgba(0,0,0,.06)}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:"Noto Sans SC","PingFang SC",-apple-system,sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(91,106,191,.12);color:var(--accent)}.badge--tip{background:rgba(64,200,120,.12);color:var(--success)}.badge--warn{background:rgba(240,152,64,.15);color:var(--grad)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.info-line{font-family:"JetBrains Mono",monospace;font-size:15px;color:var(--accent);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px;box-shadow:var(--shadow)}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 8px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
<div class="demo-header">
<h1>03 子任务拆分</h1>
<div class="breadcrumb"><a href="../index.html">计算思维</a> / 第1章 / 子任务拆分</div>
</div>
<div class="demo-main">
<div class="panel-explain" id="explain">
<div class="step-title" id="stepTitle"></div>
<div class="step-desc" id="stepDesc"></div>
<div class="badge-row" id="badges"></div>
<div class="info-line" id="codeLine"></div>
</div>
<div class="panel-stage" id="stage"></div>
</div>
<div class="demo-controls">
<button id="btnPrev" aria-label="上一步">&larr; 上一步</button>
<div class="step-dots" id="dots"></div>
<button id="btnNext" aria-label="下一步">下一步 &rarr;</button>
<button id="btnAuto" aria-label="自动播放">&#9654; 自动播放</button>
<span style="font-size:12px;color:var(--fg-dim)">键盘 &larr; &rarr;</span>
</div>
</div>
<script>
const S=[{
t:"总览：问题切分为三大块",
l:"解 = 输入处理 + 核心计算 + 输出格式化",
d:"任何一个编程问题都可以拆为三个<strong>子任务</strong>：读取并校验输入、执行核心算法逻辑、按格式输出结果。这就是<em>IPO 模型</em>（Input-Process-Output）。",
b:[{t:"IPO模型",c:"def"},{t:"分治",c:"tip"}],
r(svg){
svg.innerHTML='';
const boxes=[
{x:30,y:80,w:190,h:140,title:"输入处理",color:"var(--accent)",lines:["读取 N 和数组 arr","校验 K≤N, N>0","解析数据格式"]},
{x:255,y:80,w:190,h:140,title:"核心计算",color:"var(--grad)",lines:["维护大小为 K 的小顶堆","遍历 arr 逐个插入","返回堆中元素"]},
{x:480,y:80,w:190,h:140,title:"输出格式化",color:"var(--success)",lines:["结果排序（可选）","格式化为要求形式","打印或返回"]},
];
boxes.forEach(b=>{
const g=document.createElementNS("http://www.w3.org/2000/svg","g");
const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
r.setAttribute("x",b.x);r.setAttribute("y",b.y);r.setAttribute("width",b.w);r.setAttribute("height",b.h);
r.setAttribute("rx","10");r.setAttribute("fill","var(--bg-soft)");r.setAttribute("stroke",b.color);r.setAttribute("stroke-width","2");
g.appendChild(r);
const hdr=document.createElementNS("http://www.w3.org/2000/svg","rect");
hdr.setAttribute("x",b.x);hdr.setAttribute("y",b.y);hdr.setAttribute("width",b.w);hdr.setAttribute("height","30");
hdr.setAttribute("rx","10");hdr.setAttribute("fill",b.color);hdr.setAttribute("opacity","0.12");
g.appendChild(hdr);
const tt=document.createElementNS("http://www.w3.org/2000/svg","text");
tt.setAttribute("x",b.x+b.w/2);tt.setAttribute("y",b.y+21);tt.setAttribute("text-anchor","middle");
tt.setAttribute("font-size","14");tt.setAttribute("font-weight","700");tt.setAttribute("fill",b.color);
tt.textContent=b.title;
g.appendChild(tt);
b.lines.forEach((l,i)=>{
const lt=document.createElementNS("http://www.w3.org/2000/svg","text");
lt.setAttribute("x",b.x+b.w/2);lt.setAttribute("y",b.y+54+i*24);lt.setAttribute("text-anchor","middle");
lt.setAttribute("font-size","11");lt.setAttribute("fill","var(--fg-dim)");
lt.textContent=l;
g.appendChild(lt);
});
svg.appendChild(g);
});
// arrows between
[{x1:226,y1:150,x2:248,y2:150},{x1:451,y1:150,x2:473,y2:150}].forEach(a=>{
const l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",a.x1);l.setAttribute("y1",a.y1);l.setAttribute("x2",a.x2);l.setAttribute("y2",a.y2);
l.setAttribute("stroke","var(--line)");l.setAttribute("stroke-width","2");
svg.appendChild(l);
// arrowhead
const ah=document.createElementNS("http://www.w3.org/2000/svg","polygon");
ah.setAttribute("points",`${a.x2},${a.y2} ${a.x2-8},${a.y2-4} ${a.x2-8},${a.y2+4}`);
ah.setAttribute("fill","var(--line)");
svg.appendChild(ah);
});
// top label
const tl=document.createElementNS("http://www.w3.org/2000/svg","text");
tl.setAttribute("x","350");tl.setAttribute("y","45");tl.setAttribute("text-anchor","middle");
tl.setAttribute("font-size","16");tl.setAttribute("font-weight","700");tl.setAttribute("fill","var(--fg)");
tl.textContent="大问题 = 子问题₁ + 子问题₂ + 子问题₃";
svg.appendChild(tl);
// bottom label
const bl=document.createElementNS("http://www.w3.org/2000/svg","text");
bl.setAttribute("x","350");bl.setAttribute("y","270");bl.setAttribute("text-anchor","middle");
bl.setAttribute("font-size","13");bl.setAttribute("fill","var(--fg-dim)");
bl.textContent="每个子任务独立开发、独立测试、独立调试";
svg.appendChild(bl);
}},
{
t:"展开：输入处理子任务",
l:"def parse_input(): arr = list(map(int, input().split())); N, K = arr[0], arr[1]; return N, K, arr[2:]",
d:"输入处理不止是读取数据，还包括<strong>校验</strong>：K 不超 N、所有值为整数、文件未结束。把校验逻辑单独写，方便复用。",
b:[{t:"校验",c:"warn"},{t:"健壮性",c:"def"}],
r(svg){
svg.innerHTML='';
// flow: raw input → validate → clean data
const nodes=[{x:40,y:100,w:160,h:60,label:"原始输入",detail:"\"5 3 9 1 4 7\"",col:"var(--fg-dim)"},{x:270,y:100,w:160,h:60,label:"校验 (Validate)",detail:"K≤N? OK | 都是整数? OK",col:"var(--grad)"},{x:500,y:100,w:160,h:60,label:"结构化数据",detail:"N=5  K=3  arr=[9,1,4,7,8]",col:"var(--success)"}];
nodes.forEach(n=>{
const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
r.setAttribute("x",n.x);r.setAttribute("y",n.y);r.setAttribute("width",n.w);r.setAttribute("height",n.h);
r.setAttribute("rx","8");r.setAttribute("fill","var(--bg-soft)");r.setAttribute("stroke",n.col);r.setAttribute("stroke-width","2");
svg.appendChild(r);
const tl=document.createElementNS("http://www.w3.org/2000/svg","text");
tl.setAttribute("x",n.x+n.w/2);tl.setAttribute("y",n.y+22);tl.setAttribute("text-anchor","middle");
tl.setAttribute("font-size","13");tl.setAttribute("font-weight","700");tl.setAttribute("fill",n.col);
tl.textContent=n.label;
svg.appendChild(tl);
const td=document.createElementNS("http://www.w3.org/2000/svg","text");
td.setAttribute("x",n.x+n.w/2);td.setAttribute("y",n.y+44);td.setAttribute("text-anchor","middle");
td.setAttribute("font-size","9");td.setAttribute("fill","var(--fg-dim)");td.setAttribute("font-family","JetBrains Mono,monospace");
td.textContent=n.detail;
svg.appendChild(td);
});
// arrows
[{x1:200,y1:130,x2:262,y2:130},{x1:430,y1:130,x2:492,y2:130}].forEach(a=>{
const l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",a.x1);l.setAttribute("y1",a.y1);l.setAttribute("x2",a.x2);l.setAttribute("y2",a.y2);
l.setAttribute("stroke","var(--line)");l.setAttribute("stroke-width","2");
svg.appendChild(l);
});
// edge cases
const ec=document.createElementNS("http://www.w3.org/2000/svg","text");
ec.setAttribute("x","350");ec.setAttribute("y","210");ec.setAttribute("text-anchor","middle");ec.setAttribute("font-size","12");ec.setAttribute("fill","var(--danger)");
ec.textContent="注意边界：文件为空、K=0、非数字字符 → 抛异常或返回错误";
svg.appendChild(ec);
}},
{
t:"展开：核心计算子任务",
l:"def top_k(arr, K): heap = arr[:K]; heapify(heap); for x in arr[K:]: heappushpop(heap, x); return heap",
d:"核心算法使用<strong>小顶堆</strong>。堆顶始终是第 K 大的候选值。遍历数组，如果新元素大于堆顶，则替换。时间复杂度 O(N log K)。",
b:[{t:"堆",c:"def"},{t:"O(N log K)",c:"tip"}],
r(svg){
svg.innerHTML='';
// heap visualization
const arr=[9,1,4,7,8,3,6,2,5];
const hx=60,hy=100;
// draw heap as tree for K=4
const heapNodes=[{cx:350,cy:50,v:"1"},{cx:260,cy:120,v:"4"},{cx:440,cy:120,v:"7"},{cx:200,cy:190,v:"9"}];
heapNodes.forEach((n,i)=>{
const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
c.setAttribute("cx",n.cx);c.setAttribute("cy",n.cy);c.setAttribute("r","18");
c.setAttribute("fill",i===0?"var(--accent)":"var(--bg-soft)");
c.setAttribute("fill-opacity",i===0?"0.15":"1");
c.setAttribute("stroke",i===0?"var(--accent)":"var(--line)");c.setAttribute("stroke-width","2");
svg.appendChild(c);
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",n.cx);t.setAttribute("y",n.cy+5);t.setAttribute("text-anchor","middle");t.setAttribute("font-size","13");t.setAttribute("font-weight","700");t.setAttribute("fill","var(--fg)");
t.textContent=n.v;
svg.appendChild(t);
});
// edges
[{x1:350,y1:68,x2:260,y2:102},{x1:350,y1:68,x2:440,y2:102},{x1:260,y1:138,x2:200,y2:172}].forEach(e=>{
const l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",e.x1);l.setAttribute("y1",e.y1);l.setAttribute("x2",e.x2);l.setAttribute("y2",e.y2);
l.setAttribute("stroke","var(--line)");l.setAttribute("stroke-width","1.5");
svg.appendChild(l);
});
// left: input array
arr.forEach((v,i)=>{
const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
r.setAttribute("x",hx+i*28);r.setAttribute("y","250");r.setAttribute("width","24");r.setAttribute("height","28");
r.setAttribute("fill",i<4?"var(--accent)":"var(--bg-soft)");r.setAttribute("fill-opacity",i<4?"0.12":"1");
r.setAttribute("stroke",i<4?"var(--accent)":"var(--line)");r.setAttribute("stroke-width","1");
svg.appendChild(r);
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x",hx+i*28+12);t.setAttribute("y","269");t.setAttribute("text-anchor","middle");t.setAttribute("font-size","11");t.setAttribute("fill","var(--fg)");
t.textContent=v;
svg.appendChild(t);
});
// labels
const la=document.createElementNS("http://www.w3.org/2000/svg","text");
la.setAttribute("x","60");la.setAttribute("y","245");la.setAttribute("font-size","11");la.setAttribute("fill","var(--fg-dim)");
la.textContent="输入数组 arr";
svg.appendChild(la);
const lb=document.createElementNS("http://www.w3.org/2000/svg","text");
lb.setAttribute("x","250");lb.setAttribute("y","245");lb.setAttribute("font-size","11");lb.setAttribute("fill","var(--fg-dim)");
lb.textContent="小顶堆 (K=4)";
svg.appendChild(lb);
const lc=document.createElementNS("http://www.w3.org/2000/svg","text");
lc.setAttribute("x","500");lc.setAttribute("y","55");lc.setAttribute("font-size","11");lc.setAttribute("fill","var(--accent)");lc.setAttribute("font-weight","600");
lc.textContent="堆顶 = 当前第K大候选";
svg.appendChild(lc);
const ld=document.createElementNS("http://www.w3.org/2000/svg","text");
ld.setAttribute("x","500");ld.setAttribute("y","75");ld.setAttribute("font-size","11");ld.setAttribute("fill","var(--fg-dim)");
ld.textContent="遍历剩余元素";
svg.appendChild(ld);
const le=document.createElementNS("http://www.w3.org/2000/svg","text");
le.setAttribute("x","500");le.setAttribute("y","95");le.setAttribute("font-size","11");le.setAttribute("fill","var(--fg-dim)");
le.textContent="if x > heap[0]: replace";
svg.appendChild(le);
}},
{
t:"展开：输出格式化 + 组合",
l:"def solve(): N,K,arr=parse_input(); result=top_k(arr,K); return sorted(result,reverse=True)",
d:"输出格式化负责<strong>排序</strong>、<strong>格式化</strong>为指定输出格式。最后用主函数组合三个子任务，清晰易读。",
b:[{t:"组合",c:"def"},{t:"主函数",c:"tip"}],
r(svg){
svg.innerHTML='';
// three boxes feeding into one
const sub=[{x:40,y:60,w:160,h:80,label:"parse_input()",col:"var(--accent)",out:"N, K, arr"},{x:270,y:60,w:160,h:80,label:"top_k(arr, K)",col:"var(--grad)",out:"heap → result"},{x:500,y:60,w:160,h:80,label:"format(result)",col:"var(--success)",out:"[9, 8, 7]"}];
sub.forEach(b=>{
const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
r.setAttribute("x",b.x);r.setAttribute("y",b.y);r.setAttribute("width",b.w);r.setAttribute("height",b.h);
r.setAttribute("rx","8");r.setAttribute("fill","var(--bg-soft)");r.setAttribute("stroke",b.col);r.setAttribute("stroke-width","2");
svg.appendChild(r);
const tl=document.createElementNS("http://www.w3.org/2000/svg","text");
tl.setAttribute("x",b.x+b.w/2);tl.setAttribute("y",b.y+28);tl.setAttribute("text-anchor","middle");tl.setAttribute("font-size","12");tl.setAttribute("font-weight","600");tl.setAttribute("fill",b.col);
tl.textContent=b.label;
svg.appendChild(tl);
const td=document.createElementNS("http://www.w3.org/2000/svg","text");
td.setAttribute("x",b.x+b.w/2);td.setAttribute("y",b.y+52);td.setAttribute("text-anchor","middle");td.setAttribute("font-size","10");td.setAttribute("fill","var(--fg-dim)");
td.textContent="→ "+b.out;
svg.appendChild(td);
});
// arrows down
[{x:120,y:140},{x:350,y:140},{x:580,y:140}].forEach(a=>{
const l=document.createElementNS("http://www.w3.org/2000/svg","line");
l.setAttribute("x1",a.x);l.setAttribute("y1",a.y);l.setAttribute("x2",a.x);l.setAttribute("y2",a.y+40);
l.setAttribute("stroke","var(--line)");l.setAttribute("stroke-width","1.5");
svg.appendChild(l);
});
// final box
const fr=document.createElementNS("http://www.w3.org/2000/svg","rect");
fr.setAttribute("x","200");fr.setAttribute("y","190");fr.setAttribute("width","300");fr.setAttribute("height","60");
fr.setAttribute("rx","10");fr.setAttribute("fill","var(--accent)");fr.setAttribute("opacity","0.08");fr.setAttribute("stroke","var(--accent)");fr.setAttribute("stroke-width","2");
svg.appendChild(fr);
const ft=document.createElementNS("http://www.w3.org/2000/svg","text");
ft.setAttribute("x","350");ft.setAttribute("y","218");ft.setAttribute("text-anchor","middle");ft.setAttribute("font-size","14");ft.setAttribute("font-weight","700");ft.setAttribute("fill","var(--accent)");
ft.textContent="def solve() → 组合三个子任务";
svg.appendChild(ft);
const ft2=document.createElementNS("http://www.w3.org/2000/svg","text");
ft2.setAttribute("x","350");ft2.setAttribute("y","240");ft2.setAttribute("text-anchor","middle");ft2.setAttribute("font-size","11");ft2.setAttribute("fill","var(--fg-dim)");
ft2.textContent="单一职责 · 独立测试 · 易于修改";
svg.appendChild(ft2);
// benefit list
[{y:280,t:"每个子任务可单独编写单元测试"},{y:300,t:"修改输入格式只需改 parse_input"},{y:320,t:"算法替换只需改 top_k 实现"}].forEach(b=>{
const t=document.createElementNS("http://www.w3.org/2000/svg","text");
t.setAttribute("x","100");t.setAttribute("y",b.y);t.setAttribute("font-size","12");t.setAttribute("fill","var(--success)");
t.textContent="✓ "+b.t;
svg.appendChild(t);
});
}}
];

let step=0,autoTimer=null,autoOn=false;
const stepTitle=document.getElementById("stepTitle");
const stepDesc=document.getElementById("stepDesc");
const badges=document.getElementById("badges");
const codeLine=document.getElementById("codeLine");
const stage=document.getElementById("stage");
const dots=document.getElementById("dots");
const btnPrev=document.getElementById("btnPrev");
const btnNext=document.getElementById("btnNext");
const btnAuto=document.getElementById("btnAuto");

function renderDots(){
dots.innerHTML='';
S.forEach((_,i)=>{
const d=document.createElement("span");
d.className="step-dot"+(i===step?" active":i<step?" done":"");
d.onclick=()=>goTo(i);
dots.appendChild(d);
});
}
function goTo(i){
step=Math.max(0,Math.min(S.length-1,i));
const s=S[step];
stepTitle.textContent=s.t;
stepDesc.innerHTML=s.d;
badges.innerHTML=s.b.map(b=>`<span class="badge badge--${b.c}">${b.t}</span>`).join('');
codeLine.textContent=s.l;
const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
svg.setAttribute("viewBox","0 0 700 340");
svg.setAttribute("preserveAspectRatio","xMidYMid meet");
stage.innerHTML='';
stage.appendChild(svg);
s.r(svg);
btnPrev.disabled=step===0;
btnNext.disabled=step===S.length-1;
renderDots();
}
btnPrev.onclick=()=>goTo(step-1);
btnNext.onclick=()=>{if(step<S.length-1)goTo(step+1);else{autoOn=false;btnAuto.innerHTML="&#9654; 自动播放";clearInterval(autoTimer);}};
btnAuto.onclick=()=>{autoOn=!autoOn;btnAuto.innerHTML=autoOn?"&#9632; 停止":"&#9654; 自动播放";if(autoOn){autoTimer=setInterval(()=>{if(step<S.length-1)goTo(step+1);else goTo(0);},3500);}else clearInterval(autoTimer);};
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")goTo(step-1);if(e.key==="ArrowRight"){if(step<S.length-1)goTo(step+1);}});
goTo(0);
</script>
</body>
</html>
