<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>页表遍历 — 操作系统内核构建</title>
<style>:root{--bg:#0d1117;--bg-soft:#161b22;--bg-code:#0a0c10;--fg:#e6edf3;--fg-dim:#8b949e;--line:#30363d;--accent:#58a6ff;--accent-2:#3fb950;--grad:#d29922;--success:#3fb950;--danger:#f85149}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(88,166,255,.18);color:var(--accent)}.badge--tip{background:rgba(63,185,80,.18);color:var(--success)}.badge--warn{background:rgba(210,153,34,.18);color:var(--grad)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.code-line{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="demo-shell">
<div class="demo-header">
<h1>第 8 节 &middot; 页表遍历</h1>
<span class="breadcrumb"><a href="../index.html">课程首页</a> / 内存管理</span>
</div>
<div class="demo-main">
<div class="panel-explain" id="explain"></div>
<div class="panel-stage" id="stage"></div>
</div>
<div class="demo-controls">
<button id="prevBtn">&larr; 上一步</button>
<div class="step-dots" id="dots"></div>
<button id="nextBtn">下一步 &rarr;</button>
<button id="autoBtn">&#9654; 自动播放</button>
</div>
</div>
<script>
const S=[
  {
    t:"虚拟地址到物理地址的转换",
    l:"va = 0x12345678  →  4-level page walk  →  pa = 0xABCDE000",
    d:"CPU 的 MMU 硬件自动将虚拟地址转换为物理地址：<br>1) 从 CR3 寄存器获取顶级页表物理地址<br>2) 逐级索引 4 级页表（PML4→PDPT→PD→PT）<br>3) 最终 PTE 包含物理页框号 + 权限位",
    b:[{t:"MMU",c:"badge--def"},{t:"4-level",c:"badge--warn"},{t:"CR3",c:"badge--tip"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <text x="400" y="25" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">x86-64 四级页表遍历</text>
        <!-- Virtual address split -->
        <rect x="30" y="45" width="740" height="40" rx="6" fill="var(--bg)" stroke="var(--line)"/>
        <text x="50" y="70" fill="var(--fg-dim)" font-family="monospace" font-size="12">Virtual Addr (48-bit):</text>
        <rect x="290" y="50" width="75" height="28" rx="4" fill="rgba(88,166,255,.15)"/><text x="327" y="69" text-anchor="middle" fill="var(--accent)" font-family="monospace" font-size="11">PML4[9]</text>
        <rect x="370" y="50" width="75" height="28" rx="4" fill="rgba(63,185,80,.15)"/><text x="407" y="69" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">PDPT[9]</text>
        <rect x="450" y="50" width="75" height="28" rx="4" fill="rgba(210,153,34,.15)"/><text x="487" y="69" text-anchor="middle" fill="var(--grad)" font-family="monospace" font-size="11">PD[9]</text>
        <rect x="530" y="50" width="75" height="28" rx="4" fill="rgba(88,166,255,.20)"/><text x="567" y="69" text-anchor="middle" fill="var(--accent)" font-family="monospace" font-size="11">PT[9]</text>
        <rect x="610" y="50" width="145" height="28" rx="4" fill="rgba(63,185,80,.12)"/><text x="682" y="69" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">Offset[12]</text>
        <text x="50" y="85" fill="var(--fg-dim)" font-family="monospace" font-size="10">bits 47..39</text><text x="250" y="85" fill="var(--fg-dim)" font-family="monospace" font-size="10">38..30</text><text x="340" y="85" fill="var(--fg-dim)" font-family="monospace" font-size="10">29..21</text>
        <text x="420" y="85" fill="var(--fg-dim)" font-family="monospace" font-size="10">20..12</text><text x="500" y="85" fill="var(--fg-dim)" font-family="monospace" font-size="10">11..0</text>
        <!-- 4 level boxes -->
        <rect x="200" y="110" width="140" height="45" rx="8" fill="rgba(88,166,255,.10)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="270" y="128" text-anchor="middle" fill="var(--accent)" font-size="11">CR3 → PML4 Table</text>
        <text x="270" y="146" text-anchor="middle" fill="var(--fg-dim)" font-size="10">512 entries × 8B</text>
        <line x1="270" y1="155" x2="270" y2="180" stroke="var(--line)" stroke-width="1.5" marker-end="url(#aD)"/>
        <rect x="200" y="180" width="140" height="45" rx="8" fill="rgba(63,185,80,.10)" stroke="var(--accent-2)" stroke-width="1.5"/>
        <text x="270" y="198" text-anchor="middle" fill="var(--accent-2)" font-size="11">PDPT</text>
        <text x="270" y="216" text-anchor="middle" fill="var(--fg-dim)" font-size="10">(Page Dir Ptr)</text>
        <line x1="270" y1="225" x2="270" y2="250" stroke="var(--line)" stroke-width="1.5" marker-end="url(#aD)"/>
        <rect x="200" y="250" width="140" height="45" rx="8" fill="rgba(210,153,34,.10)" stroke="var(--grad)" stroke-width="1.5"/>
        <text x="270" y="268" text-anchor="middle" fill="var(--grad)" font-size="11">Page Directory</text>
        <text x="270" y="286" text-anchor="middle" fill="var(--fg-dim)" font-size="10">512 entries</text>
        <line x1="270" y1="295" x2="270" y2="320" stroke="var(--line)" stroke-width="1.5" marker-end="url(#aD)"/>
        <rect x="200" y="320" width="140" height="45" rx="8" fill="rgba(88,166,255,.15)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="270" y="338" text-anchor="middle" fill="var(--accent)" font-size="11">Page Table</text>
        <text x="270" y="356" text-anchor="middle" fill="var(--fg-dim)" font-size="10">512 PTE entries</text>
        <!-- Final: Physical Page -->
        <line x1="270" y1="365" x2="270" y2="395" stroke="var(--accent-2)" stroke-width="2" marker-end="url(#aG)"/>
        <rect x="200" y="395" width="140" height="45" rx="8" fill="rgba(63,185,80,.15)" stroke="var(--accent-2)" stroke-width="2"/>
        <text x="270" y="413" text-anchor="middle" fill="var(--accent-2)" font-size="11" font-weight="600">Physical Page</text>
        <text x="270" y="431" text-anchor="middle" fill="var(--fg-dim)" font-size="10">4KB Frame</text>
        <!-- Right: walk details -->
        <rect x="380" y="110" width="390" height="330" rx="8" fill="var(--bg)"/>
        <text x="400" y="138" fill="var(--accent)" font-family="monospace" font-size="12" font-weight="600">Walk Algorithm (simplified)</text>
        <text x="400" y="165" fill="var(--fg-dim)" font-family="monospace" font-size="11">pte_t *walk(pde_t *pgdir, uint va, int alloc) {</text>
        <text x="420" y="190" fill="var(--fg-dim)" font-family="monospace" font-size="11">// Level 1: PML4</text>
        <text x="420" y="214" fill="var(--accent)" font-family="monospace" font-size="11">pde_t *pml4 = &amp;pgdir[PML4(va)];</text>
        <text x="420" y="238" fill="var(--fg-dim)" font-family="monospace" font-size="11">// Level 2: PDPT</text>
        <text x="420" y="262" fill="var(--accent-2)" font-family="monospace" font-size="11">pde_t *pdpt = &amp;p2v(P2V(pml4))[PDPT(va)];</text>
        <text x="420" y="286" fill="var(--fg-dim)" font-family="monospace" font-size="11">// Level 3: Page Directory</text>
        <text x="420" y="310" fill="var(--grad)" font-family="monospace" font-size="11">pde_t *pde = &amp;p2v(P2V(pdpt))[PD(va)];</text>
        <text x="420" y="334" fill="var(--fg-dim)" font-family="monospace" font-size="11">// Level 4: Page Table</text>
        <text x="420" y="358" fill="var(--accent)" font-family="monospace" font-size="11">pte_t *pte = &amp;p2v(P2V(pde))[PT(va)];</text>
        <text x="420" y="382" fill="var(--fg-dim)" font-family="monospace" font-size="11">return pte; // contains PPN + flags</text>
        <text x="400" y="408" fill="var(--fg-dim)" font-family="monospace" font-size="11">}</text>
        <text x="400" y="435" fill="var(--fg-dim)" font-size="10">每个 P2V() 将物理地址转为内核虚拟地址（直接映射）</text>
        <defs><marker id="aD" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="var(--line)"/></marker>
        <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--accent-2)"/></marker></defs>`;
      svg.appendChild(g);
    }
  },
  {
    t:"x86-64 页表条目结构",
    l:"| Physical Page Number (40 bits) | Flags (12 bits) |",
    d:"每个页表条目 64 位：<br>高 40 位是下一级页表/物理页的物理地址（右移 12 位存储）<br>低 12 位是标志位：P(存在), R/W(读写), U/S(用户), PWT, PCD, A, D, PS, G, XD。<br>大页 (2MB/1GB) 可以跳过中间级。",
    b:[{t:"PTE",c:"badge--def"},{t:"64-bit",c:"badge--warn"},{t:"大页",c:"badge--tip"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <text x="400" y="25" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">x86-64 PTE 格式详解</text>
        <!-- PTE bit layout -->
        <rect x="20" y="45" width="760" height="55" rx="6" fill="var(--bg)" stroke="var(--line)"/>
        <text x="35" y="80" fill="var(--fg-dim)" font-family="monospace" font-size="10">63</text><text x="305" y="80" fill="var(--fg-dim)" font-family="monospace" font-size="10">51</text><text x="460" y="80" fill="var(--fg-dim)" font-family="monospace" font-size="10">12 11</text><text x="775" y="80" fill="var(--fg-dim)" font-family="monospace" font-size="10">0</text>
        <rect x="30" y="55" width="30" height="32" rx="2" fill="rgba(248,81,73,.15)"/><text x="45" y="76" text-anchor="middle" font-size="8" fill="var(--danger)">NX</text>
        <rect x="62" y="55" width="240" height="32" rx="2" fill="rgba(88,166,255,.08)"/><text x="182" y="76" text-anchor="middle" font-size="10" fill="var(--fg-dim)">Available / Reserved</text>
        <rect x="305" y="55" width="155" height="32" rx="2" fill="rgba(63,185,80,.15)"/><text x="382" y="71" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">PPN [51:12]</text><text x="382" y="83" text-anchor="middle" fill="var(--fg-dim)" font-size="9">Physical Page Number</text>
        <rect x="463" y="55" width="315" height="32" rx="2" fill="rgba(210,153,34,.12)"/>
        <text x="620" y="76" text-anchor="middle" fill="var(--grad)" font-family="monospace" font-size="10">G|PAT|D|A|PCD|PWT|U/S|R/W|P</text>
        <!-- Flag columns detail -->
        <rect x="20" y="115" width="370" height="250" rx="8" fill="var(--bg)" stroke="var(--line)"/>
        <text x="40" y="140" fill="var(--accent)" font-size="12" font-weight="600">Flag Bit 说明</text>
        <text x="40" y="165" fill="var(--accent-2)" font-family="monospace" font-size="11">P   (bit 0)  Present     </text><text x="280" y="165" fill="var(--fg-dim)" font-size="10">1=在内存中，0=缺页</text>
        <text x="40" y="188" fill="var(--accent)" font-family="monospace" font-size="11">R/W (bit 1)  Read/Write  </text><text x="280" y="188" fill="var(--fg-dim)" font-size="10">0=只读，1=可写</text>
        <text x="40" y="211" fill="var(--grad)" font-family="monospace" font-size="11">U/S (bit 2)  User/Super  </text><text x="280" y="211" fill="var(--fg-dim)" font-size="10">0=内核，1=用户</text>
        <text x="40" y="234" fill="var(--fg-dim)" font-family="monospace" font-size="11">PWT(bit 3) Write-Through</text>
        <text x="40" y="257" fill="var(--fg-dim)" font-family="monospace" font-size="11">PCD(bit 4) Cache Disable</text>
        <text x="40" y="280" fill="var(--fg-dim)" font-family="monospace" font-size="11">A   (bit 5)  Accessed     </text><text x="280" y="280" fill="var(--fg-dim)" font-size="10">MMU 访问时置1</text>
        <text x="40" y="303" fill="var(--fg-dim)" font-family="monospace" font-size="11">D   (bit 6)  Dirty        </text><text x="280" y="303" fill="var(--fg-dim)" font-size="10">写入时置1</text>
        <text x="40" y="326" fill="var(--grad)" font-family="monospace" font-size="11">PS  (bit 7)  Page Size    </text><text x="280" y="326" fill="var(--fg-dim)" font-size="10">0=4KB, 1=大页(PD=2MB)</text>
        <text x="40" y="349" fill="var(--danger)" font-family="monospace" font-size="11">NX  (bit 63) No Execute   </text><text x="280" y="349" fill="var(--fg-dim)" font-size="10">x86-64, 禁止执行</text>
        <!-- Huge pages -->
        <rect x="410" y="115" width="370" height="250" rx="8" fill="rgba(63,185,80,.05)" stroke="var(--accent-2)" stroke-width="1" stroke-dasharray="4,2"/>
        <text x="430" y="140" fill="var(--accent-2)" font-size="12" font-weight="600">大页 (Huge Pages)</text>
        <text x="430" y="168" fill="var(--fg-dim)" font-size="11">设置 PS=1 可以跳过后续级页表：</text>
        <text x="430" y="198" fill="var(--accent)" font-size="11">PDPT PS=1 → 1GB 页</text>
        <text x="445" y="218" fill="var(--fg-dim)" font-size="10">仅在 PML4 → PDPT 后生效</text>
        <text x="430" y="246" fill="var(--accent-2)" font-size="11">PD PS=1 → 2MB 页</text>
        <text x="445" y="266" fill="var(--fg-dim)" font-size="10">仅在 PDPT → PD 后生效</text>
        <text x="430" y="296" fill="var(--grad)" font-size="11">优势：</text>
        <text x="430" y="318" fill="var(--fg-dim)" font-size="10">• 减少 TLB miss (1条覆盖大范围)</text>
        <text x="430" y="340" fill="var(--fg-dim)" font-size="10">• 减少页表内存 (省去PT级4KB)</text>
        <text x="430" y="362" fill="var(--fg-dim)" font-size="10">• Linux: THP 自动合并 4KB→2MB</text>
        <!-- Bottom note -->
        <text x="400" y="430" text-anchor="middle" fill="var(--fg-dim)" font-size="12">x86-64 虚拟地址只用 48 位（sign-extend 到 64 位）= 256TB 用户空间 + 256TB 内核空间</text>`;
      svg.appendChild(g);
    }
  },
  {
    t:"TLB — 地址转换缓存",
    l:"TLB hit: va → pa in 1 cycle; miss: 4 mem reads (slow!)",
    d:"四级页表遍历需要 4 次内存访问，太慢了！<br><b>TLB (Translation Lookaside Buffer)</b> 缓存最近使用的 va→pa 映射。<br>TLB hit 只需 1 个时钟周期；TLB miss 触发硬件页表遍历。<br>上下文切换时需要刷新 TLB（或使用 ASID/PCID 避免）。",
    b:[{t:"TLB",c:"badge--def"},{t:"缓存",c:"badge--tip"},{t:"ASID",c:"badge--warn"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <text x="400" y="25" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">TLB — 地址转换缓存</text>
        <!-- CPU with TLB -->
        <rect x="30" y="50" width="300" height="180" rx="10" fill="rgba(88,166,255,.08)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="180" y="80" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="700">CPU Core</text>
        <rect x="50" y="95" width="260" height="60" rx="8" fill="rgba(63,185,80,.10)" stroke="var(--accent-2)" stroke-width="1.5"/>
        <text x="180" y="118" text-anchor="middle" fill="var(--accent-2)" font-size="13" font-weight="600">TLB (L1 ITLB / DTLB)</text>
        <text x="180" y="140" text-anchor="middle" fill="var(--fg-dim)" font-size="11">64-256 entries, fully-assoc</text>
        <!-- TLB table -->
        <rect x="65" y="160" width="240" height="55" rx="6" fill="var(--bg)"/>
        <text x="75" y="178" fill="var(--fg-dim)" font-family="monospace" font-size="10">VPN | ASID | PPN | Flags</text>
        <text x="75" y="195" fill="var(--accent-2)" font-family="monospace" font-size="10">0xA4 |  1   | 0xF8 | R/W=1</text>
        <text x="75" y="210" fill="var(--accent-2)" font-family="monospace" font-size="10">0xA5 |  1   | 0xF9 | U/S=1</text>
        <!-- Flow diagram -->
        <rect x="380" y="50" width="390" height="100" rx="8" fill="var(--bg)" stroke="var(--line)"/>
        <text x="575" y="75" text-anchor="middle" fill="var(--fg)" font-size="13" font-weight="600">TLB Hit: Fast Path</text>
        <text x="400" y="100" fill="var(--fg-dim)" font-family="monospace" font-size="11">CPU issues va → TLB lookup (parallel)</text>
        <text x="400" y="122" fill="var(--accent-2)" font-family="monospace" font-size="11">→ TLB hit! pa found in 1 cycle. Done.</text>
        <rect x="380" y="170" width="390" height="130" rx="8" fill="rgba(248,81,73,.05)" stroke="var(--danger)" stroke-width="1"/>
        <text x="575" y="195" text-anchor="middle" fill="var(--danger)" font-size="13" font-weight="600">TLB Miss: Slow Path</text>
        <text x="400" y="220" fill="var(--fg-dim)" font-family="monospace" font-size="11">TLB miss! → Hardware page walker starts:</text>
        <text x="400" y="245" fill="var(--grad)" font-family="monospace" font-size="11">1. Read PML4 from CR3  (1 mem access)</text>
        <text x="400" y="268" fill="var(--grad)" font-family="monospace" font-size="11">2. Read PDPT            (1 mem access)</text>
        <text x="400" y="291" fill="var(--grad)" font-family="monospace" font-size="11">3. Read PD              (1 mem access)</text>
        <text x="400" y="304" fill="var(--grad)" font-family="monospace" font-size="11">4. Read PT → PTE found  (1 mem access) → fill TLB</text>
        <!-- Performance comparison -->
        <text x="400" y="340" text-anchor="middle" fill="var(--fg)" font-size="14" font-weight="700">性能对比</text>
        <rect x="30" y="355" width="350" height="30" rx="6" fill="rgba(63,185,80,.10)"/>
        <text x="205" y="375" text-anchor="middle" fill="var(--accent-2)" font-size="12">TLB Hit:  ~1 cycle (~0.3ns @ 3GHz)</text>
        <rect x="400" y="355" width="370" height="30" rx="6" fill="rgba(248,81,73,.10)"/>
        <text x="585" y="375" text-anchor="middle" fill="var(--danger)" font-size="12">TLB Miss: ~100-200 cycles + 4 mem reads</text>
        <!-- Context switch note -->
        <text x="400" y="430" text-anchor="middle" fill="var(--grad)" font-size="12">上下文切换时刷新 TLB (mov to cr3)，PCID/ASID 可避免全刷新</text>`;
      svg.appendChild(g);
    }
  }
];

let step=0,autoTimer=null,autoOn=false;
const explain=document.getElementById('explain'),stage=document.getElementById('stage'),dots=document.getElementById('dots');
const prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),autoBtn=document.getElementById('autoBtn');
function render(){
  const s=S[step];
  explain.innerHTML=`<div class="step-title">${s.t}</div>${s.l?`<div class="code-line">${s.l}</div>`:''}<div class="badge-row">${s.b.map(b=>`<span class="badge ${b.c||'badge--def'}">${b.t}</span>`).join('')}</div><div class="step-desc">${s.d}</div>`;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 800 480');svg.style.width='100%';svg.style.height='100%';
  stage.innerHTML='';stage.appendChild(svg);s.r(svg);
  dots.innerHTML=S.map((_,i)=>{let cls=i===step?'active':i<step?'done':'';return `<span class="step-dot ${cls}"></span>`;}).join('');
  prevBtn.disabled=step===0;nextBtn.disabled=step===S.length-1;
}
function next(){if(step<S.length-1){step++;render();}}
function prev(){if(step>0){step--;render();}}
function restart(){step=0;render();}
function toggleAuto(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}
  else{autoOn=true;autoBtn.innerHTML='&#9646;&#9646; 停止';autoTimer=setInterval(()=>{if(step<S.length-1){step++;render();}else{clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}},3000);}
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='r'||e.key==='R'){e.preventDefault();restart();}
  else if(e.key==='a'||e.key==='A'){e.preventDefault();toggleAuto();}
});
prevBtn.onclick=prev;nextBtn.onclick=next;autoBtn.onclick=toggleAuto;render();
</script>
</body>
</html>
