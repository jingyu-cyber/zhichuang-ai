<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>上下文切换 — 操作系统内核构建</title>
<style>:root{--bg:#0d1117;--bg-soft:#161b22;--bg-code:#0a0c10;--fg:#e6edf3;--fg-dim:#8b949e;--line:#30363d;--accent:#58a6ff;--accent-2:#3fb950;--grad:#d29922;--success:#3fb950;--danger:#f85149}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(88,166,255,.18);color:var(--accent)}.badge--tip{background:rgba(63,185,80,.18);color:var(--success)}.badge--warn{background:rgba(210,153,34,.18);color:var(--grad)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.code-line{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="demo-shell">
<div class="demo-header">
<h1>第 6 节 &middot; 上下文切换</h1>
<span class="breadcrumb"><a href="../index.html">课程首页</a> / 进程管理</span>
</div>
<div class="demo-main">
<div class="panel-explain" id="explain"></div>
<div class="panel-stage" id="stage"></div>
</div>
<div class="demo-controls">
<button id="prevBtn">&larr; 上一步</button>
<div class="step-dots" id="dots"></div>
<button id="nextBtn">下一步 &rarr;</button>
<button id="autoBtn">&#9654; 自动播放</button>
</div>
</div>
<script>
const S=[
  {
    t:"struct context — 内核上下文",
    l:"struct context { uint edi, esi, ebx, ebp, eip; };",
    d:"内核上下文仅保存 <b>寄存器</b>，不保存用户寄存器（用户态寄存器在 trapframe 中）。<br>每个进程的 PCB 中有一个 <code>struct context</code> 字段。<br>上下文切换发生在内核态，切换的是内核执行流。",
    b:[{t:"context",c:"badge--def"},{t:"寄存器",c:"badge--warn"},{t:"内核态",c:"badge--tip"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <text x="400" y="28" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">struct context — 内核上下文</text>
        <!-- CPU Registers -->
        <rect x="30" y="50" width="220" height="200" rx="10" fill="rgba(88,166,255,.08)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="140" y="78" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="600">CPU 通用寄存器</text>
        <rect x="45" y="90" width="190" height="22" rx="3" fill="rgba(88,166,255,.10)"/><text x="140" y="106" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">eax</text>
        <rect x="45" y="116" width="190" height="22" rx="3" fill="rgba(88,166,255,.10)"/><text x="140" y="132" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">ecx</text>
        <rect x="45" y="142" width="190" height="22" rx="3" fill="rgba(88,166,255,.10)"/><text x="140" y="158" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">edx</text>
        <rect x="45" y="168" width="190" height="22" rx="3" fill="rgba(88,166,255,.10)"/><text x="140" y="184" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">ebx</text>
        <rect x="45" y="194" width="190" height="22" rx="3" fill="rgba(88,166,255,.10)"/><text x="140" y="210" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">...</text>
        <!-- Arrow filter -->
        <line x1="250" y1="140" x2="310" y2="140" stroke="var(--grad)" stroke-width="2"/>
        <text x="280" y="130" text-anchor="middle" fill="var(--grad)" font-size="10">子集</text>
        <!-- Context struct -->
        <rect x="310" y="50" width="220" height="200" rx="10" fill="rgba(63,185,80,.08)" stroke="var(--accent-2)" stroke-width="1.5"/>
        <text x="420" y="78" text-anchor="middle" fill="var(--accent-2)" font-size="13" font-weight="600">struct context (子集)</text>
        <rect x="325" y="90" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="420" y="106" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">edi</text>
        <rect x="325" y="116" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="420" y="132" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">esi</text>
        <rect x="325" y="142" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="420" y="158" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">ebx</text>
        <rect x="325" y="168" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="420" y="184" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">ebp</text>
        <rect x="325" y="194" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="420" y="210" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">eip</text>
        <!-- Why only 5? -->
        <rect x="570" y="50" width="200" height="200" rx="10" fill="rgba(210,153,34,.06)" stroke="var(--grad)" stroke-width="1" stroke-dasharray="4,2"/>
        <text x="670" y="78" text-anchor="middle" fill="var(--grad)" font-size="12" font-weight="600">为什么只有 5 个？</text>
        <text x="590" y="105" fill="var(--fg-dim)" font-size="11">调用者保存寄存器</text>
        <text x="590" y="128" fill="var(--fg-dim)" font-size="11">(eax,ecx,edx) 由</text>
        <text x="590" y="151" fill="var(--fg-dim)" font-size="11">编译器自动保护，</text>
        <text x="590" y="174" fill="var(--fg-dim)" font-size="11">只需保存被调用者</text>
        <text x="590" y="197" fill="var(--fg-dim)" font-size="11">保存寄存器</text>
        <text x="590" y="220" fill="var(--fg-dim)" font-size="11">(ebx,esi,edi,ebp)</text>
        <text x="590" y="240" fill="var(--grad)" font-size="11">+ eip (返回地址)</text>
        <!-- PCB struct -->
        <rect x="30" y="275" width="740" height="185" rx="8" fill="var(--bg)" stroke="var(--line)"/>
        <text x="50" y="300" fill="var(--accent)" font-family="monospace" font-size="13">struct proc {             // PCB</text>
        <text x="70" y="322" fill="var(--fg-dim)" font-family="monospace" font-size="12">uint sz;                  // 进程内存大小</text>
        <text x="70" y="344" fill="var(--fg-dim)" font-family="monospace" font-size="12">pde_t *pgdir;             // 页表指针</text>
        <text x="70" y="366" fill="var(--fg-dim)" font-family="monospace" font-size="12">char *kstack;             // 内核栈底</text>
        <text x="70" y="388" fill="var(--fg-dim)" font-family="monospace" font-size="12">enum procstate state;     // 进程状态</text>
        <text x="70" y="410" fill="var(--grad)" font-family="monospace" font-size="12">struct context *context;  // ← swtch() 保存/恢复这个！</text>
        <text x="70" y="432" fill="var(--fg-dim)" font-family="monospace" font-size="12">struct trapframe *tf;     // 用户态上下文（中断时保存）</text>
        <text x="50" y="455" fill="var(--fg-dim)" font-family="monospace" font-size="13">};</text>`;
      svg.appendChild(g);
    }
  },
  {
    t:"swtch 汇编 — 保存旧上下文",
    l:"push %edi; push %esi; push %ebx; push %ebp; mov %esp, (%eax)",
    d:"<code>swtch(old, new)</code> 前半部分：<br>1) 将 callee-saved 寄存器压入当前内核栈<br>2) 将当前 <code>%esp</code> 保存到 <code>old->esp</code> (即 <code>*old = %esp</code>)<br>3) 此时进程 A 的执行状态已完全保存",
    b:[{t:"保存",c:"badge--warn"},{t:"压栈",c:"badge--def"},{t:"old context",c:"badge--tip"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <text x="400" y="28" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">swtch — 保存进程 A 的上下文</text>
        <!-- CPU running Process A -->
        <rect x="30" y="50" width="200" height="160" rx="10" fill="rgba(88,166,255,.10)" stroke="var(--accent)" stroke-width="2"/>
        <text x="130" y="78" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="600">CPU</text>
        <rect x="50" y="90" width="160" height="28" rx="4" fill="rgba(88,166,255,.15)"/><text x="130" y="109" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">edi=0x1000</text>
        <rect x="50" y="122" width="160" height="28" rx="4" fill="rgba(88,166,255,.15)"/><text x="130" y="141" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">esi=0x2000</text>
        <rect x="50" y="154" width="160" height="28" rx="4" fill="rgba(88,166,255,.15)"/><text x="130" y="173" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">eip: swtch+8</text>
        <text x="130" y="198" text-anchor="middle" fill="var(--accent)" font-size="11">Running Process A</text>
        <!-- Save direction arrow -->
        <line x1="230" y1="130" x2="300" y2="130" stroke="var(--grad)" stroke-width="2.5" marker-end="url(#aG)"/>
        <text x="265" y="120" text-anchor="middle" fill="var(--grad)" font-size="10">push regs</text>
        <!-- Stack frame showing pushed regs -->
        <rect x="300" y="50" width="220" height="220" rx="10" fill="rgba(63,185,80,.06)" stroke="var(--accent-2)" stroke-width="1.5"/>
        <text x="410" y="78" text-anchor="middle" fill="var(--accent-2)" font-size="13" font-weight="600">A's Kernel Stack</text>
        <rect x="315" y="90" width="190" height="22" rx="3" fill="rgba(63,185,80,.10)"/><text x="410" y="106" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="11">... older frames ...</text>
        <rect x="315" y="116" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="410" y="132" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">edi = 0x1000</text>
        <rect x="315" y="142" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="410" y="158" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">esi = 0x2000</text>
        <rect x="315" y="168" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="410" y="184" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">ebx = 0x3000</text>
        <rect x="315" y="194" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="410" y="210" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">ebp = 0x4000</text>
        <rect x="315" y="220" width="190" height="22" rx="3" fill="rgba(63,185,80,.18)"/><text x="410" y="236" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">eip = swtch+8 (返回地址)</text>
        <text x="410" y="260" text-anchor="middle" fill="var(--fg-dim)" font-size="10">← old→esp 指向这里</text>
        <!-- Code -->
        <rect x="550" y="50" width="220" height="200" rx="8" fill="var(--bg)"/>
        <text x="570" y="75" fill="var(--accent)" font-family="monospace" font-size="12">swtch:</text>
        <text x="570" y="98" fill="var(--fg-dim)" font-family="monospace" font-size="11">push %ebp</text>
        <text x="570" y="120" fill="var(--fg-dim)" font-family="monospace" font-size="11">push %ebx</text>
        <text x="570" y="142" fill="var(--fg-dim)" font-family="monospace" font-size="11">push %esi</text>
        <text x="570" y="164" fill="var(--fg-dim)" font-family="monospace" font-size="11">push %edi</text>
        <text x="570" y="190" fill="var(--grad)" font-family="monospace" font-size="11">mov %esp, (%eax)</text>
        <text x="570" y="215" fill="var(--fg-dim)" font-family="monospace" font-size="11">// *old = esp</text>
        <text x="570" y="240" fill="var(--fg-dim)" font-family="monospace" font-size="11">// 保存完成!</text>
        <!-- Bottom: PCB A -->
        <rect x="30" y="310" width="740" height="155" rx="8" fill="var(--bg)" stroke="var(--line)"/>
        <text x="50" y="340" fill="var(--accent)" font-family="monospace" font-size="13">Process A PCB:</text>
        <rect x="50" y="355" width="160" height="28" rx="4" fill="rgba(88,166,255,.10)"/><text x="130" y="374" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="11">state = RUNNABLE</text>
        <rect x="230" y="355" width="200" height="28" rx="4" fill="rgba(88,166,255,.10)"/><text x="330" y="374" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="11">kstack = 0x80700000</text>
        <rect x="450" y="355" width="200" height="28" rx="4" fill="rgba(63,185,80,.15)"/><text x="550" y="374" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">context → saved on stack</text>
        <text x="50" y="415" fill="var(--fg-dim)" font-family="monospace" font-size="11">// 上下文保存在 A 的内核栈中，context.esp 指向保存的帧</text>
        <text x="50" y="440" fill="var(--fg-dim)" font-family="monospace" font-size="11">// 当 A 被重新调度时，swtch 从该地址恢复寄存器</text>
        <defs><marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--grad)"/></marker></defs>`;
      svg.appendChild(g);
    }
  },
  {
    t:"swtch 汇编 — 恢复新上下文",
    l:"mov %edx, %esp; pop %edi; pop %esi; pop %ebx; pop %ebp; ret",
    d:"<code>swtch</code> 后半部分：<br>1) 将 <code>%esp</code> 切换到 <code>new->esp</code>（即进程 B 的内核栈）<br>2) 从 B 的栈中弹出之前保存的寄存器<br>3) <code>ret</code> 跳转到 B 上次被切换出去时的下一条指令<br>此时进程 B 无缝恢复执行！",
    b:[{t:"恢复",c:"badge--tip"},{t:"栈切换",c:"badge--def"},{t:"ret 跳转",c:"badge--warn"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <text x="400" y="28" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">swtch — 恢复进程 B 的上下文</text>
        <!-- B's stack (source of restore) -->
        <rect x="30" y="50" width="220" height="220" rx="10" fill="rgba(63,185,80,.08)" stroke="var(--accent-2)" stroke-width="1.5"/>
        <text x="140" y="78" text-anchor="middle" fill="var(--accent-2)" font-size="13" font-weight="600">B's Kernel Stack</text>
        <rect x="45" y="90" width="190" height="22" rx="3" fill="rgba(63,185,80,.10)"/><text x="140" y="106" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="11">... older frames ...</text>
        <rect x="45" y="116" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="140" y="132" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">edi = 0xA000</text>
        <rect x="45" y="142" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="140" y="158" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">esi = 0xB000</text>
        <rect x="45" y="168" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="140" y="184" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">ebx = 0xC000</text>
        <rect x="45" y="194" width="190" height="22" rx="3" fill="rgba(63,185,80,.15)"/><text x="140" y="210" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">ebp = 0xD000</text>
        <rect x="45" y="220" width="190" height="22" rx="3" fill="rgba(63,185,80,.18)"/><text x="140" y="236" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="11">eip → B's sched()+12</text>
        <text x="140" y="260" text-anchor="middle" fill="var(--fg-dim)" font-size="10">← new→esp 指向这里</text>
        <!-- Restore arrow -->
        <line x1="250" y1="160" x2="320" y2="160" stroke="var(--accent-2)" stroke-width="2.5" marker-end="url(#aB)"/>
        <text x="285" y="150" text-anchor="middle" fill="var(--accent-2)" font-size="10">pop regs</text>
        <!-- CPU after restore -->
        <rect x="320" y="50" width="220" height="160" rx="10" fill="rgba(63,185,80,.10)" stroke="var(--accent-2)" stroke-width="2"/>
        <text x="430" y="78" text-anchor="middle" fill="var(--accent-2)" font-size="13" font-weight="600">CPU (after restore)</text>
        <rect x="340" y="90" width="180" height="28" rx="4" fill="rgba(63,185,80,.15)"/><text x="430" y="109" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">edi=0xA000</text>
        <rect x="340" y="122" width="180" height="28" rx="4" fill="rgba(63,185,80,.15)"/><text x="430" y="141" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">esi=0xB000</text>
        <rect x="340" y="154" width="180" height="28" rx="4" fill="rgba(63,185,80,.15)"/><text x="430" y="173" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">eip: B's sched()+12</text>
        <text x="430" y="198" text-anchor="middle" fill="var(--accent-2)" font-size="12" font-weight="600">Running Process B!</text>

        <text x="590" y="155" fill="var(--accent-2)" font-family="monospace" font-size="11">pop %edi</text>
        <text x="590" y="178" fill="var(--accent-2)" font-family="monospace" font-size="11">pop %esi</text>
        <text x="590" y="201" fill="var(--accent-2)" font-family="monospace" font-size="11">pop %ebx</text>
        <text x="590" y="224" fill="var(--accent-2)" font-family="monospace" font-size="11">pop %ebp</text>
        <text x="590" y="247" fill="var(--accent-2)" font-family="monospace" font-size="11">ret</text>
        <!-- Full diagram bottom -->
        <text x="400" y="300" text-anchor="middle" fill="var(--fg)" font-size="14" font-weight="700">完整上下文切换流程</text>
        <!-- Timeline -->
        <rect x="30" y="325" width="740" height="8" rx="4" fill="var(--line)"/>
        <circle cx="100" cy="329" r="10" fill="var(--accent)"/><text x="100" y="355" text-anchor="middle" fill="var(--accent)" font-size="11">A RUNNING</text>
        <line x1="100" y1="329" x2="240" y2="329" stroke="var(--grad)" stroke-width="2"/>
        <circle cx="240" cy="329" r="10" fill="var(--grad)"/><text x="240" y="355" text-anchor="middle" fill="var(--grad)" font-size="11">swtch</text>

        <line x1="240" y1="329" x2="320" y2="329" stroke="var(--accent)" stroke-width="2"/>
        <circle cx="320" cy="329" r="10" fill="var(--accent)"/><text x="320" y="355" text-anchor="middle" fill="var(--accent)" font-size="11">scheduler</text>

        <circle cx="460" cy="329" r="10" fill="var(--grad)"/><text x="460" y="355" text-anchor="middle" fill="var(--grad)" font-size="11">swtch</text>

      svg.appendChild(g);
    }
  }
];

let step=0,autoTimer=null,autoOn=false;
const explain=document.getElementById('explain'),stage=document.getElementById('stage'),dots=document.getElementById('dots');
const prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),autoBtn=document.getElementById('autoBtn');
function render(){
  const s=S[step];
  explain.innerHTML=`<div class="step-title">${s.t}</div>${s.l?`<div class="code-line">${s.l}</div>`:''}<div class="badge-row">${s.b.map(b=>`<span class="badge ${b.c||'badge--def'}">${b.t}</span>`).join('')}</div><div class="step-desc">${s.d}</div>`;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 800 480');svg.style.width='100%';svg.style.height='100%';
  stage.innerHTML='';stage.appendChild(svg);s.r(svg);
  dots.innerHTML=S.map((_,i)=>{let cls=i===step?'active':i<step?'done':'';return `<span class="step-dot ${cls}"></span>`;}).join('');
  prevBtn.disabled=step===0;nextBtn.disabled=step===S.length-1;
}
function next(){if(step<S.length-1){step++;render();}}
function prev(){if(step>0){step--;render();}}
function restart(){step=0;render();}
function toggleAuto(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}
  else{autoOn=true;autoBtn.innerHTML='&#9646;&#9646; 停止';autoTimer=setInterval(()=>{if(step<S.length-1){step++;render();}else{clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}},3000);}
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='r'||e.key==='R'){e.preventDefault();restart();}
  else if(e.key==='a'||e.key==='A'){e.preventDefault();toggleAuto();}
});
prevBtn.onclick=prev;nextBtn.onclick=next;autoBtn.onclick=toggleAuto;render();
</script>
