<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>启动流程 — 操作系统内核构建</title>
<style>
:root{--bg:#0d1117;--bg-soft:#161b22;--bg-code:#0a0c10;--fg:#e6edf3;--fg-dim:#8b949e;--line:#30363d;--accent:#58a6ff;--accent-2:#3fb950;--grad:#d29922;--success:#3fb950;--danger:#f85149}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(88,166,255,.18);color:var(--accent)}.badge--tip{background:rgba(63,185,80,.18);color:var(--success)}.badge--warn{background:rgba(210,153,34,.18);color:var(--grad)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.code-line{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
<div class="demo-header">
<h1>第 1 节 &middot; 启动流程</h1>
<span class="breadcrumb"><a href="../index.html">课程首页</a> / 内核启动与系统调用</span>
</div>
<div class="demo-main">
<div class="panel-explain" id="explain"></div>
<div class="panel-stage" id="stage"></div>
</div>
<div class="demo-controls">
<button id="prevBtn">&larr; 上一步</button>
<div class="step-dots" id="dots"></div>
<button id="nextBtn">下一步 &rarr;</button>
<button id="autoBtn">&#9654; 自动播放</button>
</div>
</div>
<script>
const S = [
  {
    t: "Bootloader 加载内核",
    l: "0x7c00: bootloader → load kernel at 0x100000",
    d: "BIOS/UEFI 执行后，bootloader（如 GRUB）被加载到 <code>0x7c00</code>。<br>bootloader 从磁盘读取内核映像，将其加载到物理地址 <code>0x100000</code>（1MB），<br>然后跳转到内核入口 <code>_start</code>。",
    b: [{t:"Bootloader",c:"badge--warn"},{t:"实模式",c:"badge--def"}],
    r(svg){
      svg.innerHTML='';
      svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      // Hardware box
      g.innerHTML=`
        <rect x="20" y="20" width="200" height="50" rx="8" fill="none" stroke="var(--line)" stroke-width="1.5"/>
        <text x="120" y="50" text-anchor="middle" fill="var(--fg-dim)" font-size="14">BIOS / UEFI</text>
        <!-- Arrow BIOS to bootloader -->
        <line x1="220" y1="45" x2="280" y2="45" stroke="var(--grad)" stroke-width="2" marker-end="url(#arrO)"/>
        <rect x="280" y="20" width="240" height="50" rx="8" fill="rgba(210,153,34,.12)" stroke="var(--grad)" stroke-width="2"/>
        <text x="400" y="48" text-anchor="middle" fill="var(--grad)" font-size="14" font-weight="700">GRUB Bootloader</text>
        <text x="400" y="62" text-anchor="middle" fill="var(--fg-dim)" font-size="11">0x7c00 实模式</text>
        <!-- Arrow bootloader to kernel -->
        <line x1="520" y1="45" x2="580" y2="45" stroke="var(--accent)" stroke-width="2" marker-end="url(#arrB)"/>
        <rect x="580" y="20" width="200" height="50" rx="8" fill="rgba(88,166,255,.12)" stroke="var(--accent)" stroke-width="2"/>
        <text x="680" y="48" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="700">Kernel Image</text>
        <text x="680" y="62" text-anchor="middle" fill="var(--fg-dim)" font-size="11">0x100000 保护模式</text>
        <!-- Disk indicator -->
        <rect x="330" y="110" width="140" height="60" rx="6" fill="none" stroke="var(--line)" stroke-width="1"/>
        <text x="400" y="136" text-anchor="middle" fill="var(--fg-dim)" font-size="12">Disk</text>
        <text x="400" y="156" text-anchor="middle" fill="var(--accent-2)" font-size="11">vmlinuz</text>
        <line x1="400" y1="110" x2="400" y2="70" stroke="var(--grad)" stroke-width="1.5" stroke-dasharray="4,4"/>
        <!-- Timeline bar -->
        <rect x="30" y="210" width="740" height="6" rx="3" fill="var(--line)"/>
        <circle cx="50" cy="213" r="8" fill="var(--grad)" opacity="1"/><text x="50" y="240" text-anchor="middle" fill="var(--grad)" font-size="12">BIOS</text>
        <circle cx="230" cy="213" r="8" fill="var(--grad)" opacity="1"/><text x="230" y="240" text-anchor="middle" fill="var(--grad)" font-size="12">GRUB</text>
        <circle cx="420" cy="213" r="8" fill="var(--line)"/><text x="420" y="240" text-anchor="middle" fill="var(--fg-dim)" font-size="12">Entry</text>
        <circle cx="580" cy="213" r="8" fill="var(--line)"/><text x="580" y="240" text-anchor="middle" fill="var(--fg-dim)" font-size="12">mm_init</text>
        <circle cx="740" cy="213" r="8" fill="var(--line)"/><text x="740" y="240" text-anchor="middle" fill="var(--fg-dim)" font-size="12">Console</text>
        <!-- Animated pulse on GRUB -->
        <circle cx="230" cy="213" r="12" fill="none" stroke="var(--grad)" stroke-width="2" opacity="0.6">
          <animate attributeName="r" from="8" to="24" dur="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" from="0.6" to="0" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <!-- Def markers -->
        <defs><marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--grad)"/></marker>
        <marker id="arrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--accent)"/></marker></defs>`;
      svg.appendChild(g);
    }
  },
  {
    t: "内核入口 _start",
    l: "void _start() { setup_paging(); enable_paging(); }",
    d: "内核入口 <code>_start</code> 汇编代码首先设置栈指针，<br>然后调用 <code>setup_paging()</code> 建立初始页表，<br>启用分页后跳转到 <code>main()</code> C 函数。",
    b: [{t:"入口点",c:"badge--def"},{t:"分页",c:"badge--tip"}],
    r(svg){
      svg.innerHTML='';
      svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <rect x="30" y="30" width="740" height="6" rx="3" fill="var(--line)"/>
        <circle cx="50" cy="33" r="8" fill="var(--success)"/><text x="50" y="60" text-anchor="middle" fill="var(--success)" font-size="12">BIOS</text>
        <circle cx="230" cy="33" r="8" fill="var(--success)"/><text x="230" y="60" text-anchor="middle" fill="var(--success)" font-size="12">GRUB</text>
        <circle cx="420" cy="33" r="8" fill="var(--accent)"/><text x="420" y="60" text-anchor="middle" fill="var(--accent)" font-size="12">Entry</text>
        <circle cx="580" cy="33" r="8" fill="var(--line)"/><text x="580" y="60" text-anchor="middle" fill="var(--fg-dim)" font-size="12">mm_init</text>
        <circle cx="740" cy="33" r="8" fill="var(--line)"/><text x="740" y="60" text-anchor="middle" fill="var(--fg-dim)" font-size="12">Console</text>
        <!-- Pulse on Entry -->
        <circle cx="420" cy="33" r="12" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.6">
          <animate attributeName="r" from="8" to="24" dur="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" from="0.6" to="0" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <!-- Kernel internals -->
        <rect x="280" y="100" width="240" height="160" rx="10" fill="rgba(88,166,255,.08)" stroke="var(--accent)" stroke-width="2"/>
        <text x="400" y="130" text-anchor="middle" fill="var(--accent)" font-size="15" font-weight="700">Kernel Entry</text>
        <rect x="300" y="145" width="200" height="28" rx="5" fill="rgba(88,166,255,.15)"/>
        <text x="400" y="164" text-anchor="middle" fill="var(--fg)" font-size="12">_start (asm) : 设栈,关中断</text>
        <rect x="300" y="180" width="200" height="28" rx="5" fill="rgba(63,185,80,.12)"/>
        <text x="400" y="199" text-anchor="middle" fill="var(--accent-2)" font-size="12">setup_paging() : 建页表</text>
        <rect x="300" y="215" width="200" height="28" rx="5" fill="rgba(63,185,80,.12)"/>
        <text x="400" y="234" text-anchor="middle" fill="var(--accent-2)" font-size="12">jmp main() : C 入口</text>
        <!-- arrows between steps -->
        <line x1="400" y1="173" x2="400" y2="180" stroke="var(--fg-dim)" stroke-width="1"/>
        <line x1="400" y1="208" x2="400" y2="215" stroke="var(--fg-dim)" stroke-width="1"/>
        <!-- Code snippet -->
        <rect x="30" y="290" width="740" height="150" rx="8" fill="var(--bg)"/>
        <text x="50" y="320" fill="var(--accent)" font-family="monospace" font-size="13">.section .text.entry</text>
        <text x="50" y="342" fill="var(--accent-2)" font-family="monospace" font-size="13">_start:</text>
        <text x="70" y="364" fill="var(--fg-dim)" font-family="monospace" font-size="13">mov    $stack_top, %esp        # 设置栈顶</text>
        <text x="70" y="386" fill="var(--fg-dim)" font-family="monospace" font-size="13">call   setup_paging            # 建立初始页表</text>
        <text x="70" y="408" fill="var(--fg-dim)" font-family="monospace" font-size="13">mov    %eax, %cr0               # 启用分页</text>
        <text x="70" y="430" fill="var(--fg-dim)" font-family="monospace" font-size="13">jmp    main                     # 进入 C 代码</text>
      `;
      svg.appendChild(g);
    }
  },
  {
    t: "mm_init 内存初始化",
    l: "void mm_init() { init_page_allocator(); init_slab(); }",
    d: "进入 C 代码后，<code>mm_init()</code> 初始化内核内存管理：<br>建立伙伴分配器管理物理页，初始化 slab 分配器管理小对象，<br>为后续系统初始化提供内存基础设施。",
    b: [{t:"伙伴系统",c:"badge--def"},{t:"Slab",c:"badge--tip"}],
    r(svg){
      svg.innerHTML='';
      svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <rect x="30" y="30" width="740" height="6" rx="3" fill="var(--line)"/>
        <circle cx="50" cy="33" r="8" fill="var(--success)"/><text x="50" y="60" text-anchor="middle" fill="var(--success)" font-size="12">BIOS</text>
        <circle cx="230" cy="33" r="8" fill="var(--success)"/><text x="230" y="60" text-anchor="middle" fill="var(--success)" font-size="12">GRUB</text>
        <circle cx="420" cy="33" r="8" fill="var(--success)"/><text x="420" y="60" text-anchor="middle" fill="var(--success)" font-size="12">Entry</text>
        <circle cx="580" cy="33" r="8" fill="var(--accent)"/><text x="580" y="60" text-anchor="middle" fill="var(--accent)" font-size="12">mm_init</text>
        <circle cx="740" cy="33" r="8" fill="var(--line)"/><text x="740" y="60" text-anchor="middle" fill="var(--fg-dim)" font-size="12">Console</text>
        <circle cx="580" cy="33" r="12" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.6">
          <animate attributeName="r" from="8" to="24" dur="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" from="0.6" to="0" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <!-- Physical memory layout -->
        <text x="400" y="100" text-anchor="middle" fill="var(--fg-dim)" font-size="14">Physical Memory (4GB)</text>
        <rect x="100" y="115" width="600" height="200" rx="8" fill="none" stroke="var(--line)" stroke-width="1.5"/>
        <!-- reserved -->
        <rect x="105" y="120" width="100" height="40" rx="4" fill="rgba(248,81,73,.15)"/>
        <text x="155" y="144" text-anchor="middle" fill="var(--danger)" font-size="11">Reserved</text>
        <!-- Kernel image -->
        <rect x="215" y="120" width="120" height="40" rx="4" fill="rgba(88,166,255,.15)"/>
        <text x="275" y="144" text-anchor="middle" fill="var(--accent)" font-size="11">Kernel Image</text>
        <!-- Buddy allocator region -->
        <rect x="345" y="120" width="200" height="40" rx="4" fill="rgba(63,185,80,.15)"/>
        <text x="445" y="138" text-anchor="middle" fill="var(--accent-2)" font-size="11">Buddy Allocator</text>
        <text x="445" y="153" text-anchor="middle" fill="var(--fg-dim)" font-size="10">order 0..10</text>
        <!-- Slab allocator -->
        <rect x="555" y="120" width="140" height="40" rx="4" fill="rgba(88,166,255,.15)"/>
        <text x="625" y="144" text-anchor="middle" fill="var(--accent)" font-size="11">Slab Cache</text>
        <!-- Detail: buddy system -->
        <rect x="105" y="180" width="590" height="70" rx="6" fill="var(--bg)"/>
        <text x="120" y="200" fill="var(--accent-2)" font-family="monospace" font-size="12">free_area[0]: &#9632;&#9632;&#9632;&#9632; (4KB pages)</text>
        <text x="120" y="220" fill="var(--accent-2)" font-family="monospace" font-size="12">free_area[1]: &#9632;&#9632;      (2-page buddies, 8KB)</text>
        <text x="120" y="240" fill="var(--accent-2)" font-family="monospace" font-size="12">free_area[2]: &#9632;         (4-page buddies, 16KB)</text>
        <!-- Legend -->
        <rect x="105" y="270" width="10" height="10" fill="rgba(63,185,80,.3)" rx="2"/>
        <text x="120" y="280" fill="var(--fg-dim)" font-size="11">Buddy Allocator</text>
        <rect x="250" y="270" width="10" height="10" fill="rgba(88,166,255,.3)" rx="2"/>
        <text x="265" y="280" fill="var(--fg-dim)" font-size="11">Slab / Kernel</text>
        <rect x="390" y="270" width="10" height="10" fill="rgba(248,81,73,.3)" rx="2"/>
        <text x="405" y="280" fill="var(--fg-dim)" font-size="11">Reserved</text>
        <!-- Memory bar below -->
        <text x="400" y="320" text-anchor="middle" fill="var(--fg)" font-size="14">Physical Frame Allocation (PFA)</text>
        <rect x="100" y="335" width="600" height="30" rx="4" fill="none" stroke="var(--line)"/>
        <rect x="100" y="335" width="80" height="30" rx="4" fill="rgba(248,81,73,.2)"/><text x="140" y="355" text-anchor="middle" font-size="10" fill="var(--danger)">DMA</text>
        <rect x="180" y="335" width="120" height="30" rx="0" fill="rgba(88,166,255,.2)"/><text x="240" y="355" text-anchor="middle" font-size="10" fill="var(--accent)">Kernel</text>
        <rect x="300" y="335" width="400" height="30" rx="4" fill="rgba(63,185,80,.2)"/><text x="500" y="355" text-anchor="middle" font-size="10" fill="var(--accent-2)">User Available</text>
      `;
      svg.appendChild(g);
    }
  },
  {
    t: "时钟与终端初始化 — 启动完成",
    l: "void main() { mm_init(); clock_init(); console_init(); scheduler(); }",
    d: "<code>clock_init()</code> 初始化定时器中断（APIC Timer），设置 <code>HZ=100</code>。<br><code>console_init()</code> 初始化串口/VGA 控制台用于内核输出。<br>最后调用 <code>scheduler()</code> 创建 init 进程，启动完成！",
    b: [{t:"APIC Timer",c:"badge--warn"},{t:"串口",c:"badge--def"},{t:"init进程",c:"badge--tip"}],
    r(svg){
      svg.innerHTML='';
      svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      g.innerHTML=`
        <rect x="30" y="30" width="740" height="6" rx="3" fill="var(--line)"/>
        <circle cx="50" cy="33" r="8" fill="var(--success)"/><text x="50" y="60" text-anchor="middle" fill="var(--success)" font-size="12">BIOS</text>
        <circle cx="230" cy="33" r="8" fill="var(--success)"/><text x="230" y="60" text-anchor="middle" fill="var(--success)" font-size="12">GRUB</text>
        <circle cx="420" cy="33" r="8" fill="var(--success)"/><text x="420" y="60" text-anchor="middle" fill="var(--success)" font-size="12">Entry</text>
        <circle cx="580" cy="33" r="8" fill="var(--success)"/><text x="580" y="60" text-anchor="middle" fill="var(--success)" font-size="12">mm_init</text>
        <circle cx="740" cy="33" r="8" fill="var(--accent)"/><text x="740" y="60" text-anchor="middle" fill="var(--accent)" font-size="12">Console</text>
        <circle cx="740" cy="33" r="12" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.6">
          <animate attributeName="r" from="8" to="24" dur="1.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" from="0.6" to="0" dur="1.2s" repeatCount="indefinite"/>
        </circle>
        <!-- Final architecture view -->
        <rect x="30" y="90" width="200" height="80" rx="8" fill="rgba(210,153,34,.10)" stroke="var(--grad)" stroke-width="1.5"/>
        <text x="130" y="118" text-anchor="middle" fill="var(--grad)" font-size="14" font-weight="700">Clock (APIC Timer)</text>
        <text x="130" y="140" text-anchor="middle" fill="var(--fg-dim)" font-size="11">HZ = 100</text>
        <text x="130" y="158" text-anchor="middle" fill="var(--fg-dim)" font-size="11">10ms tick</text>
        <rect x="300" y="90" width="200" height="80" rx="8" fill="rgba(88,166,255,.10)" stroke="var(--accent)" stroke-width="1.5"/>
        <text x="400" y="118" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="700">Console (tty)</text>
        <text x="400" y="140" text-anchor="middle" fill="var(--fg-dim)" font-size="11">Serial / VGA</text>
        <text x="400" y="158" text-anchor="middle" fill="var(--fg-dim)" font-size="11">printk() works!</text>
        <rect x="570" y="90" width="200" height="80" rx="8" fill="rgba(63,185,80,.10)" stroke="var(--accent-2)" stroke-width="1.5"/>
        <text x="670" y="118" text-anchor="middle" fill="var(--accent-2)" font-size="14" font-weight="700">Init Process</text>
        <text x="670" y="140" text-anchor="middle" fill="var(--fg-dim)" font-size="11">PID = 1</text>
        <text x="670" y="158" text-anchor="middle" fill="var(--fg-dim)" font-size="11">user mode</text>
        <!-- Connections -->
        <line x1="230" y1="130" x2="300" y2="130" stroke="var(--line)" stroke-width="1.5"/>
        <line x1="500" y1="130" x2="570" y2="130" stroke="var(--line)" stroke-width="1.5"/>
        <!-- Kernel console output -->
        <rect x="100" y="210" width="600" height="180" rx="8" fill="var(--bg)"/>
        <text x="120" y="240" fill="var(--accent-2)" font-family="monospace" font-size="13">$ Kernel boot complete.</text>
        <text x="120" y="265" fill="var(--fg)" font-family="monospace" font-size="13">[OK] Memory: 4096MB available, buddy+slab online</text>
        <text x="120" y="290" fill="var(--fg)" font-family="monospace" font-size="13">[OK] Clock: APIC Timer at 100Hz</text>
        <text x="120" y="315" fill="var(--fg)" font-family="monospace" font-size="13">[OK] Console: ttyS0 (serial) initialized</text>
        <text x="120" y="340" fill="var(--accent-2)" font-family="monospace" font-size="13">[OK] Starting init process (PID 1)...</text>
        <text x="120" y="370" fill="var(--accent-2)" font-family="monospace" font-size="14" font-weight="700">$ _</text>
        <!-- Animated cursor -->
        <rect x="235" y="358" width="8" height="16" fill="var(--accent-2)" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.8s" repeatCount="indefinite"/>
        </rect>
        <!-- Checkmarks -->
        <circle cx="112" cy="253" r="6" fill="var(--success)"/><text x="112" y="257" text-anchor="middle" fill="#fff" font-size="9">&#10003;</text>
        <circle cx="112" cy="278" r="6" fill="var(--success)"/><text x="112" y="282" text-anchor="middle" fill="#fff" font-size="9">&#10003;</text>
        <circle cx="112" cy="303" r="6" fill="var(--success)"/><text x="112" y="307" text-anchor="middle" fill="#fff" font-size="9">&#10003;</text>
      `;
      svg.appendChild(g);
    }
  }
];

// --- Render engine ---
let step=0, autoTimer=null, autoOn=false;
const explain=document.getElementById('explain');
const stage=document.getElementById('stage');
const dots=document.getElementById('dots');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const autoBtn=document.getElementById('autoBtn');

function render(){
  const s=S[step];
  explain.innerHTML=`
    <div class="step-title">${s.t}</div>
    ${s.l?`<div class="code-line">${s.l}</div>`:''}
    <div class="badge-row">${s.b.map(b=>`<span class="badge ${b.c||'badge--def'}">${b.t}</span>`).join('')}</div>
    <div class="step-desc">${s.d}</div>`;
  // Render SVG
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 800 480');
  svg.style.width='100%';
  svg.style.height='100%';
  stage.innerHTML='';
  stage.appendChild(svg);
  s.r(svg);
  // Dots
  dots.innerHTML=S.map((_,i)=>{
    let cls=i===step?'active':i<step?'done':'';
    return `<span class="step-dot ${cls}"></span>`;
  }).join('');
  prevBtn.disabled=step===0;
  nextBtn.disabled=step===S.length-1;
}

function next(){if(step<S.length-1){step++;render();}}
function prev(){if(step>0){step--;render();}}
function restart(){step=0;render();}
function toggleAuto(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}
  else{autoOn=true;autoBtn.innerHTML='&#9646;&#9646; 停止';autoTimer=setInterval(()=>{if(step<S.length-1){step++;render();}else{clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}},3000);}
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='r'||e.key==='R'){e.preventDefault();restart();}
  else if(e.key==='a'||e.key==='A'){e.preventDefault();toggleAuto();}
});

prevBtn.onclick=prev; nextBtn.onclick=next; autoBtn.onclick=toggleAuto;
render();
</script>
</body>
</html>
