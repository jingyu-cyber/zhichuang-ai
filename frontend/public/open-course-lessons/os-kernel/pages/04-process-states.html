<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>进程状态机 — 操作系统内核构建</title>
<style>:root{--bg:#0d1117;--bg-soft:#161b22;--bg-code:#0a0c10;--fg:#e6edf3;--fg-dim:#8b949e;--line:#30363d;--accent:#58a6ff;--accent-2:#3fb950;--grad:#d29922;--success:#3fb950;--danger:#f85149}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(88,166,255,.18);color:var(--accent)}.badge--tip{background:rgba(63,185,80,.18);color:var(--success)}.badge--warn{background:rgba(210,153,34,.18);color:var(--grad)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.code-line{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--accent-2);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 10px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="demo-shell">
<div class="demo-header">
<h1>第 4 节 &middot; 进程状态机</h1>
<span class="breadcrumb"><a href="../index.html">课程首页</a> / 进程管理</span>
</div>
<div class="demo-main">
<div class="panel-explain" id="explain"></div>
<div class="panel-stage" id="stage"></div>
</div>
<div class="demo-controls">
<button id="prevBtn">&larr; 上一步</button>
<div class="step-dots" id="dots"></div>
<button id="nextBtn">下一步 &rarr;</button>
<button id="autoBtn">&#9654; 自动播放</button>
</div>
</div>
<script>
const S=[
  {
    t:"五种进程状态",
    l:"enum procstate { UNUSED, EMBRYO, SLEEPING, RUNNABLE, RUNNING, ZOMBIE };",
    d:"操作系统内核定义了 6 种进程状态：<br><b>UNUSED</b> — 空闲 PCB 槽位<br><b>EMBRYO</b> — 正在创建中<br><b>SLEEPING</b> — 阻塞等待事件<br><b>RUNNABLE</b> — 就绪等待 CPU<br><b>RUNNING</b> — 正在 CPU 上执行<br><b>ZOMBIE</b> — 已退出等待父进程回收",
    b:[{t:"SLEEPING",c:"badge--warn"},{t:"RUNNABLE",c:"badge--tip"},{t:"RUNNING",c:"badge--def"},{t:"ZOMBIE",c:"badge--warn"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      const states=[
        {x:350,y:50,w:120,h:50,label:"EMBRYO",color:"var(--grad)",bg:"rgba(210,153,34,.12)"},
        {x:500,y:160,w:120,h:50,label:"RUNNING",color:"var(--accent)",bg:"rgba(88,166,255,.15)"},
        {x:320,y:290,w:120,h:50,label:"RUNNABLE",color:"var(--accent-2)",bg:"rgba(63,185,80,.12)"},
        {x:100,y:160,w:120,h:50,label:"SLEEPING",color:"var(--grad)",bg:"rgba(210,153,34,.10)"},
        {x:580,y:290,w:120,h:50,label:"ZOMBIE",color:"var(--danger)",bg:"rgba(248,81,73,.12)"}
      ];
      states.forEach(s=>{
        g.innerHTML+=`<rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" rx="8" fill="${s.bg}" stroke="${s.color}" stroke-width="1.5"/>
        <text x="${s.x+s.w/2}" y="${s.y+30}" text-anchor="middle" fill="${s.color}" font-size="13" font-weight="600">${s.label}</text>`;
      });
      // UNUSED at top-left small
      g.innerHTML+=`<rect x="30" y="20" width="100" height="36" rx="6" fill="var(--bg)" stroke="var(--line)" stroke-width="1"/>
      <text x="80" y="43" text-anchor="middle" fill="var(--fg-dim)" font-size="11">UNUSED</text>`;
      // Arrows
      g.innerHTML+=`<line x1="80" y1="56" x2="350" y2="56" stroke="var(--line)" stroke-width="1.5" marker-end="url(#a)"/>
      <line x1="410" y1="100" x2="500" y2="160" stroke="var(--line)" stroke-width="1.5" marker-end="url(#a)"/>
      <line x1="560" y1="210" x2="440" y2="290" stroke="var(--line)" stroke-width="1.5" marker-end="url(#a)"/>
      <line x1="380" y1="290" x2="500" y2="210" stroke="var(--line)" stroke-width="1.5" marker-end="url(#a)"/>
      <line x1="220" y1="185" x2="320" y2="290" stroke="var(--line)" stroke-width="1.5" marker-end="url(#a)"/>
      <line x1="560" y1="340" x2="580" y2="290" stroke="var(--line)" stroke-width="1.5" marker-end="url(#a)"/>
      <line x1="620" y1="210" x2="580" y2="210" stroke="var(--line)" stroke-width="1.5" marker-end="url(#a)"/>
      <!-- Labels on arrows -->
      <text x="440" y="140" fill="var(--fg-dim)" font-size="10">scheduler</text>
      <text x="440" y="305" fill="var(--fg-dim)" font-size="10">yield/timer</text>
      <text x="270" y="240" fill="var(--fg-dim)" font-size="10">wakeup</text>
      <text x="370" y="240" fill="var(--fg-dim)" font-size="10">sleep</text>
      <text x="300" y="70" fill="var(--fg-dim)" font-size="10">alloc</text>
      <defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="var(--line)"/></marker></defs>`;
      // PCB detail
      g.innerHTML+=`<rect x="30" y="390" width="740" height="75" rx="8" fill="var(--bg)"/>
      <text x="50" y="415" fill="var(--accent)" font-family="monospace" font-size="12">struct proc {</text>
      <text x="70" y="435" fill="var(--fg-dim)" font-family="monospace" font-size="11">enum procstate state;  uint pid;  struct trapframe *tf;  void *kstack;</text>
      <text x="70" y="455" fill="var(--fg-dim)" font-family="monospace" font-size="11">pde_t *pgdir;           int killed;  struct file *ofile[];   char name[16];  }</text>`;
      svg.appendChild(g);
    }
  },
  {
    t:"状态转换：就绪 → 运行",
    l:"scheduler() picks RUNNABLE → state = RUNNING → swtch()",
    d:"调度器从就绪队列挑出一个 <code>RUNNABLE</code> 进程，<br>将其状态改为 <code>RUNNING</code>，通过 <code>swtch()</code> 切换到它的上下文。<br>同一时刻，每个 CPU 核上最多有一个 RUNNING 进程。",
    b:[{t:"调度",c:"badge--def"},{t:"swtch",c:"badge--warn"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      // Ready queue
      g.innerHTML+=`<rect x="30" y="30" width="340" height="80" rx="10" fill="rgba(63,185,80,.06)" stroke="var(--accent-2)" stroke-width="1.5"/>
      <text x="200" y="58" text-anchor="middle" fill="var(--accent-2)" font-size="14" font-weight="700">Ready Queue (RUNNABLE)</text>`;
      const procs=[{x:45,y:68,val:"P3"},{x:105,y:68,val:"P5"},{x:165,y:68,val:"P1"},{x:225,y:68,val:"P8"}];
      procs.forEach(p=>{g.innerHTML+=`<rect x="${p.x}" y="${p.y}" width="50" height="28" rx="5" fill="rgba(63,185,80,.15)" stroke="var(--accent-2)" stroke-width="1"/><text x="${p.x+25}" y="${p.y+19}" text-anchor="middle" fill="var(--accent-2)" font-size="12">${p.val}</text>`;});
      // Arrow
      g.innerHTML+=`<line x1="370" y1="70" x2="440" y2="70" stroke="var(--accent)" stroke-width="2.5" marker-end="url(#aB)"/>
      <text x="405" y="60" text-anchor="middle" fill="var(--accent)" font-size="10">scheduler()</text>`;
      // CPU
      g.innerHTML+=`<rect x="440" y="30" width="180" height="80" rx="10" fill="rgba(88,166,255,.10)" stroke="var(--accent)" stroke-width="2"/>
      <text x="530" y="60" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="700">CPU (RUNNING)</text>
      <rect x="470" y="68" width="120" height="30" rx="5" fill="rgba(88,166,255,.18)" stroke="var(--accent)" stroke-width="1"/>
      <text x="530" y="89" text-anchor="middle" fill="var(--accent)" font-size="13" font-weight="600">P1 Active</text>`;
      // PCB detail
      g.innerHTML+=`<rect x="30" y="145" width="740" height="300" rx="8" fill="var(--bg)" stroke="var(--line)"/>
      <text x="50" y="175" fill="var(--accent)" font-family="monospace" font-size="13">PCB for P1 (pid=1):</text>
      <rect x="50" y="190" width="200" height="30" rx="4" fill="var(--bg-soft)"/><text x="150" y="210" text-anchor="middle" fill="var(--fg)" font-family="monospace" font-size="12">state = RUNNING</text>
      <rect x="270" y="190" width="200" height="30" rx="4" fill="var(--bg-soft)"/><text x="370" y="210" text-anchor="middle" fill="var(--fg-dim)" font-family="monospace" font-size="12">pid = 1</text>
      <rect x="490" y="190" width="260" height="30" rx="4" fill="var(--bg-soft)"/><text x="620" y="210" text-anchor="middle" fill="var(--fg-dim)" font-family="monospace" font-size="12">sz = 4096 (pages)</text>
      <text x="50" y="250" fill="var(--fg)" font-family="monospace" font-size="12">Before swtch:  scheduler's context saved</text>
      <text x="50" y="275" fill="var(--fg)" font-family="monospace" font-size="12">After  swtch:  P1's context loaded into CPU</text>
      <!-- Code of swtch -->
      <text x="50" y="310" fill="var(--accent)" font-family="monospace" font-size="12">void swtch(struct context **old, struct context *new) {</text>
      <text x="70" y="335" fill="var(--fg-dim)" font-family="monospace" font-size="12">// Save old context: push callee-saved registers</text>
      <text x="70" y="358" fill="var(--fg-dim)" font-family="monospace" font-size="12">push %ebp; push %ebx; push %esi; push %edi;</text>
      <text x="70" y="381" fill="var(--fg-dim)" font-family="monospace" font-size="12">// Switch stack: old->esp = %esp; %esp = new->esp</text>
      <text x="70" y="404" fill="var(--fg-dim)" font-family="monospace" font-size="12">// Pop new context: pop %edi; ...; pop %ebp; ret</text>
      <text x="50" y="435" fill="var(--fg-dim)" font-family="monospace" font-size="12">}</text>`;
      svg.appendChild(g);
    }
  },
  {
    t:"状态转换：运行 → 阻塞 → 就绪",
    l:"sleep(chan) → SLEEPING; wakeup(chan) → RUNNABLE",
    d:"进程在 RUNNING 时可能因等待 I/O 或锁而调用 <code>sleep()</code>，<br>状态变为 <code>SLEEPING</code>，被移出就绪队列。<br>当等待的事件发生时，<code>wakeup()</code> 将其唤醒，状态变回 <code>RUNNABLE</code>。",
    b:[{t:"sleep",c:"badge--warn"},{t:"wakeup",c:"badge--tip"},{t:"等待队列",c:"badge--def"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      // Timeline
      g.innerHTML+=`<text x="400" y="30" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">Sleep / Wakeup 机制</text>
      <!-- RUNNING → SLEEPING -->
      <rect x="50" y="60" width="160" height="60" rx="10" fill="rgba(88,166,255,.15)" stroke="var(--accent)" stroke-width="2"/>
      <text x="130" y="88" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="600">RUNNING</text>
      <text x="130" y="108" text-anchor="middle" fill="var(--fg-dim)" font-size="11">P1 on CPU</text>
      <line x1="210" y1="90" x2="300" y2="90" stroke="var(--grad)" stroke-width="2" marker-end="url(#aG)"/>
      <text x="255" y="80" text-anchor="middle" fill="var(--grad)" font-size="10">sleep(&ticks)</text>
      <rect x="300" y="60" width="160" height="60" rx="10" fill="rgba(210,153,34,.10)" stroke="var(--grad)" stroke-width="2"/>
      <text x="380" y="88" text-anchor="middle" fill="var(--grad)" font-size="14" font-weight="600">SLEEPING</text>
      <text x="380" y="108" text-anchor="middle" fill="var(--fg-dim)" font-size="11">waiting... (off CPU)</text>
      <!-- SLEEPING → RUNNABLE -->
      <line x1="460" y1="90" x2="560" y2="90" stroke="var(--accent-2)" stroke-width="2" marker-end="url(#aG)"/>
      <text x="510" y="80" text-anchor="middle" fill="var(--accent-2)" font-size="10">wakeup(&ticks)</text>
      <rect x="560" y="60" width="160" height="60" rx="10" fill="rgba(63,185,80,.10)" stroke="var(--accent-2)" stroke-width="2"/>
      <text x="640" y="88" text-anchor="middle" fill="var(--accent-2)" font-size="14" font-weight="600">RUNNABLE</text>
      <text x="640" y="108" text-anchor="middle" fill="var(--fg-dim)" font-size="11">back in queue</text>
      <!-- Wait channel diagram -->
      <text x="400" y="170" text-anchor="middle" fill="var(--fg)" font-size="14" font-weight="700">Wait Channel (chan)</text>
      <rect x="200" y="185" width="400" height="140" rx="8" fill="var(--bg)" stroke="var(--line)"/>
      <rect x="220" y="198" width="200" height="28" rx="5" fill="rgba(210,153,34,.10)"/>
      <text x="320" y="218" text-anchor="middle" fill="var(--grad)" font-size="12" font-weight="600">chan = &ticks</text>
      <text x="430" y="218" text-anchor="middle" fill="var(--fg-dim)" font-size="11">wait channel pointer</text>
      <text x="220" y="255" fill="var(--fg-dim)" font-family="monospace" font-size="12">P1: sleep(&ticks, &lk) → blocked on ticks</text>
      <text x="220" y="278" fill="var(--fg-dim)" font-family="monospace" font-size="12">P3: sleep(&ticks, &lk) → blocked on ticks</text>
      <text x="220" y="305" fill="var(--accent-2)" font-family="monospace" font-size="12">wakeup(&ticks) → wakes ALL waiters on &ticks</text>
      <!-- Code example bottom -->
      <rect x="30" y="350" width="740" height="115" rx="8" fill="var(--bg)"/>
      <text x="50" y="375" fill="var(--accent)" font-family="monospace" font-size="12">void sleep(void *chan, struct spinlock *lk) {</text>
      <text x="70" y="398" fill="var(--fg-dim)" font-family="monospace" font-size="11">p->state = SLEEPING;  p->chan = chan;  // 记录等待原因</text>
      <text x="70" y="420" fill="var(--fg-dim)" font-family="monospace" font-size="11">sched();  // 主动让出 CPU，切换到调度器</text>
      <text x="50" y="442" fill="var(--fg-dim)" font-family="monospace" font-size="12">}</text>
      <text x="50" y="458" fill="var(--fg-dim)" font-family="monospace" font-size="11">// wakeup() iterates ptable, any p SLEEPING on chan → RUNNABLE</text>`;
      svg.appendChild(g);
    }
  },
  {
    t:"进程退出：RUNNING → ZOMBIE",
    l:"exit() → ZOMBIE; wait() → parent reaps → UNUSED",
    d:"进程调用 <code>exit()</code> 退出，状态变为 <code>ZOMBIE</code>。<br>此时资源已释放但 PCB 保留以供父进程查询退出码。<br>父进程调用 <code>wait()</code> 回收僵尸子进程，PCB 回到 <code>UNUSED</code>。",
    b:[{t:"exit",c:"badge--warn"},{t:"wait",c:"badge--tip"},{t:"回收",c:"badge--def"}],
    r(svg){
      svg.innerHTML='';svg.setAttribute('viewBox','0 0 800 480');
      const g=document.createElementNS('http://www.w3.org/2000/svg','g');
      // State transitions for exit
      g.innerHTML+=`<text x="400" y="30" text-anchor="middle" fill="var(--fg)" font-size="15" font-weight="700">进程退出与回收</text>
      <rect x="50" y="55" width="150" height="60" rx="10" fill="rgba(88,166,255,.15)" stroke="var(--accent)" stroke-width="2"/>
      <text x="125" y="80" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="600">RUNNING</text>
      <text x="125" y="100" text-anchor="middle" fill="var(--fg-dim)" font-size="11">P2 (child)</text>
      <line x1="200" y1="85" x2="280" y2="85" stroke="var(--danger)" stroke-width="2" marker-end="url(#aR)"/>
      <text x="240" y="75" text-anchor="middle" fill="var(--danger)" font-size="10">exit(0)</text>
      <rect x="280" y="55" width="150" height="60" rx="10" fill="rgba(248,81,73,.12)" stroke="var(--danger)" stroke-width="2"/>
      <text x="355" y="80" text-anchor="middle" fill="var(--danger)" font-size="14" font-weight="600">ZOMBIE</text>
      <text x="355" y="100" text-anchor="middle" fill="var(--fg-dim)" font-size="11">PCB kept for parent</text>
      <line x1="430" y1="85" x2="510" y2="85" stroke="var(--accent-2)" stroke-width="2" marker-end="url(#aG)"/>
      <text x="470" y="75" text-anchor="middle" fill="var(--accent-2)" font-size="10">parent wait()</text>
      <rect x="510" y="55" width="120" height="60" rx="10" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
      <text x="570" y="80" text-anchor="middle" fill="var(--fg-dim)" font-size="14" font-weight="600">UNUSED</text>
      <text x="570" y="100" text-anchor="middle" fill="var(--fg-dim)" font-size="11">PCB freed</text>
      <!-- Zombie table -->
      <text x="400" y="160" text-anchor="middle" fill="var(--fg)" font-size="14" font-weight="700">进程表 (ptable)</text>
      <rect x="30" y="180" width="740" height="120" rx="8" fill="var(--bg)" stroke="var(--line)"/>
      <rect x="50" y="195" width="200" height="30" rx="4" fill="var(--bg-soft)"/><text x="150" y="215" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">PID 1 (init) : RUNNING</text>
      <rect x="270" y="195" width="200" height="30" rx="4" fill="var(--bg-soft)"/><text x="370" y="215" text-anchor="middle" fill="var(--accent-2)" font-family="monospace" font-size="12">PID 2 (child) : RUNNING</text>
      <rect x="490" y="195" width="260" height="30" rx="4" fill="rgba(248,81,73,.12)"/><text x="620" y="215" text-anchor="middle" fill="var(--danger)" font-family="monospace" font-size="12">PID 3 (orphan) : ZOMBIE ←</text>
      <text x="50" y="255" fill="var(--fg-dim)" font-family="monospace" font-size="12">// exit() marks children's parent as init (reparent to PID 1)</text>
      <text x="50" y="278" fill="var(--fg-dim)" font-family="monospace" font-size="12">// init loops: wait() → reaps zombies → PCB back to UNUSED</text>
      <!-- Orphan handling -->
      <text x="400" y="340" text-anchor="middle" fill="var(--accent)" font-size="14" font-weight="700">孤儿进程处理</text>
      <rect x="80" y="360" width="640" height="100" rx="8" fill="rgba(88,166,255,.06)" stroke="var(--accent)" stroke-width="1" stroke-dasharray="4,2"/>
      <text x="100" y="388" fill="var(--fg)" font-size="13">如果父进程先于子进程退出，子进程变为"孤儿"：</text>
      <text x="100" y="415" fill="var(--fg-dim)" font-size="12">1. exit() 将孤儿进程的 parent 指向 init 进程 (PID 1)</text>
      <text x="100" y="440" fill="var(--fg-dim)" font-size="12">2. init 在循环中不断调用 wait()，自动回收所有僵尸进程</text>`;
      svg.appendChild(g);
    }
  }
];

let step=0,autoTimer=null,autoOn=false;
const explain=document.getElementById('explain'),stage=document.getElementById('stage'),dots=document.getElementById('dots');
const prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),autoBtn=document.getElementById('autoBtn');
function render(){
  const s=S[step];
  explain.innerHTML=`<div class="step-title">${s.t}</div>${s.l?`<div class="code-line">${s.l}</div>`:''}<div class="badge-row">${s.b.map(b=>`<span class="badge ${b.c||'badge--def'}">${b.t}</span>`).join('')}</div><div class="step-desc">${s.d}</div>`;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 800 480');svg.style.width='100%';svg.style.height='100%';
  stage.innerHTML='';stage.appendChild(svg);s.r(svg);
  dots.innerHTML=S.map((_,i)=>{let cls=i===step?'active':i<step?'done':'';return `<span class="step-dot ${cls}"></span>`;}).join('');
  prevBtn.disabled=step===0;nextBtn.disabled=step===S.length-1;
}
function next(){if(step<S.length-1){step++;render();}}
function prev(){if(step>0){step--;render();}}
function restart(){step=0;render();}
function toggleAuto(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}
  else{autoOn=true;autoBtn.innerHTML='&#9646;&#9646; 停止';autoTimer=setInterval(()=>{if(step<S.length-1){step++;render();}else{clearInterval(autoTimer);autoTimer=null;autoOn=false;autoBtn.innerHTML='&#9654; 自动播放';}},3000);}
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='r'||e.key==='R'){e.preventDefault();restart();}
  else if(e.key==='a'||e.key==='A'){e.preventDefault();toggleAuto();}
});
prevBtn.onclick=prev;nextBtn.onclick=next;autoBtn.onclick=toggleAuto;render();
</script>
</body>
</html>
