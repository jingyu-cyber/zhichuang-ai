<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据并行 — AI基础设施</title>
<style>
:root{--bg:#0a0e14;--bg-soft:#141b22;--bg-code:#06080c;--fg:#d0e0e8;--fg-dim:#607888;--line:#1c2836;--accent:#00e5a0;--accent-2:#b050ff;--grad:#40a0ff;--success:#30d060;--danger:#ff8020}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(176,80,255,.18);color:var(--accent-2)}.badge--tip{background:rgba(0,229,160,.15);color:var(--accent)}.badge--warn{background:rgba(255,128,32,.18);color:var(--danger)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.code-line{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--accent);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 12px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-header">
    <div>
      <div class="breadcrumb"><a href="../index.html">AI基础设施</a> / 第3章 /</div>
      <h1>3.1 数据并行</h1>
    </div>
    <div class="badge-row">
      <span class="badge badge--def">分布式通信</span>
      <span class="badge badge--tip">Data Parallel</span>
    </div>
  </div>
  <div class="demo-main">
    <div class="panel-explain" id="explain"></div>
    <div class="panel-stage" id="stage"></div>
  </div>
  <div class="demo-controls">
    <button id="btn-prev">&larr; 上一步</button>
    <div class="step-dots" id="dots"></div>
    <button id="btn-next">下一步 &rarr;</button>
  </div>
</div>
<script>
const S=[{
  t:"数据并行：核心思想",
  l:"Batch split → N GPUs → same model, different data",
  d:"数据并行(Data Parallelism, DP)是最基础的分布式训练策略：每个 GPU 持有模型的完整副本，但处理不同的 mini-batch 数据。前向传播后计算各自的损失和局部梯度，然后通过 AllReduce 同步梯度，最后每个 GPU 用平均梯度更新参数。",
  b:["Data Parallel","Mini-batch","AllReduce"],
  r:function(svg){
    function E(t,a,tx){let e=document.createElementNS("http://www.w3.org/2000/svg",t);for(let k in a)e.setAttribute(k,a[k]);if(tx)e.textContent=tx;return e;}
    svg.setAttribute("viewBox","0 0 800 420");svg.style.background="#06080c";
    let defs=E("defs");let ar=E("marker",{id:"ar",viewBox:"0 0 10 10",refX:"9",refY:"5",markerWidth:"5",markerHeight:"5",orient:"auto"});ar.append(E("path",{d:"M0,0 L10,5 L0,10 Z",fill:"#40a0ff"}));defs.append(ar);svg.append(defs);

    // Big batch at top
    svg.append(E("rect",{x:260,y:15,width:280,height:40,rx:6,fill:"rgba(64,160,255,0.1)",stroke:"#40a0ff","stroke-width":"1.5"}));
    svg.append(E("text",{x:400,y:40,fill:"#40a0ff","font-size":"13","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Full Mini-batch: B×D"));

    // Split visualization
    let gpus=[{x:40,l:"GPU 0",c:"#00e5a0"},{x:235,l:"GPU 1",c:"#b050ff"},{x:425,l:"GPU 2",c:"#40a0ff"},{x:615,l:"GPU 3",c:"#ff8020"}];
    gpus.forEach((g,i)=>{
      svg.append(E("line",{x1:260+i*80+20,y1:55,x2:g.x+90,y2:80,stroke:"#607888","stroke-width":"1","stroke-dasharray":"4,2"}));
      svg.append(E("rect",{x:g.x,y:85,width:170,height:100,rx:8,fill:"rgba(0,229,160,0.04)",stroke:g.c,"stroke-width":"2"}));
      svg.append(E("text",{x:g.x+85,y:108,fill:g.c,"font-size":"13","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},g.l));
      // Model icon inside
      svg.append(E("rect",{x:g.x+40,y:120,width:90,height:50,rx:5,fill:"rgba(255,255,255,0.03)",stroke:g.c,"stroke-width":"1"}));
      svg.append(E("text",{x:g.x+85,y:142,fill:g.c,"font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Model W"+(i+1)));
      svg.append(E("text",{x:g.x+85,y:158,fill:"#607888","font-size":"9","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"B/4 × D"));
    });

    // Labels
    svg.append(E("text",{x:400,y:65,fill:"#607888","font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Shard (scatter)"));
  }
},{
  t:"前向+反向：独立计算",
  l:"Each GPU: Forward → Loss → Backward → Local ∇Wᵢ",
  d:"每个 GPU 独立执行完整的前向传播、损失计算和反向传播，得到局部梯度 ∇Wᵢ。由于每个 GPU 的数据子集不同，局部梯度也不同。注意：wights 相同但 data 不同 → 计算完全独立，无通信。",
  b:["Forward","Backward","Local Gradient"],
  r:function(svg){
    function E(t,a,tx){let e=document.createElementNS("http://www.w3.org/2000/svg",t);for(let k in a)e.setAttribute(k,a[k]);if(tx)e.textContent=tx;return e;}
    svg.setAttribute("viewBox","0 0 800 420");svg.style.background="#06080c";

    let gpus=[{x:20,l:"GPU 0",c:"#00e5a0"},{x:212,l:"GPU 1",c:"#b050ff"},{x:404,l:"GPU 2",c:"#40a0ff"},{x:596,l:"GPU 3",c:"#ff8020"}];

    gpus.forEach((g,i)=>{
      svg.append(E("rect",{x:g.x,y:20,width:170,height:300,rx:8,fill:"rgba(0,229,160,0.03)",stroke:g.c,"stroke-width":"1.5"}));
      svg.append(E("text",{x:g.x+85,y:42,fill:g.c,"font-size":"12","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},g.l));

      // Forward
      svg.append(E("rect",{x:g.x+15,y:55,width:140,height:36,rx:5,fill:"rgba(0,229,160,0.08)",stroke:"#00e5a0","stroke-width":"1"}));
      svg.append(E("text",{x:g.x+85,y:77,fill:"#00e5a0","font-size":"11","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Forward(xᵢ)");
      // Loss
      svg.append(E("rect",{x:g.x+15,y:100,width:140,height:30,rx:5,fill:"rgba(64,160,255,0.08)",stroke:"#40a0ff","stroke-width":"1"}));
      svg.append(E("text",{x:g.x+85,y:119,fill:"#40a0ff","font-size":"11","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Loss Lᵢ(y_pred,y)");
      // Backward
      svg.append(E("rect",{x:g.x+15,y:140,width:140,height:36,rx:5,fill:"rgba(176,80,255,0.08)",stroke:"#b050ff","stroke-width":"1"}));
      svg.append(E("text",{x:g.x+85,y:162,fill:"#b050ff","font-size":"11","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Backward → ∇Wᵢ");

      // Arrows
      svg.append(E("line",{x1:g.x+85,y1:91,x2:g.x+85,y2:100,stroke:"#607888","stroke-width":"1"}));
      svg.append(E("line",{x1:g.x+85,y1:130,x2:g.x+85,y2:140,stroke:"#607888","stroke-width":"1"}));

      // Local weights
      svg.append(E("rect",{x:g.x+15,y:195,width:140,height:36,rx:5,fill:"rgba(255,128,32,0.08)",stroke:"#ff8020","stroke-width":"1"}));
      svg.append(E("text",{x:g.x+85,y:218,fill:"#ff8020","font-size":"11","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"∇Wᵢ (local)"));
      svg.append(E("line",{x1:g.x+85,y1:176,x2:g.x+85,y2:195,stroke:"#607888","stroke-width":"1"}));

      // No communication icon
      if(i<3){
        svg.append(E("line",{x1:g.x+190,y1:60,x2:g.x+190,y2:250,stroke:"#1c2836","stroke-width":"1","stroke-dasharray":"4,4"}));
        svg.append(E("text",{x:g.x+190,y:40,fill:"#607888","font-size":"1","text-anchor":"middle"},""));
      }
    });

    // No communication label
    svg.append(E("text",{x:400,y:275,fill:"#30d060","font-size":"12","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"No inter-GPU communication during forward/backward"));

    // Independent label
    svg.append(E("rect",{x:250,y:310,width:300,height:36,rx:8,fill:"rgba(255,128,32,0.08)",stroke:"#ff8020","stroke-width":"1"}));
    svg.append(E("text",{x:400,y:333,fill:"#ff8020","font-size":"12","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"each ∇Wᵢ computed from different data"));

    // Gradient accumulation hint
    svg.append(E("text",{x:400,y:375,fill:"#607888","font-size":"11","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Next step: aggregate ∇Wᵢ via AllReduce → global gradient"));
  }
},{
  t:"梯度同步：AllReduce 均值",
  l:"AllReduce(∇W₀,∇W₁,∇W₂,∇W₃) mean → 统一更新",
  d:"所有 GPU 的局部梯度通过 AllReduce 操作聚合为全局梯度(通常取均值)。每个 GPU 收到相同的全局梯度后，各自执行 SGD/Adam 等优化器步骤更新模型参数。同步后所有 GPU 的模型权重再次完全相同。",
  b:["AllReduce","Aggregate","Sync"],
  r:function(svg){
    function E(t,a,tx){let e=document.createElementNS("http://www.w3.org/2000/svg",t);for(let k in a)e.setAttribute(k,a[k]);if(tx)e.textContent=tx;return e;}
    svg.setAttribute("viewBox","0 0 800 420");svg.style.background="#06080c";
    let defs=E("defs");let ar=E("marker",{id:"ar",viewBox:"0 0 10 10",refX:"9",refY:"5",markerWidth:"5",markerHeight:"5",orient:"auto"});ar.append(E("path",{d:"M0,0 L10,5 L0,10 Z",fill:"#40a0ff"}));defs.append(ar);svg.append(defs);

    // Central AllReduce box
    svg.append(E("rect",{x:250,y:20,width:300,height:50,rx:12,fill:"rgba(176,80,255,0.12)",stroke:"#b050ff","stroke-width":"2.5"}));
    svg.append(E("text",{x:400,y:42,fill:"#b050ff","font-size":"16","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"AllReduce (SUM → ÷N)"));
    svg.append(E("text",{x:400,y:60,fill:"#d0e0e8","font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"aggregate 4 local gradients → 1 global gradient"));

    // 4 GPUs sending gradients in and receiving back
    let gpus=[{x:30,y:85,c:"#00e5a0",l:"GPU 0"},{x:30,y:175,c:"#b050ff",l:"GPU 1"},{x:605,y:85,c:"#40a0ff",l:"GPU 2"},{x:605,y:175,c:"#ff8020",l:"GPU 3"}];

    gpus.forEach(g=>{
      svg.append(E("rect",{x:g.x,y:g.y,width:140,height:40,rx:6,fill:"rgba(0,229,160,0.04)",stroke:g.c,"stroke-width":"1.5"}));
      svg.append(E("text",{x:g.x+70,y:g.y+25,fill:g.c,"font-size":"12","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},g.l+" ∇W"));
    });

    // Gradient values inside GPUs
    let vals=["+0.32", "+0.28", "+0.35", "+0.29"];
    gpus.forEach((g,i)=>{
      svg.append(E("text",{x:g.x+70,y:g.y+15,fill:"#607888","font-size":"9","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"value: "+vals[i]);
    });

    // Aggregation lines pointing to center
    gpus.forEach((g,i)=>{
      let cx=g.x+140,cy=g.y+20;
      svg.append(E("line",{x1:cx,y1:cy,x2:i<2?290:450,y2:45,stroke:g.c,"stroke-width":"1.5","stroke-dasharray":"4,2","marker-end":"url(#ar)"}));
    });

    // Global gradient
    svg.append(E("rect",{x:250,y:100,width:300,height:36,rx:8,fill:"rgba(0,229,160,0.1)",stroke:"#00e5a0","stroke-width":"2"}));
    svg.append(E("text",{x:400,y:123,fill:"#00e5a0","font-size":"13","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"∇W_mean = 0.31 (global gradient)"));

    // Back to GPUs
    gpus.forEach(g=>{
      svg.append(E("line",{x1:g.x+140,y1:g.y+20,x2:250,y2:118,stroke:"#00e5a0","stroke-width":"1","stroke-dasharray":"2,2"}));
    });

    // SGD update
    svg.append(E("text",{x:400,y:180,fill:"#b050ff","font-size":"14","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"W = W - lr × ∇W_mean  (SGD step)"));

    // Timeline at bottom
    svg.append(E("text",{x:400,y:215,fill:"#d0e0e8","font-size":"12","font-weight":"700","text-anchor":"middle"},"One Training Step Timeline"));
    let phases=["Forward","Backward","AllReduce","SGD Step"];
    let pc=["#00e5a0","#b050ff","#40a0ff","#ff8020"];
    phases.forEach((p,i)=>{
      svg.append(E("rect",{x:60+i*175,y:230,width:155,height:36,rx:6,fill:"rgba(255,255,255,0.03)",stroke:pc[i],"stroke-width":"1.5"}));
      svg.append(E("text",{x:60+i*175+77,y:253,fill:pc[i],"font-size":"11","font-weight":"700","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},p));
      if(i<3){svg.append(E("text",{x:60+i*175+155,y:248,fill:"#d0e0e8","font-size":"18","text-anchor":"middle"},"→"));}
    });

    // Scale
    svg.append(E("text",{x:400,y:290,fill:"#607888","font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Total time ≈ T_compute + T_comm(AllReduce). Weak scaling: add GPUs → T_comm grows"));
  }
}];

let step=0;
function render(i){
  step=((i%S.length)+S.length)%S.length;
  let s=S[step];
  document.getElementById("explain").innerHTML=`
    <div class="step-title">${s.t}</div>
    <div class="badge-row">${s.b.map(b=>'<span class="badge badge--tip">'+b+'</span>').join("")}</div>
    <div class="code-line">${s.l}</div>
    <div class="step-desc">${s.d}</div>`;
  let svg=document.getElementById("stage").querySelector("svg");
  if(!svg){svg=document.createElementNS("http://www.w3.org/2000/svg","svg");document.getElementById("stage").appendChild(svg);svg.setAttribute("width","100%");svg.setAttribute("height","100%");svg.style.minHeight="420px";}
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  s.r(svg);
  document.getElementById("dots").innerHTML=S.map((_,j)=>'<div class="step-dot'+(j===step?' active':j<step?' done':'')+'></div>').join("");
  document.getElementById("btn-prev").disabled=step===0;
  document.getElementById("btn-next").disabled=step===S.length-1;
}
render(0);
document.getElementById("btn-prev").onclick=()=>render(step-1);
document.getElementById("btn-next").onclick=()=>render(step+1);
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")render(step-1);if(e.key==="ArrowRight")render(step+1);});
</script>
</body>
</html>
