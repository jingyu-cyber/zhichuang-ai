<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>性能指标 — AI基础设施</title>
<style>
:root{--bg:#0a0e14;--bg-soft:#141b22;--bg-code:#06080c;--fg:#d0e0e8;--fg-dim:#607888;--line:#1c2836;--accent:#00e5a0;--accent-2:#b050ff;--grad:#40a0ff;--success:#30d060;--danger:#ff8020}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;line-height:1.6}.demo-shell{max-width:1280px;margin:0 auto;padding:20px 20px 40px}.demo-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}.demo-header h1{font-size:20px}.demo-header .breadcrumb{color:var(--fg-dim);font-size:13px}.demo-header a{color:var(--accent);text-decoration:none}.demo-main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:520px}.panel-explain{background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:14px}.panel-explain .step-title{font-size:18px;font-weight:700;color:var(--accent)}.panel-explain .step-desc{font-size:14px;color:var(--fg-dim);line-height:1.75}.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}.badge--def{background:rgba(176,80,255,.18);color:var(--accent-2)}.badge--tip{background:rgba(0,229,160,.15);color:var(--accent)}.badge--warn{background:rgba(255,128,32,.18);color:var(--danger)}.badge-row{display:flex;gap:8px;flex-wrap:wrap}.code-line{font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--accent);text-align:center;padding:10px;background:var(--bg-code);border-radius:8px}.panel-stage{background:var(--bg-code);border:1px solid var(--line);border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center}.panel-stage svg{max-width:100%;max-height:100%}.demo-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;padding:12px 0}.demo-controls button{background:var(--bg-soft);border:1px solid var(--line);color:var(--fg);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:14px}.demo-controls button:hover{border-color:var(--accent);color:var(--accent)}.demo-controls button:disabled{opacity:.35;cursor:default}.step-dots{display:flex;gap:8px}.step-dot{width:10px;height:10px;border-radius:50%;background:var(--line);transition:.2s}.step-dot.active{background:var(--accent);box-shadow:0 0 12px var(--accent)}.step-dot.done{background:var(--success)}@media(max-width:860px){.demo-main{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="demo-shell">
  <div class="demo-header">
    <div>
      <div class="breadcrumb"><a href="../index.html">AI基础设施</a> / 第4章 /</div>
      <h1>4.1 性能指标体系</h1>
    </div>
    <div class="badge-row">
      <span class="badge badge--def">性能分析</span>
      <span class="badge badge--tip">Metrics</span>
    </div>
  </div>
  <div class="demo-main">
    <div class="panel-explain" id="explain"></div>
    <div class="panel-stage" id="stage"></div>
  </div>
  <div class="demo-controls">
    <button id="btn-prev">&larr; 上一步</button>
    <div class="step-dots" id="dots"></div>
    <button id="btn-next">下一步 &rarr;</button>
  </div>
</div>
<script>
const S=[{
  t:"四大核心指标概览",
  l:"Throughput | Latency | Memory | GPU Utilization",
  d:"AI 系统性能分析围绕四个核心指标：吞吐量(Throughput: samples/sec, TFLOPS)、延迟(Latency: step time, kernel time)、显存(Memory: total, peak, fragmentation)和 GPU 利用率(Utilization: SM, memory bandwidth)。四者相互关联，需要同步分析才能定位瓶颈。",
  b:["Throughput","Latency","Memory","Utilization"],
  r:function(svg){
    function E(t,a,tx){let e=document.createElementNS("http://www.w3.org/2000/svg",t);for(let k in a)e.setAttribute(k,a[k]);if(tx)e.textContent=tx;return e;}
    svg.setAttribute("viewBox","0 0 800 420");svg.style.background="#06080c";

    // 4 metric quadrants
    let quads=[
      {x:20,y:20,w:370,h:180,t:"Throughput",c:"#00e5a0",v:"1850",u:"samples/sec",desc:"Processing rate",d2:"Target: >2000"},
      {x:410,y:20,w:370,h:180,t:"Latency",c:"#40a0ff",v:"12.4",u:"ms/step",desc:"Step time",d2:"Kernel: 8.2ms"},
      {x:20,y:220,w:370,h:180,t:"Memory",c:"#b050ff",v:"64.2",u:"GB / 80GB",desc:"Peak alloc",d2:"Frag: 3.2GB"},
      {x:410,y:220,w:370,h:180,t:"GPU Util",c:"#ff8020",v:"78",u:"%",desc:"SM occupancy",d2:"Mem BW: 62%"}
    ];

    quads.forEach(q=>{
      svg.append(E("rect",{x:q.x,y:q.y,width:q.w,height:q.h,rx:10,fill:"rgba(0,229,160,0.03)",stroke:q.c,"stroke-width":"2"}));
      svg.append(E("text",{x:q.x+20,y:q.y+30,fill:q.c,"font-size":"14","font-weight":"700","font-family":"JetBrains Mono,monospace"},q.t));
      svg.append(E("text",{x:q.x+20,y:q.y+70,fill:q.c,"font-size":"36","font-weight":"700","font-family":"JetBrains Mono,monospace"},q.v));
      svg.append(E("text",{x:q.x+20,y:q.y+95,fill:"#607888","font-size":"13","font-family":"JetBrains Mono,monospace"},q.u));
      svg.append(E("text",{x:q.x+20,y:q.y+125,fill:"#d0e0e8","font-size":"11","font-family":"JetBrains Mono,monospace"},q.desc));
      svg.append(E("text",{x:q.x+20,y:q.y+150,fill:"#607888","font-size":"10","font-family":"JetBrains Mono,monospace"},q.d2));
      // Mini sparkline
      let spY=q.y+50;
      let pts=[];
      for(let j=0;j<20;j++)pts.push(q.x+200+j*8);
      // Just decorative lines
      svg.append(E("line",{x1:q.x+200,y1:spY+20,x2:q.x+360,y2:spY+20,stroke:"#1c2836","stroke-width":"1"}));
    });
  }
},{
  t:"吞吐量分析",
  l:"TFLOPS = Operations / Time → compare with peak",
  d:"理论峰值 TFLOPS(如 A100 FP16=312 TFLOPS)与实际吞吐对比揭示计算效率。效率 = 实际 TFLOPS / 峰值 TFLOPS。低效率通常意味着：内存受限(memory-bound)而非计算受限(compute-bound)，即 GPU 在等数据而非在计算。",
  b:["TFLOPS","Compute-bound","Memory-bound"],
  r:function(svg){
    function E(t,a,tx){let e=document.createElementNS("http://www.w3.org/2000/svg",t);for(let k in a)e.setAttribute(k,a[k]);if(tx)e.textContent=tx;return e;}
    svg.setAttribute("viewBox","0 0 800 420");svg.style.background="#06080c";

    // Throughput line chart
    svg.append(E("text",{x:400,y:20,fill:"#d0e0e8","font-size":"14","font-weight":"700","text-anchor":"middle"},"Throughput Over Training Steps (TFLOPS)"));

    // Grid and axes
    for(let i=0;i<=5;i++){
      let y=50+i*45;
      svg.append(E("line",{x1:80,y1:y,x2:720,y2:y,stroke:"#1c2836","stroke-width":"1"}));
      svg.append(E("text",{x:70,y:y+4,fill:"#607888","font-size":"10","text-anchor":"end","font-family":"JetBrains Mono,monospace"},280-i*20));
    }

    // Line chart data
    let data=[120,135,148,160,155,170,178,185,172,190,195,188,200,210,205,215,222,220,230,225];
    let px=100,pw=620;
    svg.append(E("line",{x1:px,y1:50,x2:px,y2:275,stroke:"#1c2836","stroke-width":"1"}));
    svg.append(E("line",{x1:px,y1:275,x2:px+pw,y2:275,stroke:"#1c2836","stroke-width":"1"}));

    let path="M"+px+","+(275-(data[0]-120)/200*225);
    for(let i=1;i<data.length;i++){
      let x=px+i*(pw/(data.length-1));
      let y=275-(data[i]-120)/200*225;
      path+=" L"+x+","+y;
    }
    svg.append(E("path",{d:path,stroke:"#00e5a0",fill:"none","stroke-width":"2.5"}));

    // Peak line
    svg.append(E("line",{x1:px,y1:275-(312-120)/200*225,x2:px+pw,y2:275-(312-120)/200*225,stroke:"#ff8020","stroke-width":"1.5","stroke-dasharray":"8,4"}));
    svg.append(E("text",{x:720,y:275-(312-120)/200*225+4,fill:"#ff8020","font-size":"10","font-family":"JetBrains Mono,monospace"},"Peak 312 TFLOPS");

    // X axis labels
    for(let i=0;i<=5;i++){
      svg.append(E("text",{x:px+i*(pw/5),y:295,fill:"#607888","font-size":"9","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Step "+i*2000);
    }
    svg.append(E("text",{x:px+pw/2,y:318,fill:"#00e5a0","font-size":"11","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Efficiency: 225/312 = 72% (memory-bound)"));
  }
},{
  t:"GPU 利用率深度分析",
  l:"SM Util vs Memory BW Util — the key distinction",
  d:"GPU 利用率需要拆分为两个维度看：SM 利用率(计算核心是否繁忙)与显存带宽利用率(数据供给是否充足)。高 SM 利用率但低带宽利用率表示 compute-bound；反之则是 memory-bound。优化策略取决于瓶颈类型。",
  b:["SM Utilization","Memory BW","Roofline"],
  r:function(svg){
    function E(t,a,tx){let e=document.createElementNS("http://www.w3.org/2000/svg",t);for(let k in a)e.setAttribute(k,a[k]);if(tx)e.textContent=tx;return e;}
    svg.setAttribute("viewBox","0 0 800 420");svg.style.background="#06080c";

    // Roofline model
    svg.append(E("text",{x:400,y:20,fill:"#d0e0e8","font-size":"14","font-weight":"700","text-anchor":"middle"},"Roofline Model: Operational Intensity vs Performance"));

    // Axes
    svg.append(E("line",{x1:100,y1:280,x2:700,y2:280,stroke:"#1c2836","stroke-width":"1"}));
    svg.append(E("line",{x1:100,y1:280,x2:100,y2:30,stroke:"#1c2836","stroke-width":"1"}));
    svg.append(E("text",{x:400,y:305,fill:"#607888","font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Operational Intensity (FLOPs/Byte) →"));
    svg.append(E("text",{x:30,y:155,fill:"#607888","font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace","transform":"rotate(-90,30,155)"},"TFLOPS →"));

    // Ridge line (peak compute)
    svg.append(E("line",{x1:250,y1:80,x2:700,y2:80,stroke:"#ff8020","stroke-width":"2","stroke-dasharray":"6,3"}));
    svg.append(E("text",{x:660,y:70,fill:"#ff8020","font-size":"10","font-family":"JetBrains Mono,monospace"},"Peak Compute 312 TFLOPS"));

    // Memory bandwidth ceiling
    svg.append(E("line",{x1:100,y1:270,x2:700,y2:120,stroke:"#40a0ff","stroke-width":"2"}));
    svg.append(E("text",{x:380,y:130,fill:"#40a0ff","font-size":"10","font-family":"JetBrains Mono,monospace"},"Memory BW Ceiling 2 TB/s"));

    // Points on roofline
    let ops=[{x:150,y:220,l:"LayerNorm",c:"#b050ff"},{x:220,y:210,l:"ReLU",c:"#b050ff"},{x:350,y:195,l:"MatMul\n1024×1024",c:"#00e5a0"},{x:550,y:100,l:"MatMul\n8192×8192",c:"#00e5a0"},{x:450,y:170,l:"Conv 3×3",c:"#40a0ff"}];
    ops.forEach(o=>{
      svg.append(E("circle",{cx:o.x,cy:o.y,r:6,fill:o.c,stroke:o.c,"stroke-width":"2"}));
      if(o.l.includes("\n")){
        let ps=o.l.split("\n");
        svg.append(E("text",{x:o.x,y:o.y-12,fill:o.c,"font-size":"9","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},ps[0]));
        svg.append(E("text",{x:o.x,y:o.y+18,fill:"#607888","font-size":"8","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},ps[1]));
      }else{
        svg.append(E("text",{x:o.x,y:o.y-10,fill:o.c,"font-size":"9","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},o.l));
      }
    });

    // Labels
    svg.append(E("text",{x:220,y:350,fill:"#607888","font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Memory-bound region"));
    svg.append(E("text",{x:500,y:350,fill:"#607888","font-size":"10","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Compute-bound region"));
    svg.append(E("line",{x1:330,y1:280,x2:330,y2:370,stroke:"#607888","stroke-width":"1","stroke-dasharray":"4,4"}));

    // Summary box
    svg.append(E("rect",{x:200,y:380,width:400,height:30,rx:6,fill:"rgba(0,229,160,0.05)",stroke:"#00e5a0","stroke-width":"1"}));
    svg.append(E("text",{x:400,y:400,fill:"#00e5a0","font-size":"11","text-anchor":"middle","font-family":"JetBrains Mono,monospace"},"Small MatMul → memory-bound. Large MatMul → compute-bound."));
  }
}];

let step=0;
function render(i){
  step=((i%S.length)+S.length)%S.length;
  let s=S[step];
  document.getElementById("explain").innerHTML=`
    <div class="step-title">${s.t}</div>
    <div class="badge-row">${s.b.map(b=>'<span class="badge badge--tip">'+b+'</span>').join("")}</div>
    <div class="code-line">${s.l}</div>
    <div class="step-desc">${s.d}</div>`;
  let svg=document.getElementById("stage").querySelector("svg");
  if(!svg){svg=document.createElementNS("http://www.w3.org/2000/svg","svg");document.getElementById("stage").appendChild(svg);svg.setAttribute("width","100%");svg.setAttribute("height","100%");svg.style.minHeight="420px";}
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  s.r(svg);
  document.getElementById("dots").innerHTML=S.map((_,j)=>'<div class="step-dot'+(j===step?' active':j<step?' done':'')+'></div>').join("");
  document.getElementById("btn-prev").disabled=step===0;
  document.getElementById("btn-next").disabled=step===S.length-1;
}
render(0);
document.getElementById("btn-prev").onclick=()=>render(step-1);
document.getElementById("btn-next").onclick=()=>render(step+1);
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")render(step-1);if(e.key==="ArrowRight")render(step+1);});
</script>
</body>
</html>
