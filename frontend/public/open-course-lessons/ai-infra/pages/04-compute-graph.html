<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>计算图表示 - AI基础设施</title>
<style>:root{--bg:#0a0c14;--bg-soft:#141824;--bg-code:#080a10;--fg:#e0e8f0;--fg-dim:#8899aa;--line:#283040;--accent:#40a0ff;--accent2:#60d0ff;--success:#40d880;--danger:#f05060;--purple:#9080ff}*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;height:100%;overflow:hidden}.shell{display:flex;flex-direction:column;height:100vh}.bar{display:flex;align-items:center;gap:16px;padding:10px 22px;background:linear-gradient(90deg,#101520,#1a2030);border-bottom:1px solid var(--line)}.bar h1{font-size:17px;margin:0}.bar h1 span{color:var(--fg-dim);font-weight:400;margin-left:8px;font-size:13px}.bar a{color:var(--fg);text-decoration:none;padding:5px 10px;border:1px solid var(--line);border-radius:6px;background:var(--bg-soft);font-size:12px}.bar a:hover{border-color:var(--accent);color:var(--accent)}.spacer{flex:1}.badge-num{padding:5px 12px;background:var(--bg-code);border:1px solid var(--line);border-radius:6px;color:var(--accent);font-size:13px}.main{flex:1;display:flex;min-height:0}.left{width:420px;min-width:420px;padding:20px;overflow-y:auto;background:var(--bg-soft);border-right:1px solid var(--line)}.right{flex:1;position:relative;background:var(--bg);overflow:hidden}.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;background:rgba(64,160,255,.12);color:var(--accent);border:1px solid rgba(64,160,255,.35);margin-bottom:10px}h2.step{font-size:18px;margin:0 0 8px;line-height:1.3;color:var(--fg)}.desc{font-size:13px;line-height:1.85;color:var(--fg)}.desc p{margin:6px 0}.desc code{background:var(--bg-code);padding:1px 5px;border-radius:3px;color:var(--accent);font-size:12px}.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:4px;font-weight:600}.bd{background:rgba(144,128,255,.18);color:var(--purple);border:1px solid rgba(144,128,255,.4)}.bt{background:rgba(64,216,128,.15);color:var(--success);border:1px solid rgba(64,216,128,.4)}.bw{background:rgba(240,80,96,.15);color:var(--danger);border:1px solid rgba(240,80,96,.4)}.tip{border-left:3px solid var(--accent);padding:6px 10px;margin:8px 0;background:rgba(64,160,255,.06);border-radius:4px;font-size:12px;line-height:1.6}.stage-label{position:absolute;top:12px;left:20px;font-size:12px;color:var(--fg-dim);display:flex;align-items:center;gap:6px}.stage-label b{display:inline-block;padding:2px 6px;border-radius:3px;background:var(--accent);color:var(--bg);font-weight:800;font-size:10px}.ctrl{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--bg-soft);border-top:1px solid var(--line)}.ctrl button{padding:5px 12px;font-size:12px;font-weight:600;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--fg-dim);cursor:pointer;transition:all .2s;font-family:inherit}.ctrl button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}.ctrl button:disabled{opacity:.3;cursor:default}.ctrl button.go{background:var(--accent);color:var(--bg);border-color:var(--accent)}.dots{display:flex;gap:4px;flex:1;justify-content:center}.dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:all .3s;cursor:pointer}.dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent);transform:scale(1.3)}.dot.ok{background:var(--success)}@media(max-width:940px){.main{flex-direction:column}.left{width:100%;min-width:0;max-height:35vh}}</style></head><body>
<div class="shell"><div class="bar"><a href="../index.html">← Back</a><h1>Computation Graph Representation<span>· DAG · Node · Edge</span></h1><span class="spacer"></span><span class="badge-num" id="sn">1/6</span></div>
<div class="main"><div class="left" id="panel"></div><div class="right"><div class="stage-label"><b>DAG</b> Computation Graph Visualization</div><svg id="s" viewBox="0 0 720 480" preserveAspectRatio="xMidYMid meet" style="max-width:100%;max-height:100%"></svg></div></div>
<div class="ctrl"><button id="br">↺</button><button id="bp">◀</button><button class="go" id="bn">▶</button><button id="ba">Auto</button><div class="dots" id="dots"></div></div></div>
<script>
var NS="http://www.w3.org/2000/svg",sv;
function R(x,y,w,h,f,s,rx,sw){var e=document.createElementNS(NS,"rect");e.setAttribute("x",x);e.setAttribute("y",y);e.setAttribute("width",w);e.setAttribute("height",h);e.setAttribute("fill",f);e.setAttribute("rx",rx||4);if(s){e.setAttribute("stroke",s);e.setAttribute("stroke-width",sw||1.5)}sv.appendChild(e)}
function TC(x,y,w,t,sz,c,pad){pad=pad||15;var mw=w-2*pad,ew=t.length*(sz||13)*0.85;if(ew>mw)sz=(sz||13)*mw/ew;if(sz<8)sz=8;var e=document.createElementNS(NS,"text");e.setAttribute("x",x+w/2);e.setAttribute("y",y);e.setAttribute("fill",c||"#e0e8f0");e.setAttribute("font-size",sz);e.setAttribute("text-anchor","middle");e.setAttribute("font-weight","bold");e.textContent=t;sv.appendChild(e)}
function TL(x,y,w,t,sz,c,pad){pad=pad||15;var mw=w-2*pad,ew=t.length*(sz||12)*0.85;if(ew>mw){var mc=Math.floor(mw/((sz||12)*0.85))-2;if(mc<3)mc=3;t=t.substring(0,mc)+".."}var e=document.createElementNS(NS,"text");e.setAttribute("x",x+pad);e.setAttribute("y",y);e.setAttribute("fill",c||"#e0e8f0");e.setAttribute("font-size",sz);e.setAttribute("text-anchor","start");e.textContent=t;sv.appendChild(e)}
function L(x1,y1,x2,y2,c,sw){var e=document.createElementNS(NS,"line");e.setAttribute("x1",x1);e.setAttribute("y1",y1);e.setAttribute("x2",x2);e.setAttribute("y2",y2);e.setAttribute("stroke",c||"#283040");e.setAttribute("stroke-width",sw||1);sv.appendChild(e)}

var S=[{t:"What is a Computation Graph?",p:"Foundation",
b:'<p>A <b>computation graph</b> is a directed acyclic graph (DAG) where:<br><b>Nodes</b> = tensor operations (MatMul, ReLU, Softmax, etc.)<br><b>Edges</b> = data flow (tensors flowing from one op to the next)</p><p>This representation is the backbone of <b>all modern ML compilers</b> (XLA, TVM, MLIR, TorchDynamo). It enables whole-graph optimization — transformations that span multiple operators.</p><p><span class="badge bd">Key property</span> The graph is a DAG (no cycles) because forward passes are feed-forward. Backpropagation creates a separate backward graph.</p>',
d:function(){var W=720,H=480,P=15;R(P,P,W-2*P,H-2*P,"#080a10","#40a0ff",8,2);
TC(P,30,W-2*P,"Computation Graph = DAG of Operations + Tensors",14,"#40a0ff",P);
var nodes=["Input(x)","Linear(W1,b1)","ReLU","Linear(W2,b2)","Softmax","Output(y)"];
var nx=[80,220,360,500,640,640],ny=[200,120,60,120,200,320];
nx.forEach(function(x,i){R(x-45,ny[i]-18,90,36,"rgba(64,160,255,.15)","#40a0ff",6,1.5);TC(x,ny[i]+6,90,nodes[i],10,i===0||i===5?"#8899aa":"#40a0ff",5)});
L(125,200,185,138,"#40a0ff",1.5);L(265,120,325,78,"#40a0ff",1.5);L(405,120,465,138,"#40a0ff",1.5);L(545,200,605,220,"#40a0ff",1.5);
TC(P,380,W-2*P,"Nodes=Ops, Edges=Tensor flow, DAG=no cycles (feed-forward only)",12,"#60d0ff",P);}},

{t:"XLA: Google's Graph Compiler",p:"Compilers",
b:'<p><b>XLA (Accelerated Linear Algebra)</b> is Google\'s production-grade ML compiler used in JAX and TensorFlow. It converts high-level ops (HLO — High Level Optimizer dialect) into optimized executables for GPU/TPU.</p><p>XLA performs <b>whole-graph optimization</b>: instead of executing ops one-by-one (eager mode), it compiles entire subgraphs into fused kernels. This enables cross-op optimizations impossible in eager execution.</p><p><span class="badge bt">JAX</span> uses XLA as its default backend. Every JAX function is JIT-compiled: <code>jax.jit(f)(x)</code> -> XLA computation -> optimized executable.</p>',
d:function(){var W=720,H=480,P=15;R(P,P,W-2*P,H-2*P,"#080a10","#9080ff",8,2);
TC(P,30,W-2*P,"XLA: Whole-Graph Compilation for GPU/TPU",14,"#9080ff",P);
var pipeline=["PyTorch/TF ops","-> HLO (High Level Optimizer)","-> XLA Compiler (fusion, tiling, scheduling)","-> Optimized Executable (GPU/TPU binary)"];
var bx=60,by=80,bw=600;
pipeline.forEach(function(s,i){R(bx,by+i*55,bw,48,"rgba(144,128,255,.05)","#9080ff",4,1);TC(bx+bw/2,by+i*55+32,bw,s,12,i===0||i===3?"#e0e8f0":"#8899aa",10)})
TC(P,340,W-2*P,"JAX: jax.jit(f)(x) -> XLA compiles the whole function, not just individual ops",12,"#60d0ff",P);}},

{t:"MLIR: Multi-Level Intermediate Representation",p:"Compilers",
b:'<p><b>MLIR (Multi-Level IR)</b> is LLVM\'s compiler infrastructure for ML. Unlike XLA\'s single-level HLO, MLIR supports <b>multiple dialects</b> at different abstraction levels — from high-level Tensor ops down to low-level GPU code.</p><p>Dialects form a progressive lowering pipeline: <code>TorchScript -> Linalg -> Affine -> SCF -> GPU -> LLVM IR</code>. Each level enables different optimizations.</p><p><span class="badge bt">PyTorch 2.0</span> uses TorchDynamo to capture Python bytecode, TorchInductor as the backend (built on Triton), and MLIR as the intermediate representation.</p>',
d:function(){var W=720,H=480,P=15;R(P,P,W-2*P,H-2*P,"#080a10","#60d0ff",8,2);
TC(P,30,W-2*P,"MLIR: Progressive Lowering Through Multiple Dialects",14,"#60d0ff",P);
var dialects=["High-Level: TorchScript, Tensor (ML ops semantics)","Mid-Level: Linalg, Affine (loop structures)","Low-Level: SCF, GPU (control flow, parallelism)","Target: LLVM IR -> PTX -> GPU binary"];
var bx=60,by=80,bw=600;
dialects.forEach(function(d,i){R(bx,by+i*60,bw,52,"rgba(96,208,255,.05)","#60d0ff",4,1);TC(bx+bw/2,by+i*60+32,bw,d,12,i===0?"#e0e8f0":"#8899aa",10)});
TC(P,360,W-2*P,"PyTorch 2.0: TorchDynamo captures graph -> TorchInductor (Triton) -> MLIR -> GPU",12,"#40a0ff",P);}},

{t:"TorchDynamo: PyTorch 2.0's Graph Capture",p:"Compilers",
b:'<p><b>TorchDynamo</b> is PyTorch 2.0\'s graph capture mechanism. It works by <b>bytecode analysis</b> of Python functions — intercepting calls to PyTorch operations and building a computation graph (FX Graph) that can be optimized.</p><p>The captured FX Graph is then passed to <b>TorchInductor</b>, which generates optimized Triton/C++ kernels. The key innovation: Dynamo works on <b>unmodified</b> PyTorch code — no @torch.compile decorator changes needed beyond adding the decorator itself.</p><p><code>@torch.compile</code> = Dynamo captures + Inductor optimizes + Triton generates GPU kernels.</p>',
d:function(){var W=720,H=480,P=15;R(P,P,W-2*P,H-2*P,"#080a10","#40d880",8,2);
TC(P,30,W-2*P,"TorchDynamo: Bytecode-Level Graph Capture",14,"#40d880",P);
TC(P,70,W-2*P,"torch.compile(model) = Dynamo(capture) + Inductor(optimize) + Triton(codegen)",13,"#60d0ff",P);
var steps=["1. Python bytecode analysis -> identify PyTorch operations","2. Build FX Graph (intermediate representation)","3. TorchInductor: fuse ops, optimize layout, tile loops","4. Code generation: Triton GPU kernels or C++ for CPU","5. Execute optimized kernel, return results seamlessly"];
var bx=60,by=110,bw=600;
steps.forEach(function(s,i){R(bx,by+i*45,bw,38,"rgba(64,216,128,.05)","#40d880",4,1);TL(bx,by+i*45+27,bw,s,11,"#e0e8f0",15)})
TC(P,380,W-2*P,"Key: no code changes needed beyond @torch.compile decorator",12,"#60d0ff",P);}},

{t:"Graph IR vs Eager Execution",p:"Design",
b:'<p><b>Eager mode</b> (PyTorch 1.x default): Each op executes immediately. Simple, debuggable, but no cross-op optimization. <b>Graph mode</b> (TorchScript, torch.compile): Build the full graph first, optimize globally, then execute. Faster but more opaque.</p><p>PyTorch 2.0 bridges the gap: <b>eager development + graph optimization</b>. You write eager code, but torch.compile transparently captures and optimizes it — best of both worlds.</p><p><span class="badge bt">Trade-off</span>: Graph mode = faster execution. Eager mode = easier debugging. Dynamo gives you graph mode speed with eager mode coding.</p>',
d:function(){var W=720,H=480,P=15;R(P,P,W-2*P,H-2*P,"#080a10","#40a0ff",8,2);
TC(P,30,W-2*P,"Eager Execution vs Graph Compilation",14,"#40a0ff",P);
R(50,70,300,180,"rgba(240,80,96,.08)","#f05060",6,1.5);TC(200,105,300,"Eager Mode (PyTorch 1.x)",14,"#f05060",10);
TL(70,140,260,"Op-by-op execution, no cross-op fusion",11,"#f05060",10);TL(70,170,260,"Easy to debug with pdb/print",11,"#40d880",10);TL(70,200,260,"Suboptimal: each op = kernel launch overhead",11,"#f05060",10);
R(380,70,290,180,"rgba(64,216,128,.08)","#40d880",6,1.5);TC(525,105,290,"Graph Mode (torch.compile)",14,"#40d880",10);
TL(400,140,250,"Build full graph -> fuse -> tile -> compile",11,"#40d880",10);TL(400,170,250,"Harder to debug (FX Graph tools help)",11,"#f05060",10);TL(400,200,250,"Optimal: single fused kernel, no overhead",11,"#40d880",10);
TC(P,320,W-2*P,"PyTorch 2.0: Write eager, execute in graph mode via torch.compile",13,"#60d0ff",P);}},

{t:"From Graph to GPU: End-to-End Pipeline",p:"Integration",
b:'<p>The complete computation graph to GPU execution pipeline:</p><p><b>1. Model definition</b>: Python code using torch.nn.<br><b>2. Graph capture</b>: Dynamo/TorchScript converts to FX Graph.<br><b>3. Graph optimization</b>: Operator fusion, constant folding, layout optimization.<br><b>4. Code generation</b>: Triton generates optimized GPU kernels (or OpenAI Triton IR).<br><b>5. Execution</b>: Compiled binary runs on GPU with near-peak utilization.</p><p>This pipeline achieves 1.2-2x speedup on most models with zero code changes — just <code>@torch.compile()</code>.</p>',
d:function(){var W=720,H=480,P=15;R(P,P,W-2*P,H-2*P,"#080a10","#40a0ff",8,2);
TC(P,30,W-2*P,"End-to-End: Python -> Graph -> Optimized GPU Kernel",14,"#40a0ff",P);
var steps=["1. model(x) -> Python calls","2. Dynamo captures -> FX Graph (DAG)","3. Inductor fuses ops -> optimized IR","4. Triton -> GPU kernel code","5. CUDA -> GPU SMs execute in parallel"];
var bx=60,by=70,bw=600;
steps.forEach(function(s,i){var c=i<2?"#40a0ff":i<4?"#9080ff":"#40d880";R(bx,by+i*55,bw,48,"rgba(64,160,255,.05)",c,4,1);TL(bx,by+i*55+32,bw,s,12,"#e0e8f0",15)})
TC(P,380,W-2*P,"Result: 1.2-2x speedup with @torch.compile(), zero code changes",13,"#60d0ff",P);TC(P,420,W-2*P,"Next: Operator Fusion — how multiple ops become one kernel",12,"#8899aa",P);}}];

var cs=0,at=null,ia=false,N=S.length;
function init(){sv=document.getElementById("s");for(var i=0;i<N;i++){var d=document.createElement("div");d.className="dot";d.onclick=(function(j){return function(){go(j)}})(i);document.getElementById("dots").appendChild(d)}render()}
function go(i){if(i<0||i>=N)return;cs=i;render()}
function render(){while(sv.firstChild)sv.removeChild(sv.firstChild);var s=S[cs];document.getElementById("sn").textContent=(cs+1)+"/"+N;document.getElementById("panel").innerHTML='<div class="tag">'+s.p+'</div><h2 class="step">'+s.t+'</h2><div class="desc">'+s.b+'</div>';s.d();var dots=document.querySelectorAll(".dot");for(var i=0;i<dots.length;i++)dots[i].className="dot"+(i===cs?" on":i<cs?" ok":"");document.getElementById("bp").disabled=cs===0;document.getElementById("bn").disabled=cs===N-1}
function next(){if(cs<N-1){cs++;render()}else sa()}function prev(){if(cs>0){cs--;render()}}function rst(){sa();cs=0;render()}function ta(){ia?sa():startA()}function startA(){ia=true;document.getElementById("ba").textContent="||";at=setInterval(next,2500)}function sa(){ia=false;if(at){clearInterval(at);at=null}document.getElementById("ba").textContent="Auto"}
document.addEventListener("keydown",function(e){if(e.key==="ArrowRight"){e.preventDefault();next()}else if(e.key==="ArrowLeft"){e.preventDefault();prev()}else if(e.key===" "){e.preventDefault();ta()}else if(e.key==="r"||e.key==="R"){e.preventDefault();rst()}});
document.getElementById("bp").onclick=prev;document.getElementById("bn").onclick=next;document.getElementById("br").onclick=rst;document.getElementById("ba").onclick=ta;window.onload=init;
</script></body></html>
